<script>
// ═══════════════════════════════════════════════════════════════
//  SUPABASE STORAGE — menggantikan localStorage
//  Tabel: mirana_data (user_id TEXT, key TEXT, value TEXT)
//  Primary key: (user_id, key) — pastikan UNIQUE constraint aktif
// ═══════════════════════════════════════════════════════════════
const _SB_URL  = "https://csqleiksxupbqpmurvlj.supabase.co";
const _SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzcWxlaWtzeHVwYnFwbXVydmxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDA4MDIsImV4cCI6MjA5NTExNjgwMn0.nxBdtFhMCg2bBjgV0LNWVDfTWWbxDZp61pgn_Mi_OgY";
const _SB_USER = "mirana-edge-default";
const _SB_TABLE= "mirana_data";

const _sbHeaders = {
  "apikey": _SB_KEY,
  "Authorization": "Bearer " + _SB_KEY,
  "Content-Type": "application/json",
};

// ── GET ──────────────────────────────────────────────────────────
async function __storageGet(key) {
  try {
    const url = `${_SB_URL}/rest/v1/${_SB_TABLE}?user_id=eq.${encodeURIComponent(_SB_USER)}&key=eq.${encodeURIComponent(key)}&select=value&limit=1`;
    const res = await fetch(url, { headers: _sbHeaders });
    if (!res.ok) throw new Error("GET " + res.status);
    const rows = await res.json();
    if (!rows || rows.length === 0) return null;
    return { key, value: rows[0].value };
  } catch(e) {
    // Fallback: coba baca dari localStorage jika Supabase gagal
    try {
      const v = localStorage.getItem(key);
      return v != null ? { key, value: v } : null;
    } catch(_) { return null; }
  }
}

// ── SET (upsert) ─────────────────────────────────────────────────
async function __storageSet(key, value) {
  try {
    const url = `${_SB_URL}/rest/v1/${_SB_TABLE}`;
    const res = await fetch(url, {
      method: "POST",
      headers: {
        ..._sbHeaders,
        "Prefer": "resolution=merge-duplicates,return=minimal",
      },
      body: JSON.stringify({
        user_id: _SB_USER,
        key: key,
        value: String(value),
      }),
    });
    if (!res.ok) throw new Error("SET " + res.status);
    return { key, value };
  } catch(e) {
    // Fallback: simpan ke localStorage jika Supabase gagal
    try { localStorage.setItem(key, String(value)); } catch(_) {}
    return null;
  }
}

// ── MIGRASI OTOMATIS localStorage → Supabase ─────────────────────
// Dijalankan sekali saat pertama buka. Flag tersimpan di localStorage.
const _MIGRATED_FLAG = "__mirana_sb_migrated_v1";
async function __runMigration() {
  if (localStorage.getItem(_MIGRATED_FLAG) === "1") return; // sudah pernah migrasi

  const miranaKeys = Object.keys(localStorage).filter(k =>
    k.startsWith("mirana-edge") || k.startsWith("mirana_edge")
  );
  if (miranaKeys.length === 0) {
    localStorage.setItem(_MIGRATED_FLAG, "1");
    return; // tidak ada data lama, tidak perlu migrasi
  }

  // Tampilkan overlay loading
  const overlay = document.createElement("div");
  overlay.id = "__migrating";
  overlay.style.cssText = "position:fixed;inset:0;background:#0d0d0f;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier New',monospace;color:#e2e2e2;gap:16px;";
  overlay.innerHTML = `
    <div style="font-size:28px">☁️</div>
    <div style="font-size:14px;font-weight:700;letter-spacing:2px;color:#3b8df1">MIRANA EDGE</div>
    <div style="font-size:11px;color:#888;letter-spacing:1px">Memindahkan data ke cloud…</div>
    <div id="__mig_progress" style="font-size:10px;color:#666;max-width:280px;text-align:center;line-height:1.7"></div>
    <div style="width:200px;height:3px;background:#1a1a1f;border-radius:2px;overflow:hidden">
      <div id="__mig_bar" style="height:100%;background:#3b8df1;width:0%;transition:width 0.3s;border-radius:2px"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const progress = document.getElementById("__mig_progress");
  const bar = document.getElementById("__mig_bar");

  let done = 0;
  for (const key of miranaKeys) {
    const value = localStorage.getItem(key);
    if (value == null) { done++; continue; }
    try {
      if (progress) progress.textContent = key.replace("mirana-edge-","").replace("mirana_edge_","");
      await __storageSet(key, value);
    } catch(_) {}
    done++;
    if (bar) bar.style.width = Math.round(done / miranaKeys.length * 100) + "%";
  }

  // Tandai selesai
  localStorage.setItem(_MIGRATED_FLAG, "1");

  // Update overlay
  if (overlay) {
    overlay.innerHTML = `
      <div style="font-size:28px">✅</div>
      <div style="font-size:14px;font-weight:700;letter-spacing:2px;color:#3b8df1">Migrasi Selesai!</div>
      <div style="font-size:11px;color:#888;text-align:center;max-width:260px;line-height:1.6">
        ${miranaKeys.length} item berhasil dipindahkan ke cloud.<br/>
        Halaman akan dimuat ulang…
      </div>
    `;
    await new Promise(r => setTimeout(r, 1800));
    location.reload();
  }
}

// Jalankan migrasi saat DOM siap
document.addEventListener("DOMContentLoaded", () => {
  __runMigration().catch(console.error);
});
</script>
<script type="text/babel">

const { useState, useMemo, useEffect } = React;


// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const RR_PRESETS = ["1:2","1:3","1:4","1:5","1:6","1:7","1:8","1:9","1:10"];

// ─── TAG SYSTEM ───────────────────────────────────────────────────────────────
const TAG_PRESETS = [

const EXEC_TYPES = [

];
const ENTRY_TYPES = [

];
const DIRECTIONS = ["Buy","Sell"];

const TRAILING_MODELS = [
  { id:"A", label:"Model A" },
  { id:"B", label:"Model B" },
  { id:"C", label:"Model C" },
];
const MODEL_A_SUBS = [
  { id:"normal", label:"Normal",    desc:"Geser ke +0 setiap +1 naik, terus naik setiap +1" },
  { id:"max0",   label:"Max ke +0", desc:"Geser ke +0 di +1, lalu berhenti — tidak naik lagi" },
];
const MODEL_B_SUBS = [
  { id:"normal", label:"Normal",    desc:"Geser ke +0 setiap +2 naik, terus naik setiap +2" },
  { id:"max0",   label:"Max ke +0", desc:"Geser ke +0 di +2, lalu berhenti — tidak naik lagi" },
];
const SESSIONS = ["Australia","Asia","London","New York"];

// ─── SESSION DETECTION ────────────────────────────────────────────────────────
// Jam dalam UTC+7 (WIB). Sesuaikan offset jika perlu.
// Australia: 04:00–13:00 WIB  (Sydney 00:00–09:00 UTC → +7)
// Asia:      07:00–16:00 WIB  (Tokyo/Singapore 00:00–09:00 UTC+9 → +7=07:00)
// London:    14:00–23:00 WIB  (London open 07:00 UTC → +7)
// New York:  19:00–04:00+1    (NY open 12:00 UTC → +7=19:00)
const SESSION_RANGES = [
  { name:"Australia", start: 4*60,  end:13*60 },
  { name:"Asia",      start: 7*60,  end:16*60 },
  { name:"London",    start:14*60,  end:23*60 },
  { name:"New York",  start:19*60,  end:28*60 }, // 28*60 = 04:00 next day
];

const detectSessions = (dtStr) => {
  if (!dtStr) return [];
  // Parse local time from datetime-local input (no tz conversion needed,
  // user inputs their local time; we treat it as-is for session mapping)
  const [,time] = dtStr.split("T");
  if (!time) return [];
  const [h,m] = time.split(":").map(Number);
  const mins = h*60 + m;
  const mins2 = mins + 24*60; // for NY overflow past midnight

  return SESSION_RANGES.filter(s => {
    if (s.end <= 24*60) return mins >= s.start && mins < s.end;
    // overnight session (NY crosses midnight)
    return mins >= s.start || mins < (s.end - 24*60);
  }).map(s => s.name);
};

const getSessionLabel = (sessions) => {
  if (!sessions || sessions.length === 0) return null;
  if (sessions.length === 1) return sessions[0];
  return sessions.join(" + ") + " (Overlap)";
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const holdMins = (a,b) => {
  if (!a||!b) return 0;
  const d = Math.round((new Date(b)-new Date(a))/60000);
  return d>=0?d:0;
};
const fmtDuration = (mins) => {
  if (!mins||mins<=0) return "0m";
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins/60), m = mins%60;
  if (h < 24) return m>0?`${h}j ${m}m`:`${h}j`;
  const d = Math.floor(h/24), rh = h%24;
  return rh>0?`${d}h ${rh}j`:`${d}h`;
};
const calcTP = (slp,rr) => {
  if (!slp||!rr) return null;
  const ratio = parseFloat(rr.split(":")[1]);
  const sl = parseFloat(slp);
  if (isNaN(ratio)||isNaN(sl)||sl<=0) return null;
  return (sl*ratio).toFixed(1).replace(/\.0$/,"");
};
const sortRR = a=>[...a].sort((x,y)=>parseFloat(x.split(":")[1]??x)-parseFloat(y.split(":")[1]??y));
const allPairs = trades=>[...new Set(trades.map(t=>t.pair).filter(Boolean))].sort();
const nowDT = () => {
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
};
const fmtDT = dt => dt ? dt.replace("T"," ").slice(0,16) : "—";

// ─── BEP CONVERSION ───────────────────────────────────────────────────────────
// Returns BEP position in R (= SL multiples) based on model config.
// Logic: maximum trailing SL position assuming price approached the RR target.
//   Model A Normal  : SL trails 1R behind → BEP = ratio - 1
//   Model A Max+0   : SL stops at 0 (entry) → BEP = 0
//   Model B Normal  : SL trails 2R steps; last step ≤ ratio → BEP = floor(ratio/2)*2 - 2
//   Model B Max+0   : SL stops at 0 → BEP = 0
//   Model C         : SL max capped at +2R → BEP = 2
const calcBepR = (rr, model, subModel) => {
  const ratio = parseFloat(rr?.split(":")[1]);
  if (!ratio || ratio <= 0) return null;
  if (model === "A") return subModel === "max0" ? 0 : Math.max(0, ratio - 1);
  if (model === "B") return subModel === "max0" ? 0 : Math.max(0, Math.floor(ratio/2)*2 - 2);
  if (model === "C") return 2;
  return null;
};
const calcBepPips = (rr, model, subModel, slPips) => {
  const r = calcBepR(rr, model, subModel);
  const sl = parseFloat(slPips);
  if (r === null || !sl || sl <= 0) return null;
  return r * sl;
};
const fmtPips = p => {
  if (p === null || p === undefined || isNaN(p)) return null;
  return (p >= 0 ? "+" : "") + Math.round(p) + "p";
};
// Compute pip range across all execution instances.
// Returns { winPips, lossPips, bepVals[], hasData, netMin, netMax, isRange }
// bepVals = one value per BEP config scenario (NOT averaged — each is its own possibility)
const calcExecPips = (executions) => {
  const arr = Array.isArray(executions)
    ? executions
    : Object.values(executions||{}).filter(e=>e?.used); // legacy compat

  let winPips=0, lossPips=0, bepVals=[], hasData=false;

  arr.forEach(ex => {
    const sl = parseFloat(ex.slPips);
    if (!sl || sl <= 0) return;
    const st = ex.static   || {rrs:{}};
    const trRaw = ex.trailing || {};
    const tr = trRaw.perModel ? trRaw : migrateTrailing(trRaw);

    Object.entries(st.rrs||{}).forEach(([rr,state]) => {
      const ratio = parseFloat(rr.split(":")[1]);
      if (state==="hit")  { winPips  += ratio*sl; hasData=true; }
      if (state==="miss") { lossPips += sl;        hasData=true; }
    });
    Object.entries(tr.perModel||{}).forEach(([modelId, md])=>{
      if (!md?.enabled) return;
      Object.entries(md.subs||{}).forEach(([subKey, sub])=>{
        if (!sub?.enabled) return;
        Object.entries(sub.rrs||{}).forEach(([rr,state])=>{
          const ratio = parseFloat(rr.split(":")[1]);
          const subModel = modelId==="C" ? "normal" : subKey;
          if (state==="hit") { winPips += ratio*sl; hasData=true; }
          if (state==="miss") {
            hasData=true;
            const bP = calcBepPips(rr, modelId, subModel, sl);
            bepVals.push(bP!==null ? bP : 0);
            if (sub.loss) lossPips += sl;
          }
        });
        if (sub.loss && !Object.values(sub.rrs||{}).some(v=>v==="miss")) {
          lossPips += sl; hasData=true;
        }
      });
    });
    if (tr.loss) { lossPips += sl; hasData=true; }
  });

  const bepMin = bepVals.length ? Math.min(...bepVals) : 0;
  const bepMax = bepVals.length ? Math.max(...bepVals) : 0;
  const netMin = winPips + bepMin - lossPips;
  const netMax = winPips + bepMax - lossPips;
  const isRange = bepVals.length > 1 && Math.round(bepMin) !== Math.round(bepMax);

  return { winPips, lossPips, bepMin, bepMax, bepVals, hasData, netMin, netMax, isRange };
};

// ─── DATA FACTORIES ───────────────────────────────────────────────────────────
// RR entry: { state: "hit"|"miss"|null }
// Static:  miss → loss
// Trailing: miss → bep (pilih model)

const mkRRMap = () => ({});
// rr map: { "1:2": "hit"|"miss"|null }  (null = belum dipilih / not toggled)

const mkStatic = () => ({ rrs:{}, loss:false });
// Static: rrs = {}, loss = true jika ada miss ATAU diklik manual
// Sebenarnya loss = computed dari rrs yang ada miss

// bepConfigs[rr] = { configs:[{model,subModel,cStart},...], loss:bool }
// configs is an ARRAY — user can add multiple model configs per RR
const mkRRBepEntry = () => ({ configs:[], loss:false });
const mkCfgItem = (model="A",subModel="normal",cStart="A") => ({model,subModel,cStart,id:Math.random().toString(36).slice(2)});

const mkSubEntry = () => ({ enabled:false, rrs:{}, loss:false, dateFrom:nowDT(), dateTo:nowDT() });

const mkTrailing = () => ({
  // Each model → each sub-variant has its own RR outcomes
  perModel: {
    A: { enabled:false, subs:{ normal:mkSubEntry(), max0:mkSubEntry() } },
    B: { enabled:false, subs:{ normal:mkSubEntry(), max0:mkSubEntry() } },
    C: { enabled:false, subs:{ A:mkSubEntry(), B:mkSubEntry() } }, // A/B = cStart
  },
  loss: false, // global: SL hit sebelum trailing sempat jalan
});

// Migrate old trailing format → new perModel/subs format
const migrateTrailing = (tr) => {
  if (!tr) return mkTrailing();
  // Already new format (has subs)
  if (tr.perModel?.A?.subs) return tr;
  // Mid-format (perModel but no subs) — from previous refactor
  if (tr.perModel) {
    const newTr = mkTrailing();
    newTr.loss = tr.loss||false;
    Object.entries(tr.perModel).forEach(([modelId, md])=>{
      if (!md?.enabled) return;
      newTr.perModel[modelId].enabled = true;
      const subKey = modelId==="C" ? (md.cStart||"A") : (md.subModel||"normal");
      if (newTr.perModel[modelId].subs[subKey]) {
        newTr.perModel[modelId].subs[subKey].enabled = true;
        newTr.perModel[modelId].subs[subKey].rrs = md.rrs||{};
        newTr.perModel[modelId].subs[subKey].loss = md.loss||false;
      }
    });
    return newTr;
  }
  // Oldest format: { rrs:{}, bepConfigs:{}, loss:bool }
  const newTr = mkTrailing();
  newTr.loss = tr.loss||false;
  const rrs = tr.rrs||{};
  const bepCfgs = tr.bepConfigs||{};
  Object.entries(rrs).forEach(([rr, state])=>{
    if (state==="hit") {
      newTr.perModel.A.enabled=true;
      newTr.perModel.A.subs.normal.enabled=true;
      newTr.perModel.A.subs.normal.rrs[rr]="hit";
    } else if (state==="miss") {
      const cfgEntry = bepCfgs[rr];
      const cfgs = cfgEntry?.configs||[];
      if (cfgs.length>0) {
        cfgs.forEach(c=>{
          const m = c.model||"A";
          const sk = m==="C" ? (c.cStart||"A") : (c.subModel||"normal");
          newTr.perModel[m].enabled=true;
          if (newTr.perModel[m].subs[sk]) {
            newTr.perModel[m].subs[sk].enabled=true;
            newTr.perModel[m].subs[sk].rrs[rr]="miss";
            if (cfgEntry?.loss) newTr.perModel[m].subs[sk].loss=true;
          }
        });
      } else {
        newTr.perModel.A.enabled=true;
        newTr.perModel.A.subs.normal.enabled=true;
        newTr.perModel.A.subs.normal.rrs[rr]="miss";
      }
    }
  });
  return newTr;
};

const mkExecInstance = (type) => {
  const et = EXEC_TYPES.find(e=>e.id===type)||EXEC_TYPES[0];
  const now = nowDT();
  return {
    id: crypto.randomUUID(),
    type: et.id,
    typeLabel: et.label,
    dateFrom: now,
    holdingMins: 0,
    sessionsEntry: detectSessions(now),
    sessionsExit:  [],
    slPips: "",
    slNotes: "",       // keterangan SL (alasan, konteks, dll)
    targetRange: "",   // e.g. "1:5" — max TP level
    targetNotes: "",   // keterangan target range
    rrTimes: {},       // { "1:2": "2024-01-01T09:00", "1:3": "2024-01-01T12:00" }
    static:   mkStatic(),
    trailing: mkTrailing(),
  };
};

// Compute trade-level date span from executions array
// Exit time = last RR close time across all execs (fallback: dateTo)
const tradeSpan = (executions) => {
  const arr = Array.isArray(executions) ? executions : [];
  const starts = arr.map(e=>e.dateFrom).filter(Boolean).sort();

  // Collect all RR close times
  const allCloseTimes = [];
  arr.forEach(inst => {
    // Static rrTimes
    Object.values(inst.rrTimes||{}).forEach(t => { if(t) allCloseTimes.push(t); });
    // Static section rrTimes
    Object.values(inst.static?.rrTimes||{}).forEach(t => { if(t) allCloseTimes.push(t); });
    // Trailing sub rrTimes
    const tr = migrateTrailing(inst.trailing);
    Object.values(tr.perModel||{}).forEach(md => {
      if (!md?.enabled) return;
      Object.values(md.subs||{}).forEach(sub => {
        if (!sub?.enabled) return;
        Object.values(sub.rrTimes||{}).forEach(t => { if(t) allCloseTimes.push(t); });
      });
    });
    // Legacy dateTo fallback
    if (inst.dateTo) allCloseTimes.push(inst.dateTo);
  });
  const ends = allCloseTimes.sort();

  return {
    dateFrom:    starts[0]              || nowDT(),
    dateTo:      ends[ends.length-1]    || nowDT(),
    holdingMins: starts[0] && ends[ends.length-1]
      ? holdMins(starts[0], ends[ends.length-1]) : 0,
  };
};

// Dari rrs map, hitung ringkasan outcome
const computeStaticOutcome = (rrs) => {
  const entries = Object.entries(rrs);
  if (!entries.length) return null;
  const hits  = entries.filter(([,v])=>v==="hit").map(([r])=>r);
  const miss  = entries.filter(([,v])=>v==="miss").map(([r])=>r);
  return { hits: sortRR(hits), misses: sortRR(miss) };
};

const computeTrailingOutcome = (rrs) => {
  const entries = Object.entries(rrs);
  if (!entries.length) return null;
  const hits  = entries.filter(([,v])=>v==="hit").map(([r])=>r);
  const miss  = entries.filter(([,v])=>v==="miss").map(([r])=>r);
  return { hits: sortRR(hits), misses: sortRR(miss) };
};

// ─── RR GENERATION HELPERS ───────────────────────────────────────────────────
// Generate RR list from targetRange string (e.g. "1:5" → ["1:1","1:2","1:3","1:4","1:5"])
// Also accepts decimal like "1:2.5" → ["1:1","1:2","1:2.5"]
const genRRFromTarget = (targetStr) => {
  if (!targetStr) return [];
  const raw = targetStr.trim().replace(",",".");
  // Accept "1:5", "5", "1:2.5", "2.5"
  const num = raw.includes(":") ? parseFloat(raw.split(":")[1]) : parseFloat(raw);
  if (isNaN(num) || num <= 0) return [];
  const list = [];
  for (let i = 1; i <= Math.floor(num); i++) list.push(`1:${i}`);
  // Add the decimal endpoint if not already integer
  if (num !== Math.floor(num)) list.push(`1:${num}`);
  return list;
};

// ─── RR MULTI-STATE CHIPS ─────────────────────────────────────────────────────
// null → "hit" → "miss" → null
// Cascade rule: if RR N goes miss, all RR > N also become miss automatically.
// rrTimes: { "1:2": "datetime-string" } — optional close time per RR
const RRChips = React.memo(function RRChips({
  rrs, slPips, onChange,
  targetRange,
  rrTimes, onRRTimesChange,
  dateFrom,
  isTrailing,
  activeRRPresets, onDeleteRRPreset, onAddRRPreset
}) {
  const [cust, setCust] = useState("");
  const [confirmDelRR, setConfirmDelRR] = useState(null);
  const [expandedRR, setExpandedRR] = useState(null); // which RR has time picker open

  // Build the RR list: generated from targetRange first, then any extras
  const generatedRRs = genRRFromTarget(targetRange || "");
  // Extra custom RRs from the rrs map that are not in generated list
  const extraRRs = Object.keys(rrs).filter(r => !generatedRRs.includes(r));
  const allRRs   = sortRR([...generatedRRs, ...extraRRs]);

  // Cascade: when a RR goes miss, all higher RRs also become miss
  const cycleWithCascade = (rr) => {
    const cur  = rrs[rr] ?? null;
    const next = cur === null ? "hit" : cur === "hit" ? "miss" : null;

    const n = { ...rrs };
    if (next === null) {
      delete n[rr];
    } else {
      n[rr] = next;
    }

    // Cascade: if going miss, set all higher RRs to miss too
    if (next === "miss") {
      const rrVal = parseFloat(rr.split(":")[1]);
      allRRs.forEach(r => {
        const rv = parseFloat(r.split(":")[1]);
        if (rv > rrVal) n[r] = "miss";
      });
    }

    // Cascade: if removing (null) or hitting, clear cascade on lower
    if (next === null || next === "hit") {
      const rrVal = parseFloat(rr.split(":")[1]);
      // If we un-miss this RR, remove auto-miss on higher ones that have no explicit state
      // Only clear RRs that were cascade-miss (i.e., also miss)
      if (next === null) {
        allRRs.forEach(r => {
          const rv = parseFloat(r.split(":")[1]);
          if (rv > rrVal && n[r] === "miss") delete n[r];
        });
      }
    }

    onChange(n);
  };

  const addCustomRR = () => {
    const v = cust.trim().replace(",",".");
    if (!v || isNaN(parseFloat(v)) || parseFloat(v) <= 0) return;
    const key = `1:${v}`;
    if (onAddRRPreset) onAddRRPreset(key);
    if (!rrs[key]) onChange({ ...rrs, [key]: "hit" });
    setCust("");
  };

  const updateRRTime = (rr, dt) => {
    if (!onRRTimesChange) return;
    const updated = { ...(rrTimes || {}) };
    if (!dt) delete updated[rr]; else updated[rr] = dt;
    onRRTimesChange(updated);
  };

  const getRRDuration = (rr) => {
    const closeT = rrTimes?.[rr];
    if (!closeT || !dateFrom) return null;
    const mins = holdMins(dateFrom, closeT);
    return mins > 0 ? fmtDuration(mins) : null;
  };

  // Last hit/miss RR — used to compute final exit session
  const lastActiveRR = sortRR(Object.entries(rrs).filter(([,v]) => v !== null).map(([r]) => r)).slice(-1)[0];
  const lastCloseTime = lastActiveRR ? rrTimes?.[lastActiveRR] : null;

  return (
    <div>


      {/* ── RR chips + time pickers ── */}
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}>
          {allRRs.map(rr => {
            const state   = rrs[rr] ?? null;
            const tp      = state === "hit" && slPips ? calcTP(slPips, rr) : null;
            const label   = state === "hit" ? "✓" : state === "miss" ? "✕" : "";
            const isExtra = !generatedRRs.includes(rr);
            const isDeletable = isExtra && !!onDeleteRRPreset;
            const closeT  = rrTimes?.[rr];
            const dur     = getRRDuration(rr);
            const isExpanded = expandedRR === rr;
            // Cascade indicator: is this RR auto-missed because of a lower miss?
            const isCascade = state === "miss" && (() => {
              const rrVal = parseFloat(rr.split(":")[1]);
              return allRRs.some(r => {
                const rv = parseFloat(r.split(":")[1]);
                return rv < rrVal && rrs[r] === "miss";
              });
            })();

            return (
              <div key={rr} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <div style={{display:"flex",alignItems:"center",gap:0}}>
                  <button
                    onClick={() => { if (!confirmDelRR) cycleWithCascade(rr); }}
                    style={{
                      ...chip(state, true),
                      borderRadius: isDeletable ? "7px 0 0 7px" : 7,
                      borderRight: isDeletable ? "none" : undefined,
                      opacity: isCascade ? 0.65 : 1,
                      position:"relative",
                    }}>
                    <span style={{display:"flex",alignItems:"center",gap:2}}>
                      {label && <span style={{fontSize:9}}>{label}</span>}
                      <span style={{fontSize:isCascade?10:12}}>{rr}</span>
                    </span>
                    {tp && <span style={{fontSize:9,opacity:0.7}}>{tp}p</span>}
                    {isCascade && (
                      <span style={{position:"absolute",top:-4,right:-4,fontSize:8,
                        background:C.yellow,color:"#000",borderRadius:"50%",
                        width:12,height:12,display:"flex",alignItems:"center",
                        justifyContent:"center",fontWeight:800}}>↓</span>
                    )}
                  </button>
                  {isDeletable && (
                    confirmDelRR === rr ? (
                      <button onClick={() => { onDeleteRRPreset(rr); setConfirmDelRR(null); const n={...rrs}; delete n[rr]; onChange(n); }}
                        style={{background:C.red+"33",border:`1px solid ${C.red}66`,borderLeft:"none",
                          color:C.red,borderRadius:"0 7px 7px 0",padding:"5px 7px",
                          fontSize:9,fontWeight:800,cursor:"pointer",lineHeight:1}}>Del?</button>
                    ) : (
                      <button onClick={() => setConfirmDelRR(rr)}
                        style={{background:C.faint+"22",border:`1px solid ${C.border}`,borderLeft:"none",
                          color:C.dim,borderRadius:"0 7px 7px 0",padding:"5px 6px",
                          fontSize:11,fontWeight:700,cursor:"pointer",lineHeight:1}}>×</button>
                    )
                  )}
                </div>
                {/* Time pill under chip — tap-friendly */}
                {onRRTimesChange && state !== null && (
                  <button
                    onClick={() => setExpandedRR(isExpanded ? null : rr)}
                    style={{
                      background: closeT ? C.yellow+"18" : C.faint+"0a",
                      border: `1px solid ${closeT ? C.yellow+"55" : C.border}`,
                      color: closeT ? C.yellow : C.dim,
                      borderRadius: 20,
                      padding: "3px 8px",
                      fontSize: 10,
                      fontWeight: 700,
                      cursor: "pointer",
                      fontFamily: "monospace",
                      lineHeight: 1.2,
                      minWidth: 44,
                      textAlign: "center",
                      transition: "all 0.12s",
                    }}>
                    {closeT ? (dur ? `⏱ ${dur}` : "⏱ —") : "⏱ set"}
                  </button>
                )}
              </div>
            );
          })}

          {/* Manual RR input */}
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <span style={{color:C.faint,fontSize:12}}>1:</span>
            <input value={cust} onChange={e=>setCust(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addCustomRR()}
              placeholder="2.6"
              style={{...inpSt({padding:"5px 7px",width:46,fontSize:12})}}/>
            <button onClick={addCustomRR}
              style={{...chipBool(false,C.blue,true),minWidth:"auto",padding:"5px 9px"}}>+</button>
          </div>
        </div>

        {/* ── Time picker for expanded RR ── */}
        {expandedRR && allRRs.includes(expandedRR) && onRRTimesChange && (
          <div style={{
            background:"#050910",border:`1px solid ${C.yellow}44`,
            borderRadius:8,padding:"9px 11px",marginTop:2,
          }}>
            <div style={{color:C.yellow,fontSize:9,letterSpacing:1.3,fontWeight:700,marginBottom:6}}>
              ⏱ CLOSE TIME — {expandedRR}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <input type="datetime-local"
                value={rrTimes?.[expandedRR] || ""}
                onChange={e => updateRRTime(expandedRR, e.target.value||null)}
                style={{...inpSt({padding:"5px 8px",fontSize:11,flex:1})}}/>
              {rrTimes?.[expandedRR] && (
                <>
                  <span style={{color:C.yellow,fontFamily:"monospace",fontSize:11,fontWeight:700}}>
                    {getRRDuration(expandedRR) ? `⏱ ${getRRDuration(expandedRR)}` : ""}
                  </span>
                  <button onClick={() => updateRRTime(expandedRR, null)}
                    style={{background:"none",border:`1px solid ${C.border}`,color:C.dim,
                      borderRadius:6,padding:"4px 8px",fontSize:10,cursor:"pointer"}}>✕</button>
                </>
              )}
            </div>
            {dateFrom && rrTimes?.[expandedRR] && (
              <div style={{color:C.faint,fontSize:9,marginTop:4}}>
                Entry: {fmtDT(dateFrom)} → Close: {fmtDT(rrTimes[expandedRR])}
              </div>
            )}
          </div>
        )}

        <div style={{fontSize:10,color:C.dim,marginTop:2}}>
          {isTrailing
            ? "1x=✓Hit · 2x=✕Miss→BEP · Miss otomatis cascade ke RR di atasnya"
            : "1x=✓Hit · 2x=✕Miss→Loss · Miss otomatis cascade ke RR di atasnya"}
        </div>
      </div>
    </div>
  );
});

          ⏱ WAKTU MODEL INI
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:5,alignItems:"center",marginBottom:4}}>
          <input type="datetime-local" value={from||""} onChange={e=>onFrom(e.target.value||null)}
            placeholder={fallbackFrom}
            style={{...inpSt({padding:"5px 7px",fontSize:11,width:"100%"})}}/>
          <span style={{color:C.faint,fontSize:14}}>→</span>
          <input type="datetime-local" value={to||""} onChange={e=>onTo(e.target.value||null)}
            placeholder={fallbackTo}
            style={{...inpSt({padding:"5px 7px",fontSize:11,width:"100%"})}}/>
        </div>
        <div style={{color:C.yellow,fontFamily:"monospace",fontSize:11,fontWeight:700}}>
          ⏱ {fmtDuration(hm)}
          {!from&&!to&&<span style={{color:C.faint,fontWeight:400,fontSize:9,marginLeft:6}}>(pakai waktu global)</span>}
        </div>
      </div>
    );
  };

  // ── STATIC mode ────────────────────────────────────────────────
  if (!isTrailing) {
    const rrs = data.rrs || {};
    const hasAnyMiss = Object.values(rrs).some(v=>v==="miss");
    return (
      <div style={{border:`1px solid ${color}33`,borderRadius:8,overflow:"hidden",marginBottom:8}}>
        <div style={{background:color+"18",padding:"6px 12px",
          fontSize:11,color,fontWeight:800,letterSpacing:1.5}}>{title}</div>
        <div style={{padding:"10px 12px",background:"#060a10"}}>
          <Row label="RR">
            <RRChips
              rrs={rrs} slPips={slPips}
              targetRange={targetRange||""}
              rrTimes={data.rrTimes||{}}
              onRRTimesChange={v=>onChange({...data,rrTimes:v})}
              dateFrom={execDateFrom}
              isTrailing={false}
              activeRRPresets={activeRRPresets}
              onDeleteRRPreset={onDeleteRRPreset}
              onAddRRPreset={onAddRRPreset}
              onChange={newRrs=>onChange({...data,rrs:newRrs})}/>
          </Row>
          <Row label="-1">
            {hasAnyMiss
              ? <span style={{background:C.red+"15",border:`1px solid ${C.red}33`,
                  color:C.red,borderRadius:5,padding:"4px 12px",fontSize:11,fontWeight:700}}>
                  ✗ Loss otomatis
                </span>
              : <span style={{color:C.faint,fontSize:11,fontStyle:"italic"}}>— (tidak ada miss)</span>}
          </Row>
        </div>
      </div>
    );
  }

  // ── TRAILING mode — per-model + per-sub ──────────────────────
  const tr = migrateTrailing(data);
  const SUB_INFO = {
    A: { normal:{label:"Normal"}, max0:{label:"Max ke +0"} },
    B: { normal:{label:"Normal"}, max0:{label:"Max ke +0"} },
    C: { A:{label:"Mulai A"},     B:{label:"Mulai B"}      },
  };

  const updateSub = (modelId, subKey, patch) => {
    const curSubs = tr.perModel[modelId]?.subs || {};
    onChange({...tr, perModel:{...tr.perModel,
      [modelId]:{...tr.perModel[modelId],
        subs:{...curSubs, [subKey]:{...(curSubs[subKey]||mkSubEntry()), ...patch}}
      }
    }});
  };

  const toggleModel = (modelId) => {
    const cur = tr.perModel[modelId];
    onChange({...tr, perModel:{...tr.perModel, [modelId]:{...cur, enabled:!cur.enabled}}});
  };

  const anyEnabled = Object.values(tr.perModel).some(m=>m.enabled);

  return (
    <div style={{border:`1px solid ${color}33`,borderRadius:8,overflow:"hidden",marginBottom:8}}>
      <div style={{background:color+"18",padding:"6px 12px",
        fontSize:11,color,fontWeight:800,letterSpacing:1.5}}>{title}</div>
      <div style={{padding:"10px 12px",background:"#060a10"}}>

        {/* Global SL loss */}
        <div style={{marginBottom:10}}>
          <button onClick={()=>onChange({...tr,loss:!tr.loss})}
            style={{...chipBool(tr.loss,C.red,true),padding:"6px 18px",fontSize:12}}>
            {tr.loss?"✗ LOSS (aktif)":"Loss? (SL hit sebelum trailing jalan)"}
          </button>
          {tr.loss&&<div style={{marginTop:5,background:C.red+"10",border:`1px solid ${C.red}22`,
            borderRadius:6,padding:"5px 10px",color:C.red,fontSize:10,fontStyle:"italic"}}>
            SL hit sebelum trailing sempat berjalan
          </div>}
        </div>

        {/* Step 1: pilih model */}
        <div style={{marginBottom:10}}>
          <div style={{color:C.faint,fontSize:9,letterSpacing:1.2,fontWeight:700,marginBottom:6}}>
            PILIH MODEL
          </div>
          <div style={{display:"flex",gap:5,marginBottom:5}}>
            {["A","B","C"].map(id=>{
              const on = tr.perModel[id]?.enabled;
              return (
                <button key={id} onClick={()=>toggleModel(id)} style={{
                  flex:1,background:on?C.purple+"22":C.card,
                  border:`2px solid ${on?C.purple:C.border}`,color:on?C.purple:C.faint,
                  borderRadius:8,padding:"8px 4px",fontSize:13,fontWeight:800,
                  cursor:"pointer",fontFamily:"monospace",transition:"all 0.12s",
                }}>{on?"✓ ":""}{id}</button>
              );
            })}
          </div>
          <button onClick={()=>{
            const anyOn = anyEnabled;
            const newPM = {};
            Object.entries(tr.perModel).forEach(([k,v])=>{ newPM[k]={...v,enabled:!anyOn}; });
            onChange({...tr,perModel:newPM});
          }} style={{
            width:"100%",background:"none",border:`1px solid ${C.purple}44`,
            color:C.purple,borderRadius:6,padding:"5px 0",fontSize:10,fontWeight:800,cursor:"pointer",
          }}>{anyEnabled?"✕ Non-aktifkan semua":"★ Pilih semua (A+B+C)"}</button>
        </div>

        {/* Step 2: per-model → per-sub RR chips */}
        {["A","B","C"].map(modelId=>{
          const md = tr.perModel[modelId];
          if (!md?.enabled) return null;
          const subKeys = Object.keys(SUB_INFO[modelId]);
          return (
            <div key={modelId} style={{
              border:`1px solid ${C.purple}33`,borderRadius:8,
              padding:"10px 11px",marginBottom:8,background:"#060d14",
            }}>
              <div style={{color:C.purple,fontSize:12,fontWeight:800,
                fontFamily:"monospace",letterSpacing:1,marginBottom:8}}>
                Model {modelId}
              </div>
              {subKeys.map(subKey=>{
                const subInfo = SUB_INFO[modelId][subKey];
                const sub = md.subs?.[subKey] || mkSubEntry();
                const subModel = modelId==="C" ? "normal" : subKey;
                const desc = modelId==="C"
                  ? `Max geser ke +2, awal pakai Model ${subKey}`
                  : modelId==="A"
                    ? MODEL_A_SUBS.find(s=>s.id===subKey)?.desc||""
                    : MODEL_B_SUBS.find(s=>s.id===subKey)?.desc||"";
                return (
                  <div key={subKey} style={{
                    background:sub.enabled?"#080f1a":C.card,
                    border:`1px solid ${sub.enabled?C.purple+"44":C.border}`,
                    borderRadius:7,padding:"8px 10px",marginBottom:6,
                  }}>
                    <div style={{display:"flex",alignItems:"center",
                      justifyContent:"space-between",marginBottom:sub.enabled?6:0}}>
                      <button onClick={()=>updateSub(modelId,subKey,{enabled:!sub.enabled})}
                        style={{
                          background:sub.enabled?C.purple+"22":C.bg,
                          border:`1px solid ${sub.enabled?C.purple:C.border}`,
                          color:sub.enabled?C.purple:C.faint,
                          borderRadius:6,padding:"4px 12px",fontSize:11,
                          fontWeight:800,cursor:"pointer",fontFamily:"monospace",
                        }}>{sub.enabled?"✓ ":""}{subInfo.label}</button>
                      {sub.enabled&&(
                        <button onClick={()=>updateSub(modelId,subKey,{loss:!sub.loss})} style={{
                          background:sub.loss?C.red+"22":C.card,
                          border:`1px solid ${sub.loss?C.red:C.border}`,
                          color:sub.loss?C.red:C.dim,
                          borderRadius:6,padding:"3px 10px",fontSize:10,
                          fontWeight:800,cursor:"pointer",fontFamily:"monospace",
                        }}>{sub.loss?"✗ LOSS":"✗ Loss?"}</button>
                      )}
                    </div>
                    {sub.enabled&&(
                      <>
                        {desc&&<div style={{color:C.faint,fontSize:9,
                          marginBottom:5,fontStyle:"italic"}}>{desc}</div>}
                        <div style={{color:C.dim,fontSize:9,letterSpacing:1,marginBottom:4}}>
                          RR — 1x=✓Hit · 2x=✕Tidak hit→BEP
                        </div>
                        <RRChips
                          rrs={sub.rrs||{}} slPips={slPips}
                          targetRange={targetRange||""}
                          rrTimes={sub.rrTimes||{}}
                          onRRTimesChange={v=>updateSub(modelId,subKey,{rrTimes:v})}
                          dateFrom={execDateFrom}
                          isTrailing={true}
                          activeRRPresets={activeRRPresets}
                          onDeleteRRPreset={onDeleteRRPreset}
                          onAddRRPreset={onAddRRPreset}
                          onChange={newRrs=>updateSub(modelId,subKey,{rrs:newRrs})}/>
                        {sub.loss&&<div style={{color:C.red,fontSize:9,
                          marginTop:4,fontStyle:"italic"}}>
                          {subInfo.label} tidak sempat BEP → hit loss
                        </div>}
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}

        {!anyEnabled&&!tr.loss&&(
          <div style={{color:C.faint,fontSize:10,textAlign:"center",
            padding:"10px 0",fontStyle:"italic"}}>
            Pilih model untuk input RR trailing
          </div>
        )}
      </div>
    </div>
  );
});

// ─── NOTES PICKER ────────────────────────────────────────────────────────────
function NotesPicker({ notesArr, onChange, notesPresets, onAddPreset, onDeletePreset }) {
  const [input, setInput]       = useState("");
  const [confirmDel, setConfirmDel] = useState(null);
  const arr = notesArr || [];

  const toggle = (val) =>
    onChange(arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val]);

  const addNote = () => {
    const v = input.trim();
    if (!v) return;
    if (!arr.includes(v)) onChange([...arr, v]);
    if (!notesPresets.includes(v) && onAddPreset) onAddPreset(v);
    setInput("");
  };

  const nonPreset = arr.filter(n => !notesPresets.includes(n));

  return (
    <div>
      {/* Preset keterangan chips */}
      {notesPresets.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
          {notesPresets.map(preset => {
            const on = arr.includes(preset);
            const isConfirming = confirmDel === preset;
            return (
              <div key={preset} style={{display:"flex",alignItems:"center",gap:0}}>
                <button onClick={()=>{ if(isConfirming) setConfirmDel(null); else toggle(preset); }}
                  style={{
                    background: on ? C.blue+"22" : C.card,
                    border: `1px solid ${on ? C.blue : C.border}`,
                    borderRight: "none",
                    color: on ? C.blue : C.dim,
                    borderRadius:"20px 0 0 20px",
                    padding:"4px 10px",
                    fontSize:11, fontWeight:700, cursor:"pointer",
                    display:"flex",alignItems:"center",gap:5,transition:"all 0.12s",
                  }}>
                  {preset}
                  {on && <span style={{fontSize:10,opacity:0.7}}>✓</span>}
                </button>
                {isConfirming ? (
                  <button onClick={()=>{
                    if(onDeletePreset) onDeletePreset(preset);
                    onChange(arr.filter(x=>x!==preset));
                    setConfirmDel(null);
                  }} style={{
                    background:C.red+"33",border:`1px solid ${C.red}66`,
                    borderLeft:"none",color:C.red,
                    borderRadius:"0 20px 20px 0",padding:"4px 8px",
                    fontSize:10,fontWeight:800,cursor:"pointer",
                  }}>Hapus?</button>
                ) : (
                  <button onClick={()=>setConfirmDel(preset)} style={{
                    background:C.faint+"22",border:`1px solid ${C.border}`,
                    borderLeft:"none",color:C.dim,
                    borderRadius:"0 20px 20px 0",padding:"4px 7px",
                    fontSize:11,fontWeight:700,cursor:"pointer",lineHeight:1,
                  }} title="Hapus preset">×</button>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Input tambah keterangan baru (sekaligus tambah ke preset) */}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addNote()}
          placeholder="Ketik keterangan, Enter untuk tambah…"
          style={{...inpSt({padding:"6px 10px",fontSize:12,flex:1})}}/>
        <button onClick={addNote}
          style={{...chipBool(false,C.blue,true),minWidth:"auto",padding:"6px 12px",fontSize:11}}>
          + Tambah
        </button>
      </div>

      {/* Non-preset (keterangan satu kali) yang aktif */}
      {nonPreset.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
          {nonPreset.map(n=>(
            <span key={n} style={{background:C.purple+"22",border:`1px solid ${C.purple}44`,
              color:C.purple,borderRadius:20,padding:"3px 9px",fontSize:11,fontWeight:700,
              display:"flex",alignItems:"center",gap:4}}>
              {n}
              <button onClick={()=>toggle(n)}
                style={{background:"none",border:"none",color:C.purple,cursor:"pointer",
                  fontSize:13,padding:0,lineHeight:1}}>×</button>
            </span>
          ))}
        </div>
      )}

      {/* Kombinasi aktif */}
      {arr.length > 0 && (
        <div style={{marginTop:7,background:C.bg,border:`1px solid ${C.blue}33`,
          borderRadius:6,padding:"5px 10px",fontSize:11,color:C.blue,fontWeight:700}}>
          📝 {arr.join(" + ")}
        </div>
      )}
    </div>
  );
}

// ─── TAG PICKER ──────────────────────────────────────────────────────────────
function TagPicker({ tags, onChange, activeTagPresets, onDeletePreset, onAddPreset }) {
  const [custom, setCustom] = useState("");
  const [newLabel, setNewLabel] = useState("");
  const [newColor, setNewColor] = useState("#8be9fd");
  const [showAddPreset, setShowAddPreset] = useState(false);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const active = tags || [];

  const toggle = (id) =>
    onChange(active.includes(id) ? active.filter(x=>x!==id) : [...active, id]);

  // Add as one-time custom tag to this trade
  const addCustom = () => {
    const v = custom.trim().toLowerCase().replace(/\s+/g,"-");
    if (!v || active.includes(v)) return;
    onChange([...active, v]);
    setCustom("");
  };

  // Add new preset permanently
  const addPreset = () => {
    const label = newLabel.trim();
    if (!label) return;
    const id = label.toLowerCase().replace(/\s+/g,"-") + "-" + Math.random().toString(36).slice(2,5);
    onAddPreset({ id, label, color: newColor });
    setNewLabel(""); setShowAddPreset(false);
  };

  const getTag = (id) => (activeTagPresets||[]).find(t=>t.id===id) || { id, label:id, color:C.purple };

  return (
    <div>
      {/* Preset tags — built-in bisa dihapus, custom yang baru ditambah tidak bisa */}
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
        {(activeTagPresets||[]).map(tag => {
          const on = active.includes(tag.id);
          const isConfirming = confirmDeleteId === tag.id;
          // Semua preset (built-in maupun custom) bisa dihapus
          const isDeletable = !!onDeletePreset;
          return (
            <div key={tag.id} style={{display:"flex",alignItems:"center",gap:0}}>
              <button onClick={()=>{ if(isConfirming) setConfirmDeleteId(null); else toggle(tag.id); }}
                style={{
                  background: on ? tag.color+"22" : C.card,
                  border: `1px solid ${on ? tag.color : C.border}`,
                  borderRight: isDeletable ? "none" : undefined,
                  color: on ? tag.color : C.dim,
                  borderRadius: isDeletable ? "20px 0 0 20px" : 20,
                  padding: "4px 10px",
                  fontSize:11, fontWeight:700, cursor:"pointer",
                  transition:"all 0.12s", display:"flex", alignItems:"center", gap:4,
                }}>
                {tag.label}
                {on && <span style={{fontSize:10,opacity:0.7}}>✓</span>}
              </button>
              {/* Hapus permanen hanya untuk tag bawaan */}
              {isDeletable && (
                isConfirming ? (
                  <button onClick={()=>{ onDeletePreset(tag.id); setConfirmDeleteId(null); onChange(active.filter(x=>x!==tag.id)); }}
                    style={{
                      background:C.red+"33", border:`1px solid ${C.red}66`,
                      borderLeft:"none", color:C.red,
                      borderRadius:"0 20px 20px 0", padding:"4px 8px",
                      fontSize:10, fontWeight:800, cursor:"pointer",
                    }}>Hapus?</button>
                ) : (
                  <button onClick={()=>setConfirmDeleteId(tag.id)}
                    style={{
                      background: C.faint+"22", border:`1px solid ${C.border}`,
                      borderLeft:"none", color:C.dim,
                      borderRadius:"0 20px 20px 0", padding:"4px 7px",
                      fontSize:11, fontWeight:700, cursor:"pointer", lineHeight:1,
                    }} title="Hapus permanen">×</button>
                )
              )}
            </div>
          );
        })}

        {/* Tambah preset baru */}
        <button onClick={()=>setShowAddPreset(v=>!v)}
          style={{
            background: showAddPreset ? C.green+"22" : C.card,
            border:`1px dashed ${C.green}55`,
            color:C.green+"aa", borderRadius:20, padding:"4px 10px",
            fontSize:11, fontWeight:700, cursor:"pointer",
          }}>+ Preset Baru</button>
      </div>

      {/* Form tambah preset permanen */}
      {showAddPreset && (
        <div style={{background:"#0a0f1c",border:`1px solid ${C.green}33`,borderRadius:8,
          padding:"10px 12px",marginBottom:8,display:"flex",flexDirection:"column",gap:6}}>
          <div style={{color:C.green,fontSize:10,fontWeight:800,letterSpacing:1}}>+ TAMBAH PRESET PERMANEN</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input value={newLabel} onChange={e=>setNewLabel(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addPreset()}
              placeholder="Nama tag…"
              style={{...inpSt({padding:"6px 10px",fontSize:12,flex:1})}}/>
            <input type="color" value={newColor} onChange={e=>setNewColor(e.target.value)}
              style={{width:36,height:32,border:"none",background:"none",cursor:"pointer",padding:0}}/>
            <button onClick={addPreset}
              style={{...chipBool(true,C.green,true),padding:"6px 12px",fontSize:11}}>
              Simpan
            </button>
            <button onClick={()=>setShowAddPreset(false)}
              style={{background:"none",border:"none",color:C.dim,fontSize:18,cursor:"pointer",padding:"0 2px"}}>×</button>
          </div>
        </div>
      )}

      {/* Custom tag satu kali (per trade) */}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input value={custom} onChange={e=>setCustom(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addCustom()}
          placeholder="Tag kustom untuk trade ini…"
          style={{...inpSt({padding:"6px 10px",fontSize:12,flex:1})}}/>
        <button onClick={addCustom}
          style={{...chipBool(false,C.blue,true),minWidth:"auto",padding:"6px 12px",fontSize:11}}>
          + Tambah
        </button>
      </div>

      {/* Active custom tags (non-preset) */}
      {active.filter(id=>!(activeTagPresets||[]).find(t=>t.id===id)).length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
          {active.filter(id=>!(activeTagPresets||[]).find(t=>t.id===id)).map(id=>(
            <span key={id} style={{background:C.purple+"22",border:`1px solid ${C.purple}44`,
              color:C.purple,borderRadius:20,padding:"3px 9px",fontSize:11,fontWeight:700,
              display:"flex",alignItems:"center",gap:4}}>
              #{id}
              <button onClick={()=>toggle(id)}
                style={{background:"none",border:"none",color:C.purple,cursor:"pointer",
                  fontSize:13,padding:0,lineHeight:1}}>×</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

function TagBadges({ tags, max=5, activeTagPresets }) {
  if (!tags?.length) return null;
  const presets = activeTagPresets || TAG_PRESETS;
  const show = tags.slice(0, max);
  const rest = tags.length - max;
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:3,alignItems:"center"}}>
      {show.map(id=>{
        const tag = presets.find(t=>t.id===id) || TAG_PRESETS.find(t=>t.id===id) || { id, label:id, color:C.purple };
        return (
          <span key={id} style={{background:tag.color+"18",border:`1px solid ${tag.color}33`,
            color:tag.color,borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700}}>
            {tag.label}
          </span>
        );
      })}
      {rest>0 && (
        <span style={{color:C.faint,fontSize:10}}>+{rest}</span>
      )}
    </div>
  );
}
function TradeSummary({ executions }) {
  const lines = [];
  // Support both array (new) and keyed object (legacy)
  const arr = Array.isArray(executions)
    ? executions
    : EXEC_TYPES.map(et=>executions[et.id]).filter(e=>e?.used).map((e,i)=>({
        ...e, id:`legacy-${i}`, type:"market",
        typeLabel: EXEC_TYPES[i]?.label||"Eksekusi",
      }));

  arr.forEach((inst,instIdx) => {
    const slp = inst.slPips;
    const sl  = parseFloat(slp);
    const st  = inst.static || {rrs:{}};
    const trRaw = inst.trailing || {};
    const tr  = migrateTrailing(trRaw);

    const stHits = sortRR(Object.entries(st.rrs||{}).filter(([,v])=>v==="hit").map(([r])=>r));
    const stMiss = sortRR(Object.entries(st.rrs||{}).filter(([,v])=>v==="miss").map(([r])=>r));

    // Collect trailing per model+sub
    const trModelData = []; // [{subLabel, modelId, subKey, hits[], beps:[{rr,bR,bP}], loss}]
    Object.entries(tr.perModel||{}).forEach(([modelId, md])=>{
      if (!md?.enabled) return;
      Object.entries(md.subs||{}).forEach(([subKey, sub])=>{
        if (!sub?.enabled) return;
        const subModel = modelId==="C" ? "normal" : subKey;
        const subLabel = modelId==="C" ? `C(${subKey})` : `${modelId}${subKey==="max0"?" Max+0":" Nrm"}`;
        const hits = sortRR(Object.entries(sub.rrs||{}).filter(([,v])=>v==="hit").map(([r])=>r));
        const beps = sortRR(Object.entries(sub.rrs||{}).filter(([,v])=>v==="miss").map(([r])=>r)).map(rr=>{
          const bR = calcBepR(rr, modelId, subModel);
          const bP = sl>0 ? calcBepPips(rr, modelId, subModel, sl) : null;
          return { rr, bR, bP };
        });
        trModelData.push({ subLabel, modelId, subKey, hits, beps, loss:sub.loss });
      });
    });

    const hasStatic   = stHits.length>0 || stMiss.length>0;
    const hasTrailing = trModelData.length>0 || tr.loss;
    if (!hasStatic && !hasTrailing) return;

    const stConclusion = stHits.length>0 && stMiss.length>0
      ? `WIN (${stHits.join(", ")}) + LOSS (${stMiss.join(", ")})`
      : stHits.length>0 ? `WIN: ${stHits.join(", ")}`
      : stMiss.length>0 ? `LOSS: ${stMiss.join(", ")} tidak hit` : null;

    const trConclusion = hasTrailing ? { trModelData, globalLoss:tr.loss } : null;

    // Pip breakdown
    const pipRows = [];
    if (sl > 0) {
      stHits.forEach(r => pipRows.push({ rr:r, type:"win", slType:"static", pips:parseFloat(r.split(":")[1])*sl }));
      stMiss.forEach(r => pipRows.push({ rr:r, type:"loss", slType:"static", pips:-sl }));
      trModelData.forEach(({subLabel, hits, beps, loss:mLoss})=>{
        hits.forEach(r=> pipRows.push({ rr:r, type:"win", slType:"trailing", pips:parseFloat(r.split(":")[1])*sl, bepLabel:subLabel }));
        beps.forEach(({rr,bR,bP})=> pipRows.push({ rr, type:"bep", slType:"trailing", pips:bP??0, bepLabel:subLabel, bepR:bR }));
        if (mLoss) pipRows.push({ rr:null, type:"loss", slType:"trailing", pips:-sl, bepLabel:subLabel });
      });
      if (tr.loss) pipRows.push({ rr:null, type:"loss", slType:"trailing", pips:-sl });
    }

    // Pip totals
    let execWinP=0, execLossP=0, execBepMin=0, execBepMax=0, hasPips=sl>0;
    if (hasPips) {
      stHits.forEach(r=>{ execWinP += parseFloat(r.split(":")[1])*sl; });
      stMiss.forEach(()=>{ execLossP += sl; });
      trModelData.forEach(({hits, beps, loss:mLoss})=>{
        hits.forEach(r=>{ execWinP += parseFloat(r.split(":")[1])*sl; });
        if (beps.length) {
          const vals = beps.map(b=>b.bP||0);
          execBepMin += Math.min(...vals);
          execBepMax += Math.max(...vals);
        }
        if (mLoss) execLossP += sl;
      });
      if (tr.loss) execLossP += sl;
    }

    const execBepIsRange = Math.round(execBepMin)!==Math.round(execBepMax);
    const execNetMin = execWinP + execBepMin - execLossP;
    const execNetMax = execWinP + execBepMax - execLossP;

    lines.push({ execLabel:`${inst.typeLabel} #${instIdx+1}`, slp,
      stHits, stMiss, trModelData, stConclusion, trConclusion, trLoss:tr.loss,
      execWinP, execLossP, execBepMin, execBepMax, execBepIsRange,
      execNetMin, execNetMax, hasPips, pipRows });
  });

  if (!lines.length) return null;

  const totWin  = lines.reduce((a,l)=>a+l.execWinP,0);
  const totLoss = lines.reduce((a,l)=>a+l.execLossP,0);
  const totBep  = lines.reduce((a,l)=>a+l.execBepP,0);
  const hasPipsAny = lines.some(l=>l.hasPips);

  return (
    <div style={{border:`1px solid ${C.blue}33`,borderRadius:10,overflow:"hidden",marginTop:4}}>
      <div style={{background:C.blue+"15",padding:"7px 14px",
        fontSize:11,color:C.blue,fontWeight:800,letterSpacing:1.5}}>
        📋 RINGKASAN HASIL
      </div>
      <div style={{padding:"10px 14px",background:"#06090f",
        display:"flex",flexDirection:"column",gap:12}}>
        {lines.map((ln,i) => (
          <div key={i} style={{borderLeft:`2px solid ${C.blue}33`,paddingLeft:10}}>
            {/* Exec header */}
            <div style={{color:C.blue,fontWeight:800,fontSize:12,marginBottom:8,
              display:"flex",alignItems:"center",gap:8}}>
              {ln.execLabel}
              {ln.slp&&<span style={{color:C.grey,fontWeight:400,fontSize:11}}>· SL {ln.slp}p</span>}
              {ln.hasPips && (
                <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,
                  color: ln.execNetMin>=0 ? C.green : C.red,
                  fontFamily:"monospace"}}>
                  {ln.execBepIsRange
                    ? `${fmtPips(ln.execNetMin)}~${fmtPips(ln.execNetMax)}`
                    : fmtPips(ln.execNetMin)}
                </span>
              )}
            </div>

            {/* STATIC row */}
            {(ln.stHits.length>0||ln.stMiss.length>0) && (
              <div style={{marginBottom:8,background:"#080c16",borderRadius:7,padding:"8px 10px"}}>
                <div style={{color:C.grey,fontSize:10,fontWeight:800,letterSpacing:1,marginBottom:6}}>▪ STATIC</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center",marginBottom:6}}>
                  {ln.stHits.map(r=>{
                    const tp = ln.slp ? calcTP(ln.slp,r) : null;
                    const tpN = ln.slp ? parseFloat(r.split(":")[1])*parseFloat(ln.slp) : null;
                    return (
                      <span key={r} style={{background:C.green+"15",border:`1px solid ${C.green}44`,
                        color:C.green,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"monospace"}}>
                        ✓ {r}
                        {tp && <span style={{opacity:0.6,fontSize:9}}> {tp}p</span>}
                        {tpN && <span style={{opacity:0.8,fontSize:9,color:C.green,marginLeft:3}}>{fmtPips(tpN)}</span>}
                      </span>
                    );
                  })}
                  {ln.stMiss.map(r=>(
                    <span key={r} style={{background:C.yellow+"15",border:`1px solid ${C.yellow}44`,
                      color:C.yellow,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"monospace"}}>
                      ✕ {r}
                      {ln.slp && <span style={{opacity:0.7,fontSize:9,marginLeft:3}}>{fmtPips(-parseFloat(ln.slp))}</span>}
                    </span>
                  ))}
                </div>
                {ln.stConclusion && (
                  <div style={{borderTop:`1px solid #1a2030`,paddingTop:6,fontSize:11,color:C.text,fontWeight:700}}>
                    → {ln.stConclusion.includes("LOSS")&&ln.stConclusion.includes("WIN")
                        ? <><span style={{color:C.green}}>WIN</span> + <span style={{color:C.red}}>LOSS</span></>
                        : ln.stConclusion.startsWith("WIN")
                          ? <span style={{color:C.green}}>{ln.stConclusion}</span>
                          : <span style={{color:C.red}}>{ln.stConclusion}</span>}
                  </div>
                )}
              </div>
            )}

            {/* TRAILING row */}
            {(ln.trModelData?.length>0||ln.trLoss) && (
              <div style={{background:"#080c16",borderRadius:7,padding:"8px 10px"}}>
                <div style={{color:C.purple,fontSize:10,fontWeight:800,letterSpacing:1,marginBottom:6}}>▸ TRAILING</div>

                {/* Per-model results */}
                {ln.trModelData?.map(({modelId,modelLabel,hits,beps,loss:mLoss})=>(
                  <div key={modelId} style={{background:"#0a0f1c",borderRadius:6,
                    padding:"6px 9px",marginBottom:5,border:`1px solid ${C.purple}22`}}>
                    <div style={{color:C.purple,fontSize:9,fontWeight:800,letterSpacing:1,marginBottom:5}}>
                      {modelLabel}
                    </div>
                    {/* Hits */}
                    {hits.length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:4}}>
                        {hits.map(r=>{
                          const tpN = ln.slp ? parseFloat(r.split(":")[1])*parseFloat(ln.slp) : null;
                          return (
                            <span key={r} style={{background:C.green+"15",border:`1px solid ${C.green}44`,
                              color:C.green,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"monospace"}}>
                              ✓ {r}{tpN!==null&&<span style={{opacity:0.8,fontSize:9,marginLeft:3}}>{fmtPips(tpN)}</span>}
                            </span>
                          );
                        })}
                      </div>
                    )}
                    {/* BEPs */}
                    {beps.map(({rr,bR,bP})=>(
                      <div key={rr} style={{display:"flex",alignItems:"center",gap:6,
                        background:"#060910",borderRadius:5,padding:"4px 8px",marginBottom:3}}>
                        <span style={{color:C.yellow,fontSize:11,fontWeight:800,fontFamily:"monospace"}}>✕ {rr}</span>
                        <span style={{color:C.dim,fontSize:10}}>→</span>
                        <span style={{color:C.yellow,fontSize:11,fontWeight:800,fontFamily:"monospace"}}>+{bR??0}R</span>
                        {bP!==null&&(
                          <span style={{background:bP>0?C.green+"15":C.faint+"33",
                            border:`1px solid ${bP>0?C.green+"33":C.border}`,
                            color:bP>0?C.green:C.dim,
                            borderRadius:4,padding:"1px 8px",fontSize:10,fontWeight:800,fontFamily:"monospace"}}>
                            {fmtPips(bP)}
                          </span>
                        )}
                      </div>
                    ))}
                    {/* Model loss */}
                    {mLoss&&(
                      <span style={{background:C.red+"15",border:`1px solid ${C.red}44`,
                        color:C.red,borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:700,
                        display:"inline-block",marginTop:3}}>
                        ✗ LOSS
                      </span>
                    )}
                  </div>
                ))}

                {/* Global trailing loss */}
                {ln.trLoss&&(
                  <div style={{display:"flex",gap:4,marginTop:4}}>
                    <span style={{background:C.red+"15",border:`1px solid ${C.red}44`,
                      color:C.red,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                      ✗ LOSS (SL sebelum trailing jalan) {ln.slp?fmtPips(-parseFloat(ln.slp)):""}
                    </span>
                  </div>
                )}
              </div>
            )}

            {/* ── Tabel Pips per RR ── */}
            {ln.hasPips && ln.pipRows.length>0 && (
              <div style={{marginTop:7,background:"#06090f",border:`1px solid ${C.border}`,
                borderRadius:8,overflow:"hidden"}}>
                <div style={{background:"#0a0f1a",padding:"4px 10px",
                  fontSize:9,color:C.dim,fontWeight:800,letterSpacing:1.2}}>
                  RINCIAN PIPS PER RR
                </div>
                <div style={{padding:"6px 10px",display:"flex",flexDirection:"column",gap:3}}>
                  {/* Group by RR */}
                  {(() => {
                    const byRR = {};
                    ln.pipRows.forEach(row => {
                      const k = row.rr||"(global)";
                      byRR[k] = byRR[k]||[];
                      byRR[k].push(row);
                    });
                    return sortRR(Object.keys(byRR)).map(rr => (
                      <div key={rr} style={{display:"flex",alignItems:"flex-start",
                        gap:6,borderBottom:`1px solid ${C.faint}22`,paddingBottom:3}}>
                        {/* RR label */}
                        <span style={{color:C.dim,fontSize:10,fontFamily:"monospace",
                          minWidth:36,paddingTop:2,flexShrink:0}}>
                          {rr}
                        </span>
                        {/* Pip chips for this RR */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:3,flex:1}}>
                          {byRR[rr].map((row,ri) => {
                            const col  = row.type==="win"?C.green:row.type==="loss"?C.red:C.yellow;
                            const icon = row.type==="win"?"✓":row.type==="loss"?"✗":"~";
                            const val  = row.pips!==null ? fmtPips(row.pips) : "—";
                            const sublabel = row.type==="bep"
                              ? `${row.bepLabel} +${row.bepR??0}R`
                              : row.slType==="trailing"?"trailing":"static";
                            return (
                              <div key={ri} style={{background:col+"14",
                                border:`1px solid ${col}28`,
                                borderRadius:5,padding:"2px 7px",
                                display:"flex",flexDirection:"column",alignItems:"flex-start",gap:1}}>
                                <span style={{color:col,fontWeight:800,fontSize:11,
                                  fontFamily:"monospace"}}>
                                  {icon} {val}
                                </span>
                                <span style={{color:col+"88",fontSize:8,letterSpacing:0.5}}>
                                  {sublabel}
                                </span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ));
                  })()}
                </div>
              </div>
            )}
          </div>
        ))}

        {/* ── Ringkasan Count Semua Eksekusi ── */}
        {lines.length > 0 && (() => {
          // Hitung jumlah win / bep / loss dari semua pipRows
          let cWin=0, cBep=0, cLoss=0;
          lines.forEach(ln => {
            // Hitung per-RR unik (bukan per model BEP)
            const seenRR = new Set();
            ln.pipRows.forEach(row => {
              const key = `${row.rr||"g"}-${row.type}-${row.slType}`;
              if (row.type==="win" && !seenRR.has(key))  { cWin++;  seenRR.add(key); }
              if (row.type==="loss"&& !seenRR.has(key))  { cLoss++; seenRR.add(key); }
              if (row.type==="bep" && !seenRR.has(`${row.rr||"g"}-bep`)) {
                cBep++; seenRR.add(`${row.rr||"g"}-bep`);
              }
            });
          });
          const total = cWin + cBep + cLoss;
          if (total === 0) return null;
          return (
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:2}}>
              <div style={{color:C.dim,fontSize:9,fontWeight:800,letterSpacing:1.2,marginBottom:8}}>
                TOTAL SEMUA EKSEKUSI
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                {cWin>0&&(
                  <div style={{background:C.green+"15",border:`1px solid ${C.green}33`,
                    borderRadius:8,padding:"6px 14px",display:"flex",flexDirection:"column",
                    alignItems:"center",gap:1}}>
                    <span style={{color:C.green,fontSize:22,fontWeight:900,fontFamily:"monospace",lineHeight:1}}>{cWin}</span>
                    <span style={{color:C.green+"99",fontSize:9,fontWeight:700,letterSpacing:1}}>WIN</span>
                  </div>
                )}
                {cBep>0&&(
                  <div style={{background:C.yellow+"15",border:`1px solid ${C.yellow}33`,
                    borderRadius:8,padding:"6px 14px",display:"flex",flexDirection:"column",
                    alignItems:"center",gap:1}}>
                    <span style={{color:C.yellow,fontSize:22,fontWeight:900,fontFamily:"monospace",lineHeight:1}}>{cBep}</span>
                    <span style={{color:C.yellow+"99",fontSize:9,fontWeight:700,letterSpacing:1}}>BEP</span>
                  </div>
                )}
                {cLoss>0&&(
                  <div style={{background:C.red+"15",border:`1px solid ${C.red}33`,
                    borderRadius:8,padding:"6px 14px",display:"flex",flexDirection:"column",
                    alignItems:"center",gap:1}}>
                    <span style={{color:C.red,fontSize:22,fontWeight:900,fontFamily:"monospace",lineHeight:1}}>{cLoss}</span>
                    <span style={{color:C.red+"99",fontSize:9,fontWeight:700,letterSpacing:1}}>LOSS</span>
                  </div>
                )}
                <span style={{color:C.faint,fontSize:10,marginLeft:2}}>dari {total} outcome</span>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// ─── EXEC INSTANCE PANEL ──────────────────────────────────────────────────────
function ExecPanel({ inst, idx, total, onChange, onRemove,
  activeRRPresets, onDeleteRRPreset, onAddRRPreset }) {
  const upd = (k,v) => onChange({...inst,[k]:v});

  // Compute effective exit time = last close time from any RR (static or trailing)
  const getLastRRCloseTime = (inst) => {
    const times = [];
    // Collect from static
    const stTimes = inst.static?.rrTimes || {};
    Object.values(stTimes).forEach(t => { if(t) times.push(t); });
    // Collect from trailing per-model subs
    const tr = migrateTrailing(inst.trailing);
    Object.values(tr.perModel||{}).forEach(md => {
      if (!md?.enabled) return;
      Object.values(md.subs||{}).forEach(sub => {
        if (!sub?.enabled) return;
        Object.values(sub.rrTimes||{}).forEach(t => { if(t) times.push(t); });
      });
    });
    if (!times.length) return null;
    return times.sort().slice(-1)[0]; // latest
  };

  const setDT = (k,v) => {
    const n = {...inst,[k]:v};
    if (k==="dateFrom") {
      n.sessionsEntry = detectSessions(v);
      // Recompute holdingMins from lastRRClose or fallback
      const exitT = getLastRRCloseTime(n);
      n.holdingMins = holdMins(v, exitT||v);
    }
    onChange(n);
  };

  // Auto-update holdingMins and exit sessions when rrTimes change
  const updWithRRTimes = (newInst) => {
    const exitT = getLastRRCloseTime(newInst);
    if (exitT) {
      newInst.sessionsExit = detectSessions(exitT);
      newInst.holdingMins  = holdMins(newInst.dateFrom, exitT);
    }
    onChange(newInst);
  };

  const updStatic = (v) => {
    const n = {...inst, static: v};
    updWithRRTimes(n);
  };

  const updTrailing = (v) => {
    const n = {...inst, trailing: v};
    updWithRRTimes(n);
  };

  const mkSessBtns = (key, color, arr) => (
    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
      {SESSIONS.map(s=>{
        const active = arr.includes(s);
        const isOvlp = arr.length > 1;
        return (
          <button key={s} onClick={()=>{
            const cur = inst[key]||[];
            upd(key, cur.includes(s)?cur.filter(x=>x!==s):[...cur,s]);
          }} style={{
            background: active?(isOvlp?C.yellow+"22":C.blue+"22"):C.card,
            border:`1px solid ${active?(isOvlp?C.yellow:C.blue):C.border}`,
            color: active?(isOvlp?C.yellow:C.blue):C.faint,
            borderRadius:6,padding:"4px 9px",fontSize:10,fontWeight:700,
            cursor:"pointer",fontFamily:"monospace",
          }}>{s}</button>
        );
      })}
    </div>
  );

  const entryArr = inst.sessionsEntry||[];
  const exitArr  = inst.sessionsExit||[];
  const entryLabel = getSessionLabel(entryArr);
  const exitLabel  = getSessionLabel(exitArr);

  return (
    <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:10}}>
      {/* Header */}
      <div style={{background:C.card,padding:"9px 14px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:C.blue,fontWeight:800,fontSize:13}}>{inst.typeLabel}</span>
          <span style={{color:C.faint,fontSize:10}}>#{idx+1}</span>
        </div>
        {total > 1 && (
          <button onClick={onRemove}
            style={{background:"none",border:`1px solid ${C.red}33`,color:C.red,
              borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",fontWeight:700}}>
            Hapus
          </button>
        )}
      </div>

      <div style={{padding:12,background:C.panel,display:"flex",flexDirection:"column",gap:10}}>

        {/* Entry datetime only — exit computed from RR close times */}
        <div>
          <label style={{...LBL,fontSize:9,marginBottom:5}}>WAKTU ENTRY</label>
          <input type="datetime-local" value={inst.dateFrom}
            onChange={e=>setDT("dateFrom",e.target.value)}
            style={{...inpSt({padding:"6px 8px",fontSize:12,width:"100%"})}}/>
          {/* Duration + exit summary — auto from RR close times */}
          {(() => {
            const exitT = getLastRRCloseTime(inst);
            const mins  = exitT ? holdMins(inst.dateFrom, exitT) : inst.holdingMins || 0;
            return (
              <div style={{marginTop:6,background:C.bg,border:`1px solid ${C.border}`,
                borderRadius:6,padding:"7px 11px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{color:C.yellow,fontWeight:800,fontFamily:"monospace",fontSize:13}}>
                  ⏱ {mins > 0 ? fmtDuration(mins) : "—"}
                </span>
                {exitT
                  ? <span style={{color:C.faint,fontSize:9}}>
                      {fmtDT(inst.dateFrom)} → {fmtDT(exitT)}
                      <span style={{color:C.green,marginLeft:6,fontWeight:700}}>✓ dari close RR</span>
                    </span>
                  : <span style={{color:C.faint,fontSize:9,fontStyle:"italic"}}>
                      durasi otomatis dari close time RR (⏱ di tiap chip RR)
                    </span>
                }
              </div>
            );
          })()}
        </div>

        {/* Sessions per instance */}
        <div>
          <label style={{...LBL,fontSize:9,marginBottom:5}}>
            SESI
            <span style={{color:C.faint,fontSize:9,fontWeight:400,marginLeft:6,letterSpacing:0}}>
              otomatis · ketuk koreksi
            </span>
          </label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div>
              <label style={{...LBL,fontSize:8,marginBottom:3}}>ENTRY</label>
              {mkSessBtns("sessionsEntry",C.blue,entryArr)}
              {entryLabel && (
                <div style={{marginTop:4,background:entryArr.length>1?C.yellow+"15":C.blue+"15",
                  border:`1px solid ${entryArr.length>1?C.yellow+"33":C.blue+"33"}`,
                  borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:700,
                  color:entryArr.length>1?C.yellow:C.blue}}>
                  {entryArr.length>1?"⚡ ":"🕐 "}{entryLabel}
                </div>
              )}
            </div>
            <div>
              <label style={{...LBL,fontSize:8,marginBottom:3}}>EXIT</label>
              {mkSessBtns("sessionsExit",C.purple,exitArr)}
              {exitLabel && (
                <div style={{marginTop:4,background:exitArr.length>1?C.yellow+"15":C.purple+"15",
                  border:`1px solid ${exitArr.length>1?C.yellow+"33":C.purple+"33"}`,
                  borderRadius:5,padding:"3px 8px",fontSize:10,fontWeight:700,
                  color:exitArr.length>1?C.yellow:C.purple}}>
                  {exitArr.length>1?"⚡ ":"🕐 "}{exitLabel}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* SL Pips */}
        <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",flex:"0 0 auto"}}>
            <span style={{...LBL,marginBottom:0,minWidth:54}}>SL PIPS</span>
            <input type="number" value={inst.slPips}
              onChange={e=>upd("slPips",e.target.value)}
              placeholder="cth: 150"
              style={{...inpSt({width:110,padding:"7px 10px"})}}/>
            {inst.slPips && (
              <span style={{color:C.dim,fontSize:11}}>
                SL=<span style={{color:C.red,fontWeight:800}}>{inst.slPips}</span>p
                &nbsp;·&nbsp;klik RR → TP otomatis
              </span>
            )}
          </div>
          {/* Keterangan SL */}
          <div style={{flex:1,minWidth:140}}>
            <label style={{...LBL,fontSize:8,marginBottom:4,color:C.red+"cc"}}>
              📝 KETERANGAN SL
            </label>
            <input
              value={inst.slNotes||""}
              onChange={e=>upd("slNotes",e.target.value)}
              placeholder="cth: SL di bawah OB, level struktur..."
              style={{...inpSt({
                width:"100%",padding:"7px 10px",fontSize:12,
                borderColor: inst.slNotes ? C.red+"55" : C.border,
              })}}/>
          </div>
        </div>

        {/* ── Target Range — above SL sections ── */}
        <div style={{
          background:"#050912", border:`1px solid ${C.yellow}44`,
          borderRadius:9, padding:"10px 13px",
        }}>
          <div style={{color:C.yellow, fontSize:9, letterSpacing:1.5, fontWeight:700, marginBottom:7}}>
            🎯 TARGET RANGE (MAX TP)
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap"}}>
            {/* Target input */}
            <div style={{flex:"0 0 auto"}}>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{color:C.faint,fontSize:13,fontFamily:"monospace",fontWeight:700}}>1 :</span>
                  <input
                    value={(inst.targetRange||"").replace(/^1:/,"")}
                    onChange={e => {
                      const v = e.target.value.replace(",",".");
                      upd("targetRange", v ? `1:${v}` : "");
                    }}
                    placeholder="misal: 5  atau  2.5"
                    style={{...inpSt({padding:"7px 10px", width:120, fontSize:13})}}/>
                </div>
                {(() => {
                  const gen = genRRFromTarget(inst.targetRange||"");
                  if (!gen.length) return (
                    <span style={{color:C.faint,fontSize:10,fontStyle:"italic"}}>
                      Isi angka → RR otomatis muncul (1:1 s/d target)
                    </span>
                  );
                  return (
                    <span style={{color:C.yellow,fontSize:10,fontWeight:700}}>
                      {gen.length} level: {gen.slice(0,5).join("  ")}{gen.length>5?`  … ${gen.slice(-1)[0]}`:""}
                    </span>
                  );
                })()}
              </div>
            </div>
            {/* Keterangan Target Range */}
            <div style={{flex:1,minWidth:140}}>
              <label style={{...LBL,fontSize:8,marginBottom:4,color:C.yellow+"cc"}}>
                📝 KETERANGAN TARGET
              </label>
              <input
                value={inst.targetNotes||""}
                onChange={e=>upd("targetNotes",e.target.value)}
                placeholder="cth: resistance H4, level psikologis..."
                style={{...inpSt({
                  width:"100%",padding:"7px 10px",fontSize:12,
                  borderColor: inst.targetNotes ? C.yellow+"55" : C.border,
                  background:"#080c18",
                })}}/>
            </div>
          </div>
        </div>

        {/* SL Static */}
        <SLSection title="▪  SL STATIC" color={C.grey}
          slPips={inst.slPips}
          data={inst.static||mkStatic()}
          isTrailing={false}
          targetRange={inst.targetRange||""}
          execDateFrom={inst.dateFrom}
          onChange={updStatic}
          activeRRPresets={activeRRPresets}
          onDeleteRRPreset={onDeleteRRPreset}
