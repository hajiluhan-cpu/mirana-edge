          onAddRRPreset={onAddRRPreset}/>

        {/* SL Trailing */}
        <SLSection title="▸  SL TRAILING" color={C.purple}
          slPips={inst.slPips}
          data={migrateTrailing(inst.trailing)}
          isTrailing={true}
          targetRange={inst.targetRange||""}
          execDateFrom={inst.dateFrom}
          onChange={updTrailing}
          activeRRPresets={activeRRPresets}
          onDeleteRRPreset={onDeleteRRPreset}
          onAddRRPreset={onAddRRPreset}/>
      </div>
    </div>
  );
}

// ─── TRADE MODAL ─────────────────────────────────────────────────────────────
function TradeModal({ initial, onSave, onClose,
  activeTagPresets, activeRRPresets,
  onDeleteTagPreset, onAddTagPreset,
  onDeleteRRPreset, onAddRRPreset,
  notesPresets, onAddNotesPreset, onDeleteNotesPreset,
  pairFavs, setPairFavs }) {
  const [t, setT] = useState(() => {
    if (!initial) return mkTrade();
    const base = { ...mkTrade(), ...initial };

    // ── Migration: old object executions → new array ──
    if (!Array.isArray(base.executions)) {
      const oldObj = base.executions || {};
      const arr = [];
      EXEC_TYPES.forEach(et => {
        const ex = oldObj[et.id];
        if (!ex?.used) return;
        // migrate trailing structure
        let trailing = migrateTrailing(ex.trailing);
        // migrate static
        let st = ex.static || mkStatic();
        if (!st.rrs) {
          const newRrs = {};
          Object.keys(st.wins||{}).forEach(r=>{ if(st.wins[r]) newRrs[r]="hit"; });
          st = { rrs:newRrs, loss:st.loss||false };
        }
        arr.push({
          id: crypto.randomUUID(),
          type: et.id, typeLabel: et.label,
          dateFrom: base.dateFrom||nowDT(),
          holdingMins: base.holdingMins||0,
          sessionsEntry: base.sessionsEntry||[],
          sessionsExit:  base.sessionsExit||[],
          slPips: ex.slPips||"",
          targetRange: ex.targetRange||"",
          rrTimes: ex.rrTimes||{},
          static: st, trailing,
        });
      });
      base.executions = arr;
    } else {
      // ensure fields exist on each instance
      base.executions = base.executions.map(inst => ({
        ...mkExecInstance(inst.type||"market"),
        ...inst,
        static:   inst.static   || mkStatic(),
        trailing: migrateTrailing(inst.trailing),
        targetRange:  inst.targetRange  || "",
        slNotes:      inst.slNotes      || "",
        targetNotes:  inst.targetNotes  || "",
        rrTimes:      inst.rrTimes      || {},
      }));
    }
    // migrate notes string → notesArr
    if (!Array.isArray(base.notesArr) || base.notesArr.length === 0) {
      if (base.notes && base.notes.trim()) {
        base.notesArr = base.notes.split(" + ").map(n=>n.trim()).filter(Boolean);
      } else {
        base.notesArr = [];
      }
    }
    return base;
  });

  const set = (k,v) => setT(p=>({...p,[k]:v}));

  // ── exec array helpers ──
  const updateExec = (id, patch) =>
    setT(p=>({...p, executions: p.executions.map(e=>e.id===id?{...e,...patch}:e)}));
  const removeExec = (id) =>
    setT(p=>({...p, executions: p.executions.filter(e=>e.id!==id)}));
  const addExec = (type) =>
    setT(p=>({...p, executions:[...p.executions, mkExecInstance(type)]}));

  const valid = t.pair.trim() !== "";
  const span = tradeSpan(t.executions);

  return (
    <div style={{position:"fixed",inset:0,background:"#000b",
      display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,
        borderRadius:"14px 14px 0 0",width:"100%",maxWidth:620,
        maxHeight:"93vh",overflowY:"auto",boxShadow:"0 -24px 60px #000d"}}>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"13px 18px",borderBottom:`1px solid ${C.border}`,
          position:"sticky",top:0,background:C.panel,zIndex:10}}>
          <span style={{fontWeight:900,fontSize:15,color:C.text}}>
            {initial?"Edit Trade":"Input Trade Baru"}
          </span>
          <button onClick={onClose}
            style={{background:"none",border:"none",color:C.dim,fontSize:22,cursor:"pointer"}}>×</button>
        </div>

        <div style={{padding:18,display:"flex",flexDirection:"column",gap:14}}>
          {/* Pair + Direction */}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {/* Pair picker */}
            <div>
              <label style={LBL}>Pair</label>
              {/* Favorite chips */}
              {pairFavs.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                  {pairFavs.map(p=>{
                    const [showDel,setShowDel] = [null,null]; // handled inline
                    const isSelected = t.pair===p;
                    return (
                      <div key={p} style={{display:"flex",alignItems:"stretch",
                        borderRadius:6,overflow:"hidden",
                        border:`1px solid ${isSelected?C.blue:C.border}`}}>
                        <button onClick={()=>set("pair",isSelected?"":p)} style={{
                          background:isSelected?C.blue+"22":C.bg,
                          border:"none",color:isSelected?C.blue:C.dim,
                          padding:"5px 10px",fontSize:12,fontWeight:isSelected?800:500,
                          cursor:"pointer",fontFamily:"monospace",letterSpacing:0.5,
                        }}>{p}</button>
                        <button onClick={()=>setPairFavs(prev=>prev.filter(x=>x!==p))}
                          style={{background:"none",border:"none",borderLeft:`1px solid ${C.border}33`,
                            color:C.faint,padding:"5px 7px",fontSize:12,cursor:"pointer",lineHeight:1}}
                          title="Hapus dari favorit">×</button>
                      </div>
                    );
                  })}
                </div>
              )}
              {/* Text input + add to fav */}
              <div style={{display:"flex",gap:6}}>
                <input
                  defaultValue={t.pair}
                  onChange={e=>{
                    const v=e.target.value.toUpperCase();
                    e.target.value=v;
                    clearTimeout(window._pairTimer);
                    window._pairTimer=setTimeout(()=>set("pair",v),120);
                  }}
                  onBlur={e=>set("pair",e.target.value.toUpperCase())}
                  placeholder="Ketik pair… (XAUUSD, GBPJPY…)"
                  style={{...inpSt({padding:"9px 12px",fontSize:14,flex:1,fontWeight:700,letterSpacing:1})}}/>
                {t.pair && !pairFavs.includes(t.pair) && (
                  <button onClick={()=>setPairFavs(prev=>[...new Set([...prev,t.pair])])}
                    style={{background:C.yellow+"22",border:`1px solid ${C.yellow}55`,
                      color:C.yellow,borderRadius:7,padding:"0 12px",
                      fontSize:11,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                    ★ Favorit
                  </button>
                )}
              </div>
              {pairFavs.length===0&&(
                <div style={{color:C.faint,fontSize:10,marginTop:4,fontStyle:"italic"}}>
                  Ketik pair lalu tap ★ untuk simpan ke favorit
                </div>
              )}
            </div>
            {/* Direction */}
            <div><label style={LBL}>Arah</label>
              <Sel value={t.direction} onChange={v=>set("direction",v)} options={DIRECTIONS}/></div>
          </div>

          {/* Entry type */}
          <div>
            <label style={LBL}>Tipe Entry</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {ENTRY_TYPES.map(et=>(
                <button key={et.value} onClick={()=>set("entryType",et.value)}
                  style={{...chipBool(t.entryType===et.value,C.blue),flex:1,fontSize:12,padding:"9px 12px"}}>
                  {t.entryType===et.value?"✓ ":""}{et.label}
                </button>
              ))}
            </div>
          </div>

          {/* Notes */}
          <div>
            <label style={LBL}>
              Keterangan
              <span style={{color:C.faint,fontSize:9,fontWeight:400,marginLeft:8,letterSpacing:0}}>
                pilih atau ketik, bisa beberapa sekaligus
              </span>
            </label>
            <NotesPicker
              notesArr={t.notesArr||[]}
              onChange={arr=>setT(p=>({...p, notesArr:arr, notes:arr.join(" + ")}))}
              notesPresets={notesPresets||[]}
              onAddPreset={onAddNotesPreset}
              onDeletePreset={onDeleteNotesPreset}/>
          </div>

          {/* Tags */}
          <div>
            <label style={LBL}>
              Tag / Kondisi
              <span style={{color:C.faint,fontSize:9,fontWeight:400,marginLeft:8,letterSpacing:0}}>
                untuk filter di rekap
              </span>
            </label>
            <TagPicker tags={t.tags||[]} onChange={v=>set("tags",v)}
              activeTagPresets={activeTagPresets}
              onDeletePreset={onDeleteTagPreset}
              onAddPreset={onAddTagPreset}/>
          </div>

          {/* Executions (array) */}
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <label style={{...LBL,marginBottom:0}}>Model Eksekusi</label>
              {t.executions.length>0 && (
                <div style={{color:C.dim,fontSize:11,fontFamily:"monospace"}}>
                  Span: <span style={{color:C.yellow}}>
                    {fmtDT(span.dateFrom)} → {fmtDT(span.dateTo)}
                  </span>
                  {" "}<span style={{color:C.faint}}>({fmtDuration(span.holdingMins)})</span>
                </div>
              )}
            </div>
            {t.executions.length===0 && (
              <div style={{background:C.bg,border:`1px dashed ${C.border}`,
                borderRadius:8,padding:"16px",textAlign:"center",
                color:C.faint,fontSize:12,marginBottom:10}}>
                Belum ada eksekusi — tambahkan di bawah
              </div>
            )}
            {t.executions.map((inst,i)=>(
              <ExecPanel key={inst.id} inst={inst} idx={i}
                total={t.executions.length}
                onChange={patch=>updateExec(inst.id,patch)}
                onRemove={()=>removeExec(inst.id)}
                activeRRPresets={activeRRPresets}
                onDeleteRRPreset={onDeleteRRPreset}
                onAddRRPreset={onAddRRPreset}/>
            ))}
            {/* Add buttons */}
            <div style={{background:C.bg,border:`1px solid ${C.border}`,
              borderRadius:9,padding:"10px 12px"}}>
              <div style={{color:C.dim,fontSize:9,letterSpacing:1.2,marginBottom:7}}>
                + TAMBAH EKSEKUSI
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {EXEC_TYPES.map(et=>(
                  <button key={et.id} onClick={()=>addExec(et.id)}
                    style={{background:C.card,border:`1px dashed ${C.blue}55`,
                      color:C.blue,borderRadius:7,padding:"6px 14px",
                      fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"monospace"}}>
                    + {et.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Summary */}
          {t.executions.length > 0 && <TradeSummary executions={t.executions}/>}

          {/* Actions */}
          <div style={{display:"flex",gap:10,paddingTop:8,
            borderTop:`1px solid ${C.border}`,flexDirection:"column"}}>
            {!valid && (
              <div style={{background:"#1a0a10",border:`1px solid ${C.red}44`,
                borderRadius:7,padding:"7px 12px",fontSize:11,color:C.red,textAlign:"center"}}>
                ⚠ Isi kolom <strong>Pair</strong> dulu untuk bisa simpan
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button onClick={onClose}
                style={{flex:1,background:"none",border:`1px solid ${C.border}`,
                  color:C.dim,padding:12,borderRadius:8,cursor:"pointer",
                  fontSize:14,fontFamily:"inherit"}}>Batal</button>
              <button onClick={()=>valid&&onSave(t)} disabled={!valid}
                style={{flex:2,background:valid?C.blue:"#1a1f28",border:"none",
                  color:valid?C.bg:C.faint,padding:12,borderRadius:8,
                  cursor:valid?"pointer":"not-allowed",fontSize:14,
                  fontWeight:800,fontFamily:"inherit"}}>
                {valid?"Simpan Trade":"Isi Pair dulu…"}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── TRADE CARD ───────────────────────────────────────────────────────────────
const TradeCard = React.memo(function TradeCard({ trade, onEdit, onDelete, activeTagPresets, onArchive, onMoveFolder, onRemoveFolder }) {
  const [open, setOpen] = useState(false);
  const execArr = Array.isArray(trade.executions) ? trade.executions : [];

  let wins=0, beps=0, losses=0;
  execArr.forEach(inst => {
    const st = inst.static   || {rrs:{}};
    const trRaw = inst.trailing || {};
    const tr = migrateTrailing(trRaw);
    wins += Object.values(st.rrs||{}).filter(v=>v==="hit").length;
    Object.values(tr.perModel||{}).forEach(md=>{
      if (!md?.enabled) return;
      Object.values(md.subs||{}).forEach(sub=>{
        if (!sub?.enabled) return;
        wins += Object.values(sub.rrs||{}).filter(v=>v==="hit").length;
        beps += Object.values(sub.rrs||{}).filter(v=>v==="miss").length;
        if (sub.loss) losses++;
      });
    });
    if (Object.values(st.rrs||{}).some(v=>v==="miss")) losses++;
    if (tr.loss) losses++;
  });

  const { hasData, netMin, netMax, isRange } = calcExecPips(execArr);

  // Overall span from all exec instances
  const span = tradeSpan(execArr);
  // For legacy trades that still have top-level dateFrom/dateTo
  const displayFrom = span.dateFrom || trade.dateFrom;
  const displayTo   = span.dateTo   || trade.dateTo;
  const displayHold = span.holdingMins || trade.holdingMins || (trade.holdingDays||0)*1440;

  // Aggregate sessions across all instances (entry = first exec, exit = last exec)
  const firstExec = execArr[0];
  const lastExec  = execArr[execArr.length-1];
  const sessEntry = firstExec?.sessionsEntry || trade.sessionsEntry || [];
  const sessExit  = lastExec?.sessionsExit   || trade.sessionsExit  || [];
  const holdLabel = fmtDuration(displayHold);

  return (
    <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:8}}>
      <div onClick={()=>setOpen(!open)}
        style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
          background:C.card,cursor:"pointer",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontFamily:"monospace",fontWeight:900,fontSize:15,
              color:C.text}}>{trade.pair||"—"}</span>
            <Pill label={trade.direction} color={trade.direction==="Buy"?C.green:C.red}/>
            <Pill label={trade.entryType==="stop"?"STOP":"LIMIT"} color={C.blue}/>
            {/* Show execution type pills (deduplicated with count) */}
            {(() => {
              const counts = {};
              execArr.forEach(e=>{ counts[e.type]=(counts[e.type]||0)+1; });
              return Object.entries(counts).map(([type,cnt])=>{
                const et = EXEC_TYPES.find(e=>e.id===type);
                return <Pill key={type} label={cnt>1?`${et?.short}×${cnt}`:et?.short||type} color={C.grey}/>;
              });
            })()}
          </div>
          {/* Tags row */}
          {(trade.tags?.length>0) && (
            <div style={{marginTop:4,display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
              {trade.tags.map(id=>{
                const allPresets = [...(activeTagPresets||[]), ...TAG_PRESETS];
                const tag = allPresets.find(t=>t.id===id)||{id,label:id,color:C.purple};
                return (
                  <span key={id} style={{background:tag.color+"18",border:`1px solid ${tag.color}33`,
                    color:tag.color,borderRadius:20,padding:"2px 6px 2px 9px",fontSize:10,
                    fontWeight:700,display:"inline-flex",alignItems:"center",gap:4}}>
                    {tag.label}
                    <button onClick={e=>{
                      e.stopPropagation();
                      onEdit({...trade, tags:(trade.tags||[]).filter(t=>t!==id)});
                    }} style={{background:tag.color+"30",border:"none",color:tag.color,
                      borderRadius:"50%",width:13,height:13,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:9,lineHeight:1,padding:0,flexShrink:0}}>×</button>
                  </span>
                );
              })}
            </div>
          )}
          <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{color:"#3a4a5a",fontSize:11,fontFamily:"monospace"}}>{fmtDT(displayFrom)}</span>
            {sessEntry.length>0 && (() => {
              const label = getSessionLabel(sessEntry);
              const isOvlp = sessEntry.length>1;
              return <span style={{background:isOvlp?"#f5c84218":"#d8dde618",
                border:`1px solid ${isOvlp?"#f5c84233":"#d8dde633"}`,
                color:isOvlp?"#f5c842":"#d8dde6",borderRadius:5,padding:"1px 6px",
                fontSize:10,fontWeight:700}}>
                {isOvlp?"⚡ ":""}{label}
              </span>;
            })()}
            <span style={{color:C.faint}}>→</span>
            <span style={{color:"#3a4a5a",fontSize:11,fontFamily:"monospace"}}>{fmtDT(displayTo)}</span>
            {sessExit.length>0 && (() => {
              const label = getSessionLabel(sessExit);
              const isOvlp = sessExit.length>1;
              return <span style={{background:isOvlp?"#f5c84218":"#8a9aaa18",
                border:`1px solid ${isOvlp?"#f5c84233":"#8a9aaa33"}`,
                color:isOvlp?"#f5c842":"#8a9aaa",borderRadius:5,padding:"1px 6px",
                fontSize:10,fontWeight:700}}>
                {isOvlp?"⚡ ":""}{label}
              </span>;
            })()}
            <span style={{background:C.yellow+"14",border:`1px solid ${C.yellow}28`,
              color:C.yellow,borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:700}}>
              ⏱{holdLabel}
            </span>
          </div>
        </div>

        {/* Right: outcome counts + chevron */}
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {wins>0   && <span style={{color:C.green, fontSize:12,fontWeight:800}}>✓{wins}</span>}
          {beps>0   && <span style={{color:C.yellow,fontSize:12,fontWeight:800}}>~{beps}</span>}
          {losses>0 && <span style={{color:C.red,   fontSize:12,fontWeight:800}}>✗{losses}</span>}
          <span style={{color:C.faint,fontSize:13}}>{open?"▲":"▼"}</span>
        </div>
      </div>

      {open && (
        <div style={{background:C.panel,padding:"12px 14px"}}>
          {trade.notes && (
            <div style={{color:"#4a5a6a",fontSize:12,fontStyle:"italic",marginBottom:10}}>
              📝 {trade.notes}
            </div>
          )}
          {execArr.length===0
            ? <div style={{color:C.faint,fontSize:12}}>Tidak ada eksekusi tercatat</div>
            : <>
                {execArr.map((inst,instIdx) => {
                  const st  = inst.static   || mkStatic();
                  const trRaw3 = inst.trailing || {};
                  const tr  = migrateTrailing(trRaw3);
                  const stRRs = st.rrs||{};
                  const trSubs = []; // flat list of {subLabel, modelId, subKey, sub}
                  Object.entries(tr.perModel||{}).forEach(([modelId,md])=>{
                    if (!md?.enabled) return;
                    Object.entries(md.subs||{}).forEach(([subKey,sub])=>{
                      if (!sub?.enabled) return;
                      const subLabel = modelId==="C" ? `C(${subKey})` : `${modelId}${subKey==="max0"?" Max+0":" Nrm"}`;
                      const subModel = modelId==="C" ? "normal" : subKey;
                      trSubs.push({subLabel, modelId, subKey, subModel, sub});
                    });
                  });

                  const Tag = ({rr,state,slp}) => {
                    const tp = state==="hit"&&slp ? calcTP(slp,rr) : null;
                    const col = state==="hit" ? C.green : C.yellow;
                    const ic  = state==="hit" ? "✓" : "✕";
                    return (
                      <span style={{background:col+"15",border:`1px solid ${col}33`,
                        color:col,borderRadius:5,padding:"2px 8px",
                        fontSize:11,fontWeight:700,fontFamily:"monospace"}}>
                        {ic} {rr}{tp?<span style={{opacity:0.6,fontSize:9}}> {tp}p</span>:""}
                      </span>
                    );
                  };

                  const SecRow = ({label,children}) => (
                    <div style={{display:"grid",gridTemplateColumns:"60px 1fr",
                      gap:8,alignItems:"flex-start",marginBottom:6}}>
                      <span style={{color:C.dim,fontSize:10,fontWeight:800,
                        textAlign:"right",paddingTop:3}}>{label}</span>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{children}</div>
                    </div>
                  );

                  // Per-instance datetime display
                  const instSessEntry = inst.sessionsEntry||[];
                  const instSessExit  = inst.sessionsExit||[];

                  return (
                    <div key={inst.id} style={{marginBottom:12,
                      borderLeft:`2px solid ${C.blue}33`,paddingLeft:10}}>
                      {/* Instance header */}
                      <div style={{display:"flex",gap:7,alignItems:"center",
                        marginBottom:6,flexWrap:"wrap"}}>
                        <span style={{color:C.blue,fontWeight:800,fontSize:12}}>
                          {inst.typeLabel} #{instIdx+1}
                        </span>
                        {inst.slPips && <Pill label={`SL ${inst.slPips}p`} color="#4a6a8a"/>}
                      </div>

                      {/* Instance datetime + sessions */}
                      <div style={{background:"#06090f",border:`1px solid ${C.border}`,
                        borderRadius:7,padding:"6px 10px",marginBottom:7,
                        display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{color:"#3a4a5a",fontSize:10,fontFamily:"monospace"}}>
                          {fmtDT(inst.dateFrom)}
                        </span>
                        {instSessEntry.length>0 && (
                          <span style={{background:instSessEntry.length>1?C.yellow+"18":C.blue+"18",
                            border:`1px solid ${instSessEntry.length>1?C.yellow+"33":C.blue+"33"}`,
                            color:instSessEntry.length>1?C.yellow:C.blue,
                            borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:700}}>
                            {instSessEntry.length>1?"⚡ ":""}{getSessionLabel(instSessEntry)}
                          </span>
                        )}
                        <span style={{color:C.faint,fontSize:11}}>→</span>
                        <span style={{color:"#3a4a5a",fontSize:10,fontFamily:"monospace"}}>
                          {fmtDT(inst.dateTo)}
                        </span>
                        {instSessExit.length>0 && (
                          <span style={{background:instSessExit.length>1?C.yellow+"18":C.purple+"18",
                            border:`1px solid ${instSessExit.length>1?C.yellow+"33":C.purple+"33"}`,
                            color:instSessExit.length>1?C.yellow:C.purple,
                            borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:700}}>
                            {instSessExit.length>1?"⚡ ":""}{getSessionLabel(instSessExit)}
                          </span>
                        )}
                        <span style={{color:C.yellow,fontSize:10,fontWeight:700,fontFamily:"monospace"}}>
                          ⏱{fmtDuration(inst.holdingMins||0)}
                        </span>
                      </div>

                      {/* Static */}
                      <div style={{border:`1px solid ${C.grey}28`,borderRadius:7,
                        overflow:"hidden",marginBottom:6}}>
                        <div style={{background:C.grey+"15",padding:"4px 10px",
                          fontSize:10,color:C.grey,fontWeight:800,letterSpacing:1}}>▪ STATIC</div>
                        <div style={{padding:"8px 10px",background:"#060a10"}}>
                          <SecRow label="RR">
                            {Object.keys(stRRs).length===0
                              ? <span style={{color:C.faint,fontSize:11}}>—</span>
                              : sortRR(Object.keys(stRRs)).map(r=>(
                                  <Tag key={r} rr={r} state={stRRs[r]} slp={inst.slPips}/>
                                ))
                            }
                          </SecRow>
                          <SecRow label="-1">
                            {Object.values(stRRs).some(v=>v==="miss")
                              ? <span style={{background:C.red+"15",border:`1px solid ${C.red}33`,
                                  color:C.red,borderRadius:5,padding:"2px 8px",
                                  fontSize:11,fontWeight:700}}>✗ Loss</span>
                              : <span style={{color:C.faint,fontSize:11}}>—</span>
                            }
                          </SecRow>
                        </div>
                      </div>

                      {/* Trailing */}
                      <div style={{border:`1px solid ${C.purple}28`,borderRadius:7,overflow:"hidden"}}>
                        <div style={{background:C.purple+"15",padding:"4px 10px",
                          fontSize:10,color:C.purple,fontWeight:800,letterSpacing:1}}>▸ TRAILING</div>
                        <div style={{padding:"8px 10px",background:"#060a10"}}>
                          {trSubs.length===0&&!tr.loss
                            ? <span style={{color:C.faint,fontSize:11}}>—</span>
                            : trSubs.map(({subLabel,modelId,subModel,sub})=>{
                                const sl = parseFloat(inst.slPips);
                                return (
                                  <div key={subLabel} style={{marginBottom:6}}>
                                    <div style={{color:C.purple,fontSize:9,fontWeight:800,
                                      letterSpacing:1,marginBottom:3}}>{subLabel}</div>
                                    <SecRow label="RR">
                                      {Object.keys(sub.rrs||{}).length===0
                                        ? <span style={{color:C.faint,fontSize:11}}>—</span>
                                        : sortRR(Object.keys(sub.rrs)).map(r=>(
                                            <Tag key={r} rr={r} state={sub.rrs[r]} slp={inst.slPips}/>
                                          ))
                                      }
                                    </SecRow>
                                    {Object.entries(sub.rrs||{}).filter(([,v])=>v==="miss").map(([rr])=>{
                                      const bR = calcBepR(rr,modelId,subModel);
                                      const bP = sl>0?calcBepPips(rr,modelId,subModel,sl):null;
                                      return (
                                        <SecRow key={rr} label="BEP">
                                          <span style={{background:C.yellow+"15",border:`1px solid ${C.yellow}33`,
                                            color:C.yellow,borderRadius:5,padding:"2px 8px",
                                            fontSize:11,fontWeight:700,fontFamily:"monospace"}}>
                                            ~ {rr} +{bR??0}R{bP!==null?` (${fmtPips(bP)})`:""}
                                          </span>
                                        </SecRow>
                                      );
                                    })}
                                    {sub.loss&&(
                                      <SecRow label="-1">
                                        <span style={{background:C.red+"15",border:`1px solid ${C.red}33`,
                                          color:C.red,borderRadius:5,padding:"2px 8px",
                                          fontSize:11,fontWeight:700}}>✗ Loss</span>
                                      </SecRow>
                                    )}
                                  </div>
                                );
                              })
                          }
                          {tr.loss&&(
                            <SecRow label="-1 global">
                              <span style={{background:C.red+"15",border:`1px solid ${C.red}33`,
                                color:C.red,borderRadius:5,padding:"2px 8px",
                                fontSize:11,fontWeight:700}}>✗ SL sebelum trailing jalan</span>
                            </SecRow>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
                <TradeSummary executions={execArr}/>
              </>
          }
          <div style={{display:"flex",gap:8,marginTop:10,
            borderTop:`1px solid ${C.border}`,paddingTop:10}}>
            <button onClick={()=>onEdit()}
              style={{flex:1,background:"none",border:`1px solid ${C.border}`,
                color:C.dim,padding:8,borderRadius:7,cursor:"pointer",
                fontSize:12,fontFamily:"inherit"}}>Edit</button>
            {onArchive&&(
              <button onClick={()=>onArchive()}
                title="Pindah ke folder"
                style={{background:"none",border:`1px solid ${C.border}`,
                  color:C.dim,padding:"8px 11px",borderRadius:7,
                  cursor:"pointer",fontSize:14}}>📂</button>
            )}
            {onMoveFolder&&(
              <button onClick={()=>onMoveFolder()}
                title="Pindah folder"
                style={{background:"none",border:`1px solid ${C.border}`,
                  color:C.dim,padding:"8px 11px",borderRadius:7,
                  cursor:"pointer",fontSize:14}}>📂</button>
            )}
            {onRemoveFolder&&(
              <button onClick={()=>onRemoveFolder()}
                title="Keluarkan dari folder"
                style={{background:"none",border:`1px solid ${C.border}`,
                  color:C.dim,padding:"8px 9px",borderRadius:7,
                  cursor:"pointer",fontSize:12}}>↩</button>
            )}
            <button onClick={onDelete}
              style={{background:"none",border:`1px solid ${C.red}33`,
                color:C.red,padding:"8px 14px",borderRadius:7,
                cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Hapus</button>
          </div>
        </div>
      )}
    </div>
  );
}
);

// ─── STATS ────────────────────────────────────────────────────────────────────
function Stats({ trades, onExportReady, onShowPDF }) {
  const [fPairs,setFPairs] = useState([]);
  const [fExecs,setFExecs] = useState([]);
  const [fSL,setFSL]       = useState([]);
  const [fOut,setFOut]     = useState([]);
  const [fRR,setFRR]       = useState([]);
  const [fTags,setFTags]   = useState([]);
  const [fDir,setFDir]     = useState([]);
  const [fSess,setFSess]   = useState([]);
  const [fNotes,setFNotes]       = useState([]);  // keterangan chip filter
  const [fSlNotes,setFSlNotes]   = useState([]);  // keterangan SL filter
  const [fTargetNotes,setFTargetNotes] = useState([]); // keterangan target range filter
  const [uSearch,setUSearch]     = useState("");  // universal search input
  const [uSearchFocus,setUSearchFocus] = useState(false);
  const [uSearchHistory,setUSearchHistory] = useState([]);

  const [fTrailingModel,setFTrailingModel] = useState([]); // trailing sub-model filter

  // Date/time filter
  const [fDateMode,setFDateMode] = useState("all"); // "all"|"year"|"month"|"range"
  const [fYear,setFYear]         = useState("");
  const [fMonth,setFMonth]       = useState("");   // "1"–"12"
  const [fDateFrom,setFDateFrom] = useState("");   // YYYY-MM-DD
  const [fDateTo,setFDateTo]     = useState("");   // YYYY-MM-DD // [{type,val,label,color}]

  const allTags = useMemo(()=>{
    const s = new Set();
    trades.forEach(t=>(t.tags||[]).forEach(tag=>s.add(tag)));
    // Sort: presets first (in preset order), then custom alpha
    const preset = TAG_PRESETS.map(t=>t.id).filter(id=>s.has(id));
    const custom  = [...s].filter(id=>!TAG_PRESETS.find(t=>t.id===id)).sort();
    return [...preset, ...custom];
  },[trades]);

  const allSessions = useMemo(()=>{
    const s = new Set();
    trades.forEach(t=>{
      const arr = Array.isArray(t.executions)?t.executions:[];
      arr.forEach(inst=>{
        (inst.sessionsEntry||[]).forEach(se=>s.add(se));
        (inst.sessionsExit||[]).forEach(se=>s.add(se));
      });
    });
    return SESSIONS.filter(se=>s.has(se));
  },[trades]);

  const pairs = useMemo(()=>allPairs(trades),[trades]);

  const allRRs = useMemo(()=>{
    const s = new Set();
    trades.forEach(t=>{
      const arr = Array.isArray(t.executions)?t.executions:[];
      arr.forEach(inst=>{
        Object.keys(inst.static?.rrs||{}).forEach(r=>s.add(r));
        const trRaw2 = inst.trailing||{};
        const tr2 = migrateTrailing(trRaw2);
        Object.values(tr2.perModel||{}).forEach(md=>{
          if (!md?.enabled) return;
          Object.values(md.subs||{}).forEach(sub=>{
            if (sub?.enabled) Object.keys(sub.rrs||{}).forEach(r=>s.add(r));
          });
        });
      });
    });
    return sortRR([...s]);
  },[trades]);

  // Kumpulkan semua trailing sub-model yang pernah dipakai
  const allTrailingModels = useMemo(()=>{
    const s = new Set();
    trades.forEach(t=>{
      (Array.isArray(t.executions)?t.executions:[]).forEach(inst=>{
        const tr = migrateTrailing(inst.trailing||{});
        Object.entries(tr.perModel||{}).forEach(([modelId,md])=>{
          if (!md?.enabled) return;
          Object.entries(md.subs||{}).forEach(([subKey,sub])=>{
            if (!sub?.enabled) return;
            const lbl = modelId==="C"?`C(${subKey})`:`${modelId}${subKey==="max0"?" Max+0":" Nrm"}`;
            s.add(lbl);
          });
        });
      });
    });
    return [...s].sort();
  },[trades]);

  // Kumpulkan semua token keterangan unik dari seluruh trade
  const allNotesTokens = useMemo(()=>{
    const s = new Set();
    trades.forEach(t=>{
      if (Array.isArray(t.notesArr) && t.notesArr.length>0) {
        t.notesArr.forEach(n=>n&&s.add(n));
      } else if (t.notes && t.notes.trim()) {
        t.notes.split(" + ").map(n=>n.trim()).filter(Boolean).forEach(n=>s.add(n));
      }
    });
    return [...s].sort();
  },[trades]);

  // Kumpulkan semua keterangan SL unik
  const allSlNotesTokens = useMemo(()=>{
    const s = new Set();
    trades.forEach(t=>{
      (Array.isArray(t.executions)?t.executions:[]).forEach(inst=>{
        if (inst.slNotes && inst.slNotes.trim()) s.add(inst.slNotes.trim());
      });
    });
    return [...s].sort();
  },[trades]);

  // Kumpulkan semua keterangan target range unik
  const allTargetNotesTokens = useMemo(()=>{
    const s = new Set();
    trades.forEach(t=>{
      (Array.isArray(t.executions)?t.executions:[]).forEach(inst=>{
        if (inst.targetNotes && inst.targetNotes.trim()) s.add(inst.targetNotes.trim());
      });
    });
    return [...s].sort();
  },[trades]);

  // Universal search suggestions — grouped by category
  const uSuggestions = useMemo(()=>{
    const q = uSearch.trim().toLowerCase();
    const groups = [];
    const getTag = id => TAG_PRESETS.find(t=>t.id===id)||{id,label:id,color:C.purple};
    if (q) {
      const tagItems = allTags
        .filter(id=>{ const t=getTag(id); return t.label.toLowerCase().includes(q)||id.toLowerCase().includes(q); })
        .map(id=>{ const t=getTag(id); return {type:"tag",val:id,label:t.label,color:t.color}; });
      if (tagItems.length) groups.push({header:"🏷 KONDISI",items:tagItems});

      const noteItems = allNotesTokens
        .filter(n=>n.toLowerCase().includes(q))
        .map(n=>({type:"note",val:n,label:n,color:C.blue}));
      if (noteItems.length) groups.push({header:"📝 KETERANGAN",items:noteItems});

      const pairItems = pairs
        .filter(p=>p.toLowerCase().includes(q))
        .map(p=>({type:"pair",val:p,label:p,color:C.blue}));
      if (pairItems.length) groups.push({header:"💱 PAIR",items:pairItems});

      const rrItems = allRRs
        .filter(r=>r.toLowerCase().includes(q))
        .map(r=>({type:"rr",val:r,label:r,color:C.green}));
      if (rrItems.length) groups.push({header:"📊 RR",items:rrItems});

      const sessItems = SESSIONS
        .filter(s=>s.toLowerCase().includes(q))
        .map(s=>({type:"sess",val:s,label:s,color:C.yellow}));
      if (sessItems.length) groups.push({header:"🕐 SESI",items:sessItems});
    }
    return groups;
  },[uSearch,allTags,allNotesTokens,pairs,allRRs]);

  const tog = (arr,setArr,val) =>
    setArr(arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]);

  const rowColor = label =>
    label.startsWith("WIN")?C.green : label.startsWith("BEP")?C.yellow : C.red;

  const resetFilter = which => {
    if(which==="pair") setFPairs([]);
    else if(which==="exec") setFExecs([]);
    else if(which==="sl")   setFSL([]);
    else if(which==="out")  setFOut([]);
    else if(which==="rr")   setFRR([]);
    else if(which==="tags") setFTags([]);
    else if(which==="dir")  setFDir([]);
    else if(which==="sess") setFSess([]);
    else if(which==="notes") setFNotes([]);
    else if(which==="slNotes") setFSlNotes([]);
    else if(which==="targetNotes") setFTargetNotes([]);
    else if(which==="search") setUSearch("");
    else if(which==="trailingModel") setFTrailingModel([]);
    else if(which==="date") { setFDateMode("all"); setFYear(""); setFMonth(""); setFDateFrom(""); setFDateTo(""); }
  };

  const FilterChips = ({label,color,items,active,onToggle,getLabel,onReset}) => (
    <div style={{marginBottom:10}}>
      <span style={{...LBL,display:"inline-block",marginBottom:6,color}}>{label}</span>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        <button onClick={onReset}
          style={{...chipBool(active.length===0,color,true),padding:"4px 12px",fontSize:11}}>
          Semua
        </button>
        {items.map(item=>(
          <button key={item} onClick={()=>onToggle(item)}
            style={{...chipBool(active.includes(item),color,true),padding:"4px 10px",fontSize:11}}>
            {getLabel?getLabel(item):item}
          </button>
        ))}
      </div>
    </div>
  );

  const results = useMemo(()=>{
    const points = [];
    trades.forEach(t=>{
      const pair = t.pair||"Unknown";
      const tradeTags = t.tags||[];
      const direction = t.direction||"Buy";
      const arr = Array.isArray(t.executions)?t.executions:[];
      // Get earliest date for this trade
      const tSpan = tradeSpan(arr);
      const tradeDate = tSpan.dateFrom ? tSpan.dateFrom.slice(0,10) : ""; // YYYY-MM-DD
      arr.forEach((inst,instIdx)=>{
        const execId = `${inst.type}-${instIdx}`;
        const execLabel = `${inst.typeLabel||inst.type} #${instIdx+1}`;
        const sessEntry = inst.sessionsEntry||[];
        const sessExit  = inst.sessionsExit||[];
        const meta = {pair,execId:inst.type,execLabel,tags:tradeTags,direction,sessEntry,sessExit,
          tradeDate,
          notes:t.notes||"", notesArr:Array.isArray(t.notesArr)&&t.notesArr.length>0?t.notesArr
            :(t.notes||"").split(" + ").map(n=>n.trim()).filter(Boolean),
          slNotes:     inst.slNotes     || "",
          targetNotes: inst.targetNotes || "",
        };
        // Helper: get hold duration for a specific RR close time
        // Priority: rrTimes[rr] from the section → inst.holdingMins as fallback
        const getRRHoldMins = (rrTimesObj, rr) => {
          const closeT = rrTimesObj?.[rr];
          if (closeT && inst.dateFrom) {
            const m = holdMins(inst.dateFrom, closeT);
            if (m > 0) return m;
          }
          return inst.holdingMins || 0;
        };

        // Static
        const stRRTimes = inst.static?.rrTimes || {};
        Object.entries(inst.static?.rrs||{}).forEach(([rr,state])=>{
          const hm = getRRHoldMins(stRRTimes, rr);
          if (state==="hit")  points.push({...meta,slType:"static",outcomeType:"win",rr,bep:null,slPips:inst.slPips,holdMins:hm});
          if (state==="miss") points.push({...meta,slType:"static",outcomeType:"loss",rr,bep:null,slPips:inst.slPips,holdMins:hm});
        });
        // Trailing — per-model per-sub
        const trRaw = inst.trailing||{};
        const tr = migrateTrailing(trRaw);
        if (tr.loss) points.push({...meta,slType:"trailing",outcomeType:"loss",
          rr:null,bep:null,slPips:inst.slPips,holdMins:inst.holdingMins||0});
        Object.entries(tr.perModel||{}).forEach(([modelId, md])=>{
          if (!md?.enabled) return;
          const sl = parseFloat(inst.slPips);
          Object.entries(md.subs||{}).forEach(([subKey, sub])=>{
            if (!sub?.enabled) return;
            const subModel = modelId==="C" ? "normal" : subKey;
            const modelLabel = modelId==="C"
              ? `C(${subKey})`
              : `${modelId}${subKey==="max0"?" Max+0":" Nrm"}`;
            const subRRTimes = sub.rrTimes || {};
            Object.entries(sub.rrs||{}).forEach(([rr,state])=>{
              const hm = getRRHoldMins(subRRTimes, rr);
              if (state==="hit") {
                points.push({...meta,slType:"trailing",outcomeType:"win",rr,
                  bep:null,slPips:inst.slPips,holdMins:hm,trailingModel:modelLabel});
              } else if (state==="miss") {
                const bR = calcBepR(rr, modelId, subModel);
                const bepPips = sl>0 ? calcBepPips(rr, modelId, subModel, sl) : null;
                points.push({...meta,slType:"trailing",outcomeType:"bep",rr,
                  bep:modelLabel,slPips:inst.slPips,bepPips,bepR:bR,
                  holdMins:hm,trailingModel:modelLabel});
              }
            });
            if (sub.loss) points.push({...meta,slType:"trailing",outcomeType:"loss",
              rr:null,bep:null,slPips:inst.slPips,holdMins:inst.holdingMins||0,trailingModel:modelLabel});
          });
        });
      });
    });

    let filtered = points;
    if (fPairs.length) filtered = filtered.filter(p=>fPairs.includes(p.pair));
    if (fExecs.length) filtered = filtered.filter(p=>fExecs.includes(p.execId));
    if (fSL.length)    filtered = filtered.filter(p=>fSL.includes(p.slType));
    if (fOut.length)   filtered = filtered.filter(p=>fOut.includes(p.outcomeType));
    if (fRR.length)    filtered = filtered.filter(p=>p.rr&&fRR.includes(p.rr));
    if (fTags.length)  filtered = filtered.filter(p=>fTags.every(tag=>(p.tags||[]).includes(tag)));
    if (fDir.length)   filtered = filtered.filter(p=>fDir.includes(p.direction));
    if (fSess.length)  filtered = filtered.filter(p=>fSess.some(s=>(p.sessEntry||[]).includes(s)||(p.sessExit||[]).includes(s)));
    if (fNotes.length) filtered = filtered.filter(p=>fNotes.some(n=>(p.notesArr||[]).includes(n)));
    if (fSlNotes.length) filtered = filtered.filter(p=>fSlNotes.some(n=>p.slNotes===n));
    if (fTargetNotes.length) filtered = filtered.filter(p=>fTargetNotes.some(n=>p.targetNotes===n));
    if (fTrailingModel.length) filtered = filtered.filter(p=>
      // exclude selected models; non-trailing points always pass
      !p.trailingModel || !fTrailingModel.includes(p.trailingModel)
    );
    // date filter
    if (fDateMode==="year" && fYear) {
      filtered = filtered.filter(p=>p.tradeDate && p.tradeDate.startsWith(fYear));
    } else if (fDateMode==="month" && fYear && fMonth) {
      const ym = `${fYear}-${fMonth.padStart(2,"0")}`;
      filtered = filtered.filter(p=>p.tradeDate && p.tradeDate.startsWith(ym));
    } else if (fDateMode==="range") {
      if (fDateFrom) filtered = filtered.filter(p=>p.tradeDate && p.tradeDate>=fDateFrom);
      if (fDateTo)   filtered = filtered.filter(p=>p.tradeDate && p.tradeDate<=fDateTo);
    }
    // universal free-text fallback (only if no chip filter active for same category)
    const uQ = uSearch.trim().toLowerCase();
    if (uQ && !fNotes.length) {
      filtered = filtered.filter(p=>(p.notes||"").toLowerCase().includes(uQ));
    }

    // count unique exec instances (not points)
    const matchedExecs = new Set();
    trades.forEach((t,ti)=>{
      const pair = t.pair||"Unknown";
      if (fPairs.length&&!fPairs.includes(pair)) return;
      if (fDir.length&&!fDir.includes(t.direction||"Buy")) return;
      if (fTags.length&&!fTags.every(tag=>(t.tags||[]).includes(tag))) return;
      const uQm = uSearch.trim().toLowerCase();
      if (uQm&&!fNotes.length&&!(t.notes||"").toLowerCase().includes(uQm)) return;
      if (fNotes.length) {
        const tokens = Array.isArray(t.notesArr)&&t.notesArr.length>0
          ? t.notesArr : (t.notes||"").split(" + ").map(n=>n.trim()).filter(Boolean);
        if (!fNotes.some(n=>tokens.includes(n))) return;
      }
      const arr = Array.isArray(t.executions)?t.executions:[];
      const tSpan2 = tradeSpan(arr);
      const trDate = tSpan2.dateFrom ? tSpan2.dateFrom.slice(0,10) : "";
      // date filter gate
      if (fDateMode==="year" && fYear && trDate && !trDate.startsWith(fYear)) return;
      if (fDateMode==="month" && fYear && fMonth) {
        const ym2 = `${fYear}-${fMonth.padStart(2,"0")}`;
        if (trDate && !trDate.startsWith(ym2)) return;
      }
      if (fDateMode==="range") {
        if (fDateFrom && trDate && trDate<fDateFrom) return;
        if (fDateTo   && trDate && trDate>fDateTo) return;
      }
      arr.forEach((inst,instIdx)=>{
        if (fExecs.length&&!fExecs.includes(inst.type)) return;
        if (fSess.length&&!fSess.some(s=>(inst.sessionsEntry||[]).includes(s)||(inst.sessionsExit||[]).includes(s))) return;
        matchedExecs.add(`${ti}-${instIdx}`);
      });
    });
    const total = matchedExecs.size||1;

    // Group by label — for BEP show per-config row
    const groups = {};
    filtered.forEach(p=>{
      let key;
      if (p.outcomeType==="win")  key=`WIN ${p.rr}`;
      else if (p.outcomeType==="bep") {
        const rLabel = p.bepR!=null ? `+${p.bepR}R` : "";
        key=`BEP ${p.rr} · ${p.bep||"?"} ${rLabel}`;
      }
      else if (p.outcomeType==="loss") key = p.rr ? `LOSS (${p.rr})` : `LOSS`;
      else return;
      if (!groups[key]) groups[key] = { count:0, trades:[], pipsSum:0, pipsCnt:0 };
      groups[key].count++;
      // accumulate pips for avg display
      const _sl=parseFloat(p.slPips), _ra=parseFloat(p.rr?.split(":")[1]);
      let _pip=null;
      if(p.outcomeType==="win"&&_sl>0&&_ra>0) _pip=_ra*_sl;
      else if(p.outcomeType==="loss"&&_sl>0) _pip=-_sl;
      else if(p.outcomeType==="bep"&&p.bepPips!=null) _pip=p.bepPips;
      if(_pip!==null){groups[key].pipsSum+=_pip;groups[key].pipsCnt++;}
      // Store trade detail (pair, direction, notes, execLabel, holdMins) — deduplicate by pair+execLabel
      const detail = { pair:p.pair, direction:p.direction, notes:p.notes, execLabel:p.execLabel, rr:p.rr, slType:p.slType, holdMins:p.holdMins||0 };
      const exists = groups[key].trades.some(d=>d.pair===detail.pair&&d.execLabel===detail.execLabel&&d.rr===detail.rr);
      if (!exists) {
        groups[key].trades.push(detail);
        if (detail.holdMins > 0) {
          groups[key].holdSum  = (groups[key].holdSum  || 0) + detail.holdMins;
          groups[key].holdCnt  = (groups[key].holdCnt  || 0) + 1;
        }
      }
    });

    const sorted = Object.entries(groups).map(([k,v])=>[
      k, v.count, v.trades,
      v.pipsCnt>0 ? v.pipsSum/v.pipsCnt : null,  // avgPips
      v.holdCnt>0  ? v.holdSum/v.holdCnt : null,  // avgHoldMins
    ]).sort(([a],[b])=>{
      const order = k=>k.startsWith("WIN")?0:k.startsWith("BEP")?1:2;
      if (order(a)!==order(b)) return order(a)-order(b);
      if (a.startsWith("WIN")&&b.startsWith("WIN")){
        return parseFloat(a.split(" ")[1]?.split(":")[1]||0)-parseFloat(b.split(" ")[1]?.split(":")[1]||0);
      }
      return 0;
    });

    // Aggregate metrics — BEP pips per config (one per row, not averaged)
    let grossWinP=0, grossLossP=0;
    let bepByConfig={}; // key → { pips, count }
    let winCnt=0, lossCnt=0, bepCnt=0;
    let rrWonList=[], holdList=[];

    filtered.forEach(p=>{
      const sl = parseFloat(p.slPips);
      const ratio = parseFloat(p.rr?.split(":")[1]);
      if (p.holdMins>0) holdList.push(p.holdMins);
      if (p.outcomeType==="win"&&sl>0&&ratio>0) {
        grossWinP += ratio*sl; winCnt++; rrWonList.push(ratio);
      }
      if (p.outcomeType==="loss"&&sl>0) { grossLossP += sl; lossCnt++; }
      if (p.outcomeType==="bep") {
        bepCnt++;
        if (p.bepPips!=null) {
          const k = p.bep||"?";
          bepByConfig[k] = bepByConfig[k] || {pips:0,count:0};
          bepByConfig[k].pips  += p.bepPips;
          bepByConfig[k].count += 1;
        }
      }
    });

    // BEP pips summary: show per-model breakdown, not averaged together
    const bepBreakdown = Object.entries(bepByConfig).map(([model,{pips,count}])=>({
      model, avgPips: pips/count, count,
    }));
    const allBepPips = bepBreakdown.map(b=>b.avgPips);
    const bepMin = allBepPips.length ? Math.min(...allBepPips) : 0;
    const bepMax = allBepPips.length ? Math.max(...allBepPips) : 0;
    const isBepRange = allBepPips.length > 1 && Math.round(bepMin)!==Math.round(bepMax);

    const avgHoldMins = holdList.length ? holdList.reduce((a,b)=>a+b,0)/holdList.length : 0;
    // PF: use bepMin (conservative) or bepMax (optimistic)
    const netMinPips = grossWinP + bepMin - grossLossP;
    const netMaxPips = grossWinP + bepMax - grossLossP;
    const profitFactor = grossLossP>0 ? (grossWinP+bepMin)/grossLossP : null;
    const avgRR = rrWonList.length ? rrWonList.reduce((a,b)=>a+b,0)/rrWonList.length : null;
    const avgWinPips = winCnt ? grossWinP/winCnt : null;
    const avgLossPips = lossCnt ? grossLossP/lossCnt : null;
    const hasPips = grossWinP>0||grossLossP>0||bepMin>0||bepMax>0;

    // Trade Expectancy = (winRate × avgWin) - (lossRate × avgLoss) in pips
    const totalTrades = winCnt + lossCnt + bepCnt;
    const winRate  = totalTrades ? winCnt/totalTrades : 0;
    const lossRate = totalTrades ? lossCnt/totalTrades : 0;
    const bepRate  = totalTrades ? bepCnt/totalTrades : 0;
    const avgBepPips = allBepPips.length ? (bepMin+bepMax)/2 : 0;
    const expectancy = hasPips && totalTrades > 0
      ? (winRate*(avgWinPips||0)) - (lossRate*(avgLossPips||0)) + (bepRate*avgBepPips)
      : null;

    // ── Per-RR pip aggregate (for stats table) ──
    // key = "execType|rr|slType|bepLabel" → { type, pips[], holdMins[], count }
    const perRRMap = {};
    filtered.forEach(p => {
      const sl = parseFloat(p.slPips);
      const ratio = parseFloat(p.rr?.split(":")[1]);
      if (!sl || sl<=0) return;
      const key = `${p.execId}||${p.rr||"?"}||${p.slType}||${p.outcomeType}||${p.bep||""}`;
      perRRMap[key] = perRRMap[key] || {
        execId:p.execId, rr:p.rr, slType:p.slType,
        outcomeType:p.outcomeType, bepLabel:p.bep, bepR:p.bepR,
        pipsSum:0, holdSum:0, holdCount:0, count:0
      };
      const pips = p.outcomeType==="win" ? ratio*sl
        : p.outcomeType==="loss" ? -sl
        : (p.bepPips??0);
      perRRMap[key].pipsSum += pips;
      perRRMap[key].count   += 1;
      if (p.holdMins > 0) {
        perRRMap[key].holdSum   += p.holdMins;
        perRRMap[key].holdCount += 1;
      }
    });
    const perRRRows = Object.values(perRRMap).map(r=>({
      ...r,
      avgPips:    r.pipsSum / r.count,
      avgHoldMins: r.holdCount > 0 ? r.holdSum / r.holdCount : 0,
    }));

    // ── Consecutive streak calculation ──
    // Sort filtered points by tradeDate, then group per trade (unique tradeDate+pair+direction)
    // We treat each trade execution (point) as one event in time order.
    // Build a time-ordered sequence of win/loss/bep outcomes from filtered points.
    const timeOrderedPoints = [...filtered].sort((a,b)=>{
      if (a.tradeDate < b.tradeDate) return -1;
      if (a.tradeDate > b.tradeDate) return 1;
      return 0;
    });

    // Collapse consecutive same-trade points: a trade is one entry in the streak sequence.
    // Key = tradeDate + pair + direction + execLabel; outcome priority: loss > bep > win
    const tradeSeqMap = new Map();
    timeOrderedPoints.forEach(p => {
      const k = `${p.tradeDate}||${p.pair}||${p.direction}||${p.execLabel}`;
      if (!tradeSeqMap.has(k)) {
        tradeSeqMap.set(k, { key:k, tradeDate:p.tradeDate, pair:p.pair,
          direction:p.direction, execLabel:p.execLabel, outcome: p.outcomeType });
      } else {
        // Loss overrides bep/win; bep overrides win
        const cur = tradeSeqMap.get(k).outcome;
        const next = p.outcomeType;
        const priority = {win:0, bep:1, loss:2};
        if ((priority[next]??-1) > (priority[cur]??-1)) {
          tradeSeqMap.get(k).outcome = next;
        }
      }
    });
    const seq = [...tradeSeqMap.values()]; // time-ordered trade outcomes

    // Calculate streaks
    let maxWinStreak=0, maxLossStreak=0;
    let curWin=0, curLoss=0;
    let curWinStreak=0, curLossStreak=0; // current ongoing streak
    let winStreaks=[], lossStreaks=[];
    let tempWin=0, tempLoss=0;
    seq.forEach((item,i) => {
      if (item.outcome==="win") {
        tempWin++; tempLoss=0;
        if (tempWin > maxWinStreak) maxWinStreak = tempWin;
      } else if (item.outcome==="loss") {
        tempLoss++; tempWin=0;
        if (tempLoss > maxLossStreak) maxLossStreak = tempLoss;
      } else { // bep resets both
        tempWin=0; tempLoss=0;
      }
    });
    // Current streak (from end of sequence)
    for (let i=seq.length-1; i>=0; i--) {
      const o = seq[i].outcome;
      if (i===seq.length-1) {
        if (o==="win") curWinStreak=1;
        else if (o==="loss") curLossStreak=1;
        else break;
      } else {
        if (o===seq[seq.length-1].outcome && seq[seq.length-1].outcome==="win") curWinStreak++;
        else if (o===seq[seq.length-1].outcome && seq[seq.length-1].outcome==="loss") curLossStreak++;
        else break;
      }
    }
    // Re-calculate current streak properly
    curWinStreak=0; curLossStreak=0;
    for (let i=seq.length-1; i>=0; i--) {
      const o = seq[i].outcome;
      if (curWinStreak===0 && curLossStreak===0) {
        if (o==="win") curWinStreak=1;
        else if (o==="loss") curLossStreak=1;
        else break;
      } else if (curWinStreak>0 && o==="win") curWinStreak++;
      else if (curLossStreak>0 && o==="loss") curLossStreak++;
      else break;
    }

    return {
      rows:sorted, total, perRRRows,
      streak: { maxWin:maxWinStreak, maxLoss:maxLossStreak, curWin:curWinStreak, curLoss:curLossStreak, seqLen:seq.length },
      metrics:{
        grossWinP, grossLossP, bepMin, bepMax, isBepRange, bepBreakdown,
        netMinPips, netMaxPips,
        winCnt, lossCnt, bepCnt, avgHoldMins, profitFactor, avgRR,
        avgWinPips, avgLossPips, hasPips, expectancy, totalTrades,
      filteredPoints: filtered
      }
    };
  },[trades,fPairs,fExecs,fSL,fOut,fRR,fTags,fDir,fSess,fNotes,fSlNotes,fTargetNotes,uSearch,fDateMode,fYear,fMonth,fDateFrom,fDateTo,fTrailingModel]);

  useEffect(() => {
    if (onExportReady) onExportReady({
      points: results?.metrics?.filteredPoints || [],
      metrics: results?.metrics || null,
    });
  }, [results?.metrics?.filteredPoints]);


  if (!trades.length) return (
    <div style={{textAlign:"center",padding:"50px 20px",color:C.faint}}>
      <div style={{fontSize:32,marginBottom:10}}>📊</div>
      <div style={{fontSize:13}}>Tambahkan trade untuk melihat rekap</div>
    </div>
  );

  return (
    <div>
      {/* ── Metrics Dashboard ── */}
      {(() => {
        const m = results.metrics;
        const winRate = (m.winCnt+m.lossCnt+m.bepCnt)>0
          ? Math.round(m.winCnt/(m.winCnt+m.lossCnt+m.bepCnt)*100) : null;
        const StatBox = ({label,value,sub,color=C.text}) => (
          <div style={{background:"#060a10",border:`1px solid ${C.border}`,
            borderRadius:8,padding:"10px 12px",flex:1,minWidth:80}}>
            <div style={{color:C.dim,fontSize:9,letterSpacing:1.2,
              textTransform:"uppercase",marginBottom:5}}>{label}</div>
            <div style={{color,fontFamily:"monospace",fontWeight:900,
              fontSize:16,lineHeight:1}}>{value}</div>
            {sub&&<div style={{color:C.faint,fontSize:9,marginTop:3}}>{sub}</div>}
          </div>
        );
        return (
          <div style={{background:C.card,border:`1px solid ${C.border}`,
            borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{color:C.text,fontWeight:800,fontSize:12,
              letterSpacing:1,marginBottom:10}}>📈 METRIK AGREGAT</div>

            {/* Row 1: trade counts */}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
              <StatBox label="Total Eksekusi" value={results.total}/>
              {winRate!==null&&<StatBox label="Win Rate" value={`${winRate}%`}
                color={winRate>=50?C.green:C.red}
                sub={`${m.winCnt}W/${m.lossCnt}L/${m.bepCnt}B`}/>}
              {m.avgHoldMins>0&&<StatBox label="Avg Hold" value={fmtDuration(Math.round(m.avgHoldMins))}
                color={C.yellow}/>}
              {m.avgRR&&<StatBox label="Avg RR Menang" value={`1:${m.avgRR.toFixed(1)}`}
                color={C.green}/>}
            </div>

            {/* Row 2: pips */}
            {m.hasPips && (
              <>
                <div style={{color:C.dim,fontSize:9,letterSpacing:1.2,
                  textTransform:"uppercase",marginBottom:6}}>Rekapitulasi Pips</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                  {m.grossWinP>0&&<StatBox label="Gross Win" value={fmtPips(m.grossWinP)}
                    color={C.green} sub={m.avgWinPips?`avg ${fmtPips(m.avgWinPips)}/trade`:null}/>}
                  {(m.bepMax>0||m.bepMin>0)&&<StatBox label="BEP Range"
                    value={m.isBepRange?`${fmtPips(m.bepMin)}~${fmtPips(m.bepMax)}`:fmtPips(m.bepMin)}
                    color={C.yellow}
                    sub={m.isBepRange?"tergantung model":null}/>}
                  {m.grossLossP>0&&<StatBox label="Gross Loss" value={fmtPips(-m.grossLossP)}
                    color={C.red} sub={m.avgLossPips?`avg ${fmtPips(-m.avgLossPips)}/trade`:null}/>}
                  <StatBox label={m.isBepRange?"Net Range":"Net Pips"}
                    value={m.isBepRange
                      ? `${fmtPips(m.netMinPips)}~${fmtPips(m.netMaxPips)}`
                      : (fmtPips(m.netMinPips)??"-")}
                    color={m.netMinPips>=0?C.green:C.red}/>
                </div>
                {/* Per-model BEP breakdown */}
                {m.bepBreakdown.length>1 && (
                  <div style={{background:"#060a10",border:`1px solid ${C.yellow}22`,
                    borderRadius:8,padding:"8px 12px",marginBottom:8}}>
                    <div style={{color:C.dim,fontSize:9,letterSpacing:1.2,marginBottom:6}}>
                      BEP PER MODEL TRAILING
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {m.bepBreakdown.sort((a,b)=>a.avgPips-b.avgPips).map(b=>(
                        <span key={b.model} style={{background:C.yellow+"12",
                          border:`1px solid ${C.yellow}28`,borderRadius:6,
                          padding:"3px 9px",fontSize:11,fontWeight:700,
                          fontFamily:"monospace",color:C.yellow}}>
                          {b.model}: {fmtPips(b.avgPips)}
                          <span style={{color:C.dim,fontSize:9,marginLeft:4}}>×{b.count}</span>
                        </span>
                      ))}
                    </div>
                  </div>
                )}
                {m.profitFactor!==null&&(
                  <div style={{background:"#060a10",border:`1px solid ${C.border}`,
                    borderRadius:8,padding:"8px 12px",display:"flex",gap:16,
                    alignItems:"center",flexWrap:"wrap"}}>
                    <div>
                      <div style={{color:C.dim,fontSize:9,letterSpacing:1.2,
                        textTransform:"uppercase",marginBottom:3}}>Profit Factor</div>
                      <div style={{fontFamily:"monospace",fontWeight:900,fontSize:22,
                        color:m.profitFactor>=1?C.green:C.red}}>
                        {m.profitFactor===Infinity?"∞":m.profitFactor.toFixed(2)}
                      </div>
                      {m.isBepRange&&<div style={{color:C.faint,fontSize:9}}>(konservatif)</div>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{height:8,background:C.faint+"44",borderRadius:20,overflow:"hidden"}}>
                        <div style={{
                          width:`${Math.min(100,m.profitFactor*20)}%`,
                          height:"100%",
                          background:m.profitFactor>=1?C.green:C.red,
                          borderRadius:20,transition:"width 0.4s"
                        }}/>
                      </div>
                      <div style={{color:C.dim,fontSize:9,marginTop:3}}>
                        Gross Win + BEP min ÷ Gross Loss · Target ≥ 1.5
                      </div>
                    </div>
                  </div>
                )}

                {/* ── Avg Hold & Expectancy row ── */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {m.avgHoldMins>0&&(
                    <div style={{background:"#060a10",border:`1px solid ${C.border}`,
                      borderRadius:8,padding:"8px 12px"}}>
                      <div style={{color:C.dim,fontSize:9,letterSpacing:1.2,marginBottom:3}}>
                        ⏱ AVG HOLD
                      </div>
                      <div style={{fontFamily:"monospace",fontWeight:800,fontSize:16,color:C.blue}}>
                        {fmtDuration(Math.round(m.avgHoldMins))}
                      </div>
                      <div style={{color:C.faint,fontSize:9,marginTop:2}}>
                        {m.totalTrades} eksekusi
                        {fRR.length>0
                          ? <span style={{color:C.yellow,marginLeft:4}}>· per-RR {fRR.join(", ")}</span>
                          : <span style={{marginLeft:4}}>· semua RR</span>}
                      </div>
                    </div>
                  )}
                  {m.expectancy!==null&&(
                    <div style={{background:"#060a10",border:`1px solid ${m.expectancy>=0?C.green+"44":C.red+"44"}`,
                      borderRadius:8,padding:"8px 12px"}}>
                      <div style={{color:C.dim,fontSize:9,letterSpacing:1.2,marginBottom:3}}>
                        📊 EXPECTANCY
                      </div>
                      <div style={{fontFamily:"monospace",fontWeight:800,fontSize:16,
                        color:m.expectancy>=0?C.green:C.red}}>
                        {fmtPips(m.expectancy)}
                      </div>
                      <div style={{color:C.faint,fontSize:9,marginTop:2}}>
                        pip/trade rata-rata
                      </div>
                      {m.expectancy<0&&(
                        <div style={{color:C.red,fontSize:9,marginTop:2,fontWeight:700}}>
                          ⚠ Negatif — edge belum valid
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* ── Tabel Pip per RR aggregate ── */}
                {results.perRRRows.length>0 && (
                  <div style={{background:"#060a10",border:`1px solid ${C.border}`,
                    borderRadius:8,overflow:"hidden",marginTop:4}}>
                    <div style={{background:"#0a0f1a",padding:"5px 12px",
                      fontSize:9,color:C.dim,fontWeight:800,letterSpacing:1.2}}>
                      RINCIAN PIPS PER RR (AGREGAT {results.total} EKSEKUSI)
                    </div>
                    <div style={{padding:"8px 12px",display:"flex",flexDirection:"column",gap:4}}>
                      {(() => {
                        // Group by execType, then RR
                        const execGroups = {};
                        results.perRRRows.forEach(r=>{
                          execGroups[r.execId] = execGroups[r.execId]||[];
                          execGroups[r.execId].push(r);
                        });
                        return Object.entries(execGroups).map(([execId, rows])=>{
                          const et = EXEC_TYPES.find(e=>e.id===execId);
                          const byRR = {};
                          rows.forEach(r=>{ const k=r.rr||"(global)"; byRR[k]=byRR[k]||[]; byRR[k].push(r); });
                          return (
                            <div key={execId}>
                              <div style={{color:C.blue,fontSize:10,fontWeight:800,
                                marginBottom:4}}>{et?.label||execId}</div>
                              {sortRR(Object.keys(byRR)).map(rr=>(
                                <div key={rr} style={{display:"flex",alignItems:"center",
                                  gap:5,marginLeft:8,marginBottom:3,
                                  borderBottom:`1px solid ${C.faint}18`,paddingBottom:3}}>
                                  <span style={{color:C.dim,fontSize:9,fontFamily:"monospace",
                                    minWidth:36,flexShrink:0}}>{rr}</span>
                                  <div style={{display:"flex",flexWrap:"wrap",gap:3,flex:1}}>
                                    {byRR[rr].map((r,ri)=>{
                                      const col  = r.outcomeType==="win"?C.green:r.outcomeType==="loss"?C.red:C.yellow;
                                      const icon = r.outcomeType==="win"?"✓":r.outcomeType==="loss"?"✗":"~";
                                      const val  = fmtPips(r.avgPips)??"-";
                                      const sub  = r.outcomeType==="bep"
                                        ?`${r.bepLabel||"?"} +${r.bepR??0}R`
                                        :r.slType==="trailing"?"trailing":"static";
                                      return (
                                        <div key={ri} style={{background:col+"12",
                                          border:`1px solid ${col}25`,borderRadius:5,
                                          padding:"2px 7px",display:"flex",flexDirection:"column",
                                          alignItems:"flex-start",gap:1}}>
                                          <span style={{color:col,fontWeight:800,
                                            fontSize:10,fontFamily:"monospace"}}>
                                            {icon} {val}
                                            {r.count>1&&<span style={{color:col+"66",fontSize:8,marginLeft:3}}>
                                              ×{r.count}
                                            </span>}
                                          </span>
                                          <span style={{color:col+"77",fontSize:7.5}}>{sub}</span>
                                          {r.avgHoldMins>0&&(
                                            <span style={{color:C.yellow+"aa",fontSize:7.5,
                                              fontFamily:"monospace",letterSpacing:0.3}}>
                                              ⏱ {fmtDuration(Math.round(r.avgHoldMins))}
                                              {r.holdCount<r.count&&(
                                                <span style={{color:C.faint,fontSize:7,marginLeft:2}}>
                                                  ({r.holdCount}/{r.count})
                                                </span>
                                              )}
                                            </span>
                                          )}
                                        </div>
                                      );
                                    })}
                                  </div>
                                </div>
                              ))}
                            </div>
                          );
                        });
                      })()}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        );
      })()}

      <div style={{background:C.card,border:`1px solid ${C.border}`,
        borderRadius:10,padding:14,marginBottom:14}}>
        {/* Header + Reset All */}
        <div style={{color:C.text,fontWeight:800,fontSize:13,
          marginBottom:12,display:"flex",alignItems:"center",gap:8}}>

const STORE_CALC_PAIRS = "mirana-edge-calc-pairs";

const RATE_PROVIDERS = [
  { id:"frankfurter", label:"Frankfurter (ECB)", note:"Daily, ECB official" },
  { id:"erapi",       label:"ER-API",            note:"Real-time, free" },
  { id:"cdn",         label:"jsdelivr CDN",       note:"Real-time, fallback" },
];

function PipCalculator() {
  const [pair,        setPair]        = useState("GBPJPY");
  const [pips,        setPips]        = useState("50");
  const [lots,        setLots]        = useState("0.1");
  const [pvLot,       setPvLot]       = useState("10");
  const [useCustomPv, setUseCustomPv] = useState(false);
  const [hiddenPairs, setHiddenPairs] = useState([]);
  const [addedExtras, setAddedExtras] = useState([]);
  const [showAdd,     setShowAdd]     = useState(false);
  const [confirmDel,  setConfirmDel]  = useState(null);
  const [rates,       setRates]       = useState({});
  const [rateTs,      setRateTs]      = useState(null);
  const [rateErr,     setRateErr]     = useState(null);
  const [loading,     setLoading]     = useState(false);
  const [provider,    setProvider]    = useState("auto"); // default = auto tries all 3
  const [showProviderPicker, setShowProviderPicker] = useState(false);

  // Load saved pair prefs
  useEffect(()=>{
    (async()=>{
      try{
        const r=await __storageGet(STORE_CALC_PAIRS);
        if(r?.value){const d=JSON.parse(r.value);setHiddenPairs(d.hidden||[]);setAddedExtras(d.added||[]);}
      }catch(_){}
    })();
  },[]);

  const savePairPrefs=(hidden,added)=>{
    __storageSet(STORE_CALC_PAIRS,JSON.stringify({hidden,added})).catch(()=>{});
  };

  // ── Fetch rates with provider selection ──
  // Helper: fetch with timeout that works on ALL browsers including Safari/iOS
  const fetchWithTimeout = (url, ms=8000) => {
    const ctrl = new AbortController();
    const id = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { signal: ctrl.signal })
      .then(res => { clearTimeout(id); return res; })
      .catch(err => { clearTimeout(id); throw err; });
  };

  const fetchRates = async (forceProvider) => {
    setLoading(true); setRateErr(null);
    const prov = forceProvider || provider;
    const currencies = NON_USD_CURRENCIES;

    const tryFrankfurter = async () => {
      // Frankfurter only supports ECB currencies — filter to supported subset
      const ecbSupported = ["EUR","GBP","JPY","CHF","CAD","AUD","NZD","SEK","NOK","DKK","HKD","SGD","MXN","ZAR","TRY"];
      const supported = currencies.filter(c => ecbSupported.includes(c));
      const res = await fetchWithTimeout(
        `https://api.frankfurter.app/latest?from=USD&to=${supported.join(",")}`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      if (!d.rates || !Object.keys(d.rates).length) throw new Error("Empty");
      return d.rates;
    };

    const tryErApi = async () => {
      const res = await fetchWithTimeout(`https://open.er-api.com/v6/latest/USD`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      if (!d.rates) throw new Error("Empty");
      const r = {};
      currencies.forEach(c => { if (d.rates[c]) r[c] = d.rates[c]; });
      return r;
    };

    const tryCdn = async () => {
      const res = await fetchWithTimeout(
        `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      if (!d.usd) throw new Error("Empty");
      const r = {};
      currencies.forEach(c => { const v = d.usd[c.toLowerCase()]; if (v) r[c] = v; });
      return r;
    };

    const providerFns = {
      frankfurter: [tryFrankfurter],
      erapi:       [tryErApi],
      cdn:         [tryCdn],
      auto:        [tryFrankfurter, tryErApi, tryCdn],
    };

    const fns = providerFns[prov] || providerFns.auto;
    for (const fn of fns) {
      try {
        const result = await fn();
        setRates(result); setRateTs(new Date());
        setLoading(false); return;
      } catch (_) {}
    }
    setRateErr(prov === "auto"
      ? "Semua provider gagal. Cek koneksi internet."
      : `Provider "${prov}" gagal. Coba Auto atau provider lain.`);
    setLoading(false);
  };

  useEffect(()=>{ fetchRates(); },[]);

  const activePairs = {
    ...Object.fromEntries(Object.entries(CALC_PAIRS).filter(([k])=>!hiddenPairs.includes(k))),
    ...Object.fromEntries(Object.entries(EXTRA_PAIRS).filter(([k])=>addedExtras.includes(k))),
  };
  const cfg = activePairs[pair] || CALC_PAIRS["EURUSD"];

  const pvPerLot = (() => {
    if (useCustomPv) return parseFloat(pvLot)||0;
    const { pip, contract, quote } = cfg;
    const pvQ = pip * contract;
    if (quote==="USD") return pvQ;
    const r = rates[quote];
    return r ? pvQ/r : null;
  })();

  const totalPips = parseFloat(pips)||0;
  const totalLots = parseFloat(lots)||0;
  const totalUSD  = pvPerLot!=null ? pvPerLot*totalLots*totalPips : null;
  const rateInfo  = cfg.quote!=="USD" ? rates[cfg.quote] : null;

  const cats = ["Major","Cross JPY","Cross","Metals","Indices","Crypto"];
  const pairsByCat = cats.map(c=>({
    cat:c,
    items:Object.entries(activePairs).filter(([,v])=>v.cat===c),
  })).filter(g=>g.items.length>0);

  const Inp2 = ({value,onChange,label,suffix}) => (
    <div style={{marginBottom:8}}>
      {label&&<div style={{color:C.faint,fontSize:9,letterSpacing:1,fontWeight:700,marginBottom:3}}>{label}</div>}
      <div style={{display:"flex",alignItems:"center",border:`1px solid ${C.border}`,
        borderRadius:7,background:C.bg,overflow:"hidden"}}>
        <input type="number" value={value} onChange={e=>onChange(e.target.value)}
          style={{flex:1,background:"none",border:"none",outline:"none",color:C.text,
            fontSize:18,fontWeight:800,padding:"9px 10px",fontFamily:"'Courier New',monospace",
            textAlign:"right"}}/>
        {suffix&&<span style={{color:C.dim,fontSize:11,padding:"0 10px",flexShrink:0}}>{suffix}</span>}
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>

      {/* Rate bar */}
      <div style={{background:C.card,border:`1px solid ${rateErr?C.red+"44":C.border}`,
        borderRadius:10,padding:"9px 12px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{color:C.text,fontWeight:800,fontSize:11}}>💱 LIVE RATE</span>
              {rateTs&&!rateErr&&<span style={{color:C.green,fontSize:9}}>
                ✓ {rateTs.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}
              </span>}
              <button onClick={()=>setShowProviderPicker(p=>!p)}
                style={{background:"none",border:`1px solid ${C.faint}44`,color:C.faint,
                  borderRadius:4,padding:"1px 6px",fontSize:9,cursor:"pointer",fontWeight:700}}>
                {provider==="auto"?"AUTO":provider.toUpperCase()} ▾
              </button>
            </div>
            {rateErr
              ? <div style={{color:C.red,fontSize:10,marginTop:2}}>{rateErr}</div>
              : rateInfo
                ? <div style={{color:C.blue,fontSize:10,marginTop:1,fontFamily:"monospace",fontWeight:700}}>
                    1 USD = {rateInfo.toFixed(cfg.quote==="JPY"?3:5)} {cfg.quote}
                  </div>
                : cfg.quote==="USD"
                  ? <div style={{color:C.green,fontSize:10,marginTop:1}}>Quote = USD ✓</div>
                  : loading
                    ? <div style={{color:C.yellow,fontSize:10,marginTop:1}}>Mengambil rate…</div>
                    : <div style={{color:C.yellow,fontSize:10,marginTop:1}}>⚠ Tekan Refresh</div>
            }
          </div>
          <button onClick={()=>fetchRates()} disabled={loading}
            style={{background:"none",border:`1px solid ${loading?C.border:C.blue}66`,
              color:loading?C.faint:C.blue,borderRadius:7,padding:"6px 12px",
              cursor:loading?"default":"pointer",fontSize:11,fontWeight:700,
              fontFamily:"inherit",flexShrink:0}}>
            {loading?"…":"⟳ Refresh"}
          </button>
        </div>
        {showProviderPicker&&(
          <div style={{marginTop:8,borderTop:`1px solid ${C.border}33`,paddingTop:8}}>
            <div style={{color:C.faint,fontSize:9,letterSpacing:1,fontWeight:700,marginBottom:6}}>
              PILIH PROVIDER RATE
            </div>
            <div style={{background:C.yellow+"11",border:`1px solid ${C.yellow}33`,
              borderRadius:5,padding:"5px 8px",marginBottom:7,fontSize:9,color:C.yellow,lineHeight:1.5}}>
              ⚠ Di sandbox Claude.ai, fetch ke API eksternal diblokir CSP browser.
              Semua provider akan bekerja normal setelah deploy ke Netlify / buka sebagai file HTML.
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {[{id:"auto",label:"🔄 Auto (coba semua)",note:"Frankfurter → ER-API → CDN"},
                ...RATE_PROVIDERS].map(p=>{
                const on=provider===p.id;
                return (
                  <button key={p.id} onClick={()=>{setProvider(p.id);fetchRates(p.id);setShowProviderPicker(false);}}
                    style={{
                      background:on?C.blue+"22":C.bg,
                      border:`1px solid ${on?C.blue:C.border}`,
                      color:on?C.blue:C.text,
                      borderRadius:7,padding:"7px 10px",cursor:"pointer",
                      display:"flex",alignItems:"center",gap:8,
                      textAlign:"left",fontFamily:"inherit",
                    }}>
