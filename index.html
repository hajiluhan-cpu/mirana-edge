                    <span style={{fontWeight:800,fontSize:11,flex:1}}>{p.label||p.id}</span>
                    <span style={{color:C.faint,fontSize:9}}>{p.note}</span>
                    {on&&<span style={{color:C.blue,fontSize:10}}>✓</span>}
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Pair selector */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <span style={{color:C.faint,fontSize:9,letterSpacing:1.5,fontWeight:700}}>PAIR / INSTRUMEN</span>
          <button onClick={()=>setShowAdd(p=>!p)}
            style={{background:showAdd?C.green+"22":"none",border:`1px solid ${showAdd?C.green:C.border}`,
              color:showAdd?C.green:C.dim,borderRadius:6,padding:"3px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            {showAdd?"✕":"＋ Tambah/Kelola"}
          </button>
        </div>

        {showAdd&&(
          <div style={{background:C.bg,border:`1px solid ${C.green}33`,borderRadius:8,padding:10,marginBottom:10}}>
            <div style={{color:C.green,fontSize:9,letterSpacing:1,fontWeight:700,marginBottom:6}}>
              PAIR TAMBAHAN
            </div>
            {["Cross","Metals","Indices"].map(cat=>{
              const items = Object.entries(EXTRA_PAIRS).filter(([,v])=>v.cat===cat);
              if(!items.length) return null;
              return (
                <div key={cat} style={{marginBottom:7}}>
                  <div style={{color:C.faint,fontSize:9,marginBottom:3}}>{cat}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {items.map(([k,v])=>{
                      const on=addedExtras.includes(k);
                      return (
                        <button key={k} onClick={()=>{
                          const next=on?addedExtras.filter(x=>x!==k):[...addedExtras,k];
                          setAddedExtras(next);savePairPrefs(hiddenPairs,next);
                        }} style={{background:on?C.green+"22":C.bg,border:`1px solid ${on?C.green:C.border}`,
                          color:on?C.green:C.dim,borderRadius:5,padding:"4px 9px",
                          fontSize:10,fontWeight:on?800:500,cursor:"pointer"}}>
                          {on?"✓ ":""}{k}{v.label?` (${v.label})`:""}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {hiddenPairs.length>0&&(
              <div style={{marginTop:8}}>
                <div style={{color:C.yellow,fontSize:9,letterSpacing:1,marginBottom:4}}>PULIHKAN</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {hiddenPairs.map(k=>(
                    <button key={k} onClick={()=>{
                      const next=hiddenPairs.filter(x=>x!==k);
                      setHiddenPairs(next);savePairPrefs(next,addedExtras);
                    }} style={{background:C.yellow+"15",border:`1px solid ${C.yellow}44`,
                      color:C.yellow,borderRadius:5,padding:"4px 9px",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                      + {k}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {pairsByCat.map(({cat,items})=>(
          <div key={cat} style={{marginBottom:8}}>
            <div style={{color:C.faint,fontSize:9,letterSpacing:1.2,fontWeight:700,marginBottom:4}}>
              {cat.toUpperCase()}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {items.map(([key,v])=>{
                const on=pair===key;
                const isConf=confirmDel===key;
                return (
                  <div key={key} style={{display:"flex",alignItems:"stretch",borderRadius:6,overflow:"hidden",
                    border:`1px solid ${on?C.blue:isConf?C.red+"55":C.border}`}}>
                    <button onClick={()=>{setPair(key);setConfirmDel(null);}}
                      style={{background:on?C.blue+"22":C.bg,border:"none",
                        color:on?C.blue:C.dim,padding:"5px 9px",fontSize:10,
                        fontWeight:on?800:500,cursor:"pointer",fontFamily:"inherit"}}>
                      {key}
                    </button>
                    {isConf?(
                      <>
                        <button onClick={()=>{
                          if(CALC_PAIRS[key]){const n=[...hiddenPairs,key];setHiddenPairs(n);savePairPrefs(n,addedExtras);}
                          else{const n=addedExtras.filter(x=>x!==key);setAddedExtras(n);savePairPrefs(hiddenPairs,n);}
                          if(pair===key)setPair("EURUSD");setConfirmDel(null);
                        }} style={{background:C.red+"33",border:"none",borderLeft:`1px solid ${C.red}44`,
                          color:C.red,padding:"5px 7px",fontSize:9,fontWeight:800,cursor:"pointer"}}>✕</button>
                        <button onClick={()=>setConfirmDel(null)}
                          style={{background:"none",border:"none",borderLeft:`1px solid ${C.border}`,
                            color:C.faint,padding:"5px 5px",fontSize:11,cursor:"pointer"}}>↩</button>
                      </>
                    ):(
                      <button onClick={()=>setConfirmDel(key)}
                        style={{background:"none",border:"none",borderLeft:`1px solid ${C.border}33`,
                          color:C.faint,padding:"5px 6px",fontSize:11,cursor:"pointer"}}>×</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))}

        <div style={{background:C.bg,borderRadius:6,padding:"5px 10px",marginTop:4,
          border:`1px solid ${C.blue}22`,display:"flex",flexWrap:"wrap",gap:"3px 10px",alignItems:"center"}}>
          <span style={{color:C.blue,fontWeight:800,fontSize:12,fontFamily:"monospace"}}>{pair}</span>
          {cfg.label&&<span style={{color:C.dim,fontSize:9}}>{cfg.label}</span>}
          <span style={{color:C.faint,fontSize:9}}>pip={cfg.pip}</span>
          <span style={{color:C.faint,fontSize:9}}>contract={cfg.contract.toLocaleString()}</span>
          {rateInfo&&<span style={{color:C.green,fontSize:9,fontWeight:700}}>
            1USD={rateInfo.toFixed(cfg.quote==="JPY"?2:4)}{cfg.quote}
          </span>}
        </div>
      </div>

      {/* Inputs — STACKED (pips then lots, not side-by-side) */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:12}}>
        <div style={{color:C.faint,fontSize:9,letterSpacing:1.5,fontWeight:700,marginBottom:8}}>PARAMETER</div>
        <Inp2 label={`JUMLAH ${(cfg.pipLabel||"PIPS").toUpperCase()}`} value={pips} onChange={setPips}
          suffix={cfg.pipLabel||"pip"}/>
        <Inp2 label="LOT SIZE" value={lots} onChange={setLots} suffix="lot"/>
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
          <button onClick={()=>setUseCustomPv(p=>!p)}
            style={{background:useCustomPv?C.yellow+"22":"none",
              border:`1px solid ${useCustomPv?C.yellow:C.border}`,
              color:useCustomPv?C.yellow:C.faint,
              borderRadius:6,padding:"4px 10px",fontSize:9,fontWeight:700,cursor:"pointer"}}>
            {useCustomPv?"✓":""} PIP VALUE MANUAL
          </button>
        </div>
        {useCustomPv&&<div style={{marginTop:8}}><Inp2 label="PIP VALUE/LOT (USD)" value={pvLot} onChange={setPvLot} suffix="$/pip"/></div>}
      </div>

      {/* Result */}
      <div style={{background:C.card,
        border:`2px solid ${totalUSD!=null?C.green+"55":C.border}`,
        borderRadius:10,padding:12}}>
        <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:8}}>
          <span style={{color:totalUSD!=null?C.green:C.faint,fontSize:34,fontWeight:900,
            fontFamily:"monospace",lineHeight:1}}>
            {totalUSD!=null
              ? `$${Math.abs(totalUSD).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`
              : loading?"…":"—"}
          </span>
          {totalUSD!=null&&<span style={{color:C.dim,fontSize:12}}>USD</span>}
        </div>
        {pvPerLot!=null&&(
          <div style={{display:"flex",flexDirection:"column",gap:4,
            borderTop:`1px solid ${C.border}33`,paddingTop:8}}>
            {[
              ["Pip Value/lot",`$${pvPerLot.toFixed(4)}`],
              [`@ ${lots} lot`,`$${(pvPerLot*(parseFloat(lots)||0)).toFixed(4)}`],
              [`${pips}pip × ${lots}lot`,totalUSD!=null?`= $${totalUSD.toFixed(2)}`:"-"],
              cfg.quote!=="USD"&&rateInfo?[`${cfg.quote}→USD`,`÷${rateInfo.toFixed(cfg.quote==="JPY"?2:4)}`]:null,
            ].filter(Boolean).map(([l,v],i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{color:C.faint,fontSize:10}}>{l}</span>
                <span style={{color:C.text,fontSize:10,fontFamily:"monospace",fontWeight:700}}>{v}</span>
              </div>
            ))}
          </div>
        )}
        {cfg.quote!=="USD"&&!rates[cfg.quote]&&!loading&&(
          <div style={{color:C.yellow,fontSize:10,marginTop:8,background:C.yellow+"11",
            borderRadius:5,padding:"5px 8px",border:`1px solid ${C.yellow}33`}}>
            ⚠ Rate {cfg.quote}/USD belum tersedia. Tekan Refresh.
          </div>
        )}
      </div>

      <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,
        padding:"7px 10px",fontSize:9,color:C.faint,lineHeight:1.6}}>
        <b style={{color:C.dim}}>Formula:</b> pip × contract ÷ rate(quote→USD) ×
        lot · Rate: Frankfurter/ER-API/jsdelivr CDN · Bekerja di Netlify ✓
      </div>
    </div>
  );
}

// ─── TRADES WITH FOLDERS ─────────────────────────────────────────────────────
const iconBtn = (color) => ({
  background:"none", border:`1px solid ${color}44`, color,
  borderRadius:5, padding:"3px 7px", fontSize:11, cursor:"pointer", fontFamily:"inherit",
});

function TradesWithFolders({ trades, sorted, archives, setArchives,
  activeTagPresets, onNewTrade, onEditTrade, onUpdateTrade, onDeleteTrade,
  trash, trashCfg, setTrashCfg,
  onRestoreTrash, onRestoreFolderFromTrash, onDeletePermanent, onEmptyTrash,
  onMoveFolderToTrash }) {

  const [showTrash,           setShowTrash]           = useState(false);
  const [confirmEmptyTrash,   setConfirmEmptyTrash]   = useState(false);
  const [confirmPermDel,      setConfirmPermDel]       = useState(null);
  const [showTrashSettings,   setShowTrashSettings]   = useState(false);

  const [expandedFolders, setExpandedFolders] = useState({});
  const [showNewFolder,   setShowNewFolder]   = useState(false);
  const [newFolderName,   setNewFolderName]   = useState("");
  const [renaming,        setRenaming]        = useState(null);
  const [renameVal,       setRenameVal]       = useState("");
  const [confirmDelF,     setConfirmDelF]     = useState(null);
  const [movingTrade,     setMovingTrade]     = useState(null);

  // ── NEW: sort order ────────────────────────────────────────────────────────
  // "desc" = terbaru di atas (default), "asc" = terdahulu di atas
  const [sortOrder, setSortOrder] = useState("desc");

  // ── NEW: view mode ─────────────────────────────────────────────────────────
  // "folders" = tampilan folder normal, "all" = semua trade flat dengan label folder
  const [viewMode, setViewMode] = useState("folders");

  // ── NEW: subfolder creation state ─────────────────────────────────────────
  const [showNewSubFolder, setShowNewSubFolder] = useState(null); // parentId string
  const [newSubFolderName, setNewSubFolderName] = useState("");

  const archivedIds = new Set(archives.flatMap(f => f.tradeIds));
  const unarchived  = sorted.filter(t => !archivedIds.has(t.id));

  const getTradeDate = t => {
    if (Array.isArray(t.executions) && t.executions.length > 0)
      return tradeSpan(t.executions).dateFrom;
    return t.dateFrom || "";
  };

  // Sort helper — applies current sortOrder
  const applySortOrder = arr =>
    [...arr].sort((a, b) => {
      const da = new Date(getTradeDate(a));
      const db = new Date(getTradeDate(b));
      return sortOrder === "desc" ? db - da : da - db;
    });

  // ── Folder helpers ────────────────────────────────────────────────────────
  const mkFolder = (parentId = null) => {
    const name = parentId ? newSubFolderName.trim() : newFolderName.trim();
    if (!name) return;
    const id = crypto.randomUUID();
    if (parentId) {
      // Add as child of parent
      setArchives(p => p.map(f =>
        f.id === parentId
          ? { ...f, children: [...(f.children || []), { id, name, tradeIds: [], children: [] }] }
          : f
      ));
      setExpandedFolders(p => ({ ...p, [parentId]: true, [id]: true }));
      setNewSubFolderName(""); setShowNewSubFolder(null);
    } else {
      setArchives(p => [...p, { id, name, tradeIds: [], children: [] }]);
      setExpandedFolders(p => ({ ...p, [id]: true }));
      setNewFolderName(""); setShowNewFolder(false);
    }
  };

  const deleteFolder = id => { onMoveFolderToTrash(id); setConfirmDelF(null); };

  const renameFolder = id => {
    const v = renameVal.trim(); if (!v) return;
    // rename in top-level or in children
    const renameIn = (arr) => arr.map(f => {
      if (f.id === id) return { ...f, name: v };
      if (f.children?.length) return { ...f, children: renameIn(f.children) };
      return f;
    });
    setArchives(p => renameIn(p));
    setRenaming(null);
  };

  const moveTo = folderId => {
    if (!movingTrade) return;
    // Helper: recursively update tradeIds in nested folders
    const updateTrades = (arr) => arr.map(f => {
      const updated = {
        ...f,
        tradeIds: f.id === folderId
          ? [...new Set([...f.tradeIds, movingTrade])]
          : f.tradeIds.filter(id => id !== movingTrade),
      };
      if (f.children?.length) updated.children = updateTrades(f.children);
      return updated;
    });
    setArchives(p => updateTrades(p));
    setMovingTrade(null);
  };

  const removeFromFolder = (folderId, tradeId) => {
    const removeIn = (arr) => arr.map(f => {
      const updated = f.id === folderId
        ? { ...f, tradeIds: f.tradeIds.filter(id => id !== tradeId) }
        : f;
      if (f.children?.length) updated.children = removeIn(f.children);
      return updated;
    });
    setArchives(p => removeIn(p));
  };

  // Collect all folders flat (for move-to picker) with indent depth
  const getAllFoldersFlat = (arr = archives, depth = 0) => {
    const result = [];
    arr.forEach(f => {
      result.push({ ...f, depth });
      if (f.children?.length) result.push(...getAllFoldersFlat(f.children, depth + 1));
    });
    return result;
  };

  // Collect all trade IDs in a folder tree (folder + all children)
  const getAllTradeIdsInFolder = (folder) => {
    const ids = [...folder.tradeIds];
    (folder.children || []).forEach(c => ids.push(...getAllTradeIdsInFolder(c)));
    return ids;
  };

  // Build flat "all trades" list sorted — with folder label per trade
  const buildAllTradesList = () => {
    const folderMap = {}; // tradeId → folderName (deepest folder)
    const assignFolder = (arr, parentPath = "") => {
      arr.forEach(f => {
        const path = parentPath ? `${parentPath} / ${f.name}` : f.name;
        f.tradeIds.forEach(id => { folderMap[id] = path; });
        if (f.children?.length) assignFolder(f.children, path);
      });
    };
    assignFolder(archives);
    return applySortOrder(trades).map(t => ({
      trade: t,
      folderLabel: folderMap[t.id] || null,
    }));
  };

  const TradeRow = ({ trade, folderId }) => (
    <TradeCard trade={trade}
      activeTagPresets={activeTagPresets}
      onEdit={updated => {
        if (updated && typeof updated === "object" && updated.id) onUpdateTrade(updated);
        else onEditTrade(trade);
      }}
      onArchive={!folderId && archives.length > 0 ? () => setMovingTrade(trade.id) : null}
      onMoveFolder={folderId ? () => setMovingTrade(trade.id) : null}
      onRemoveFolder={folderId ? () => removeFromFolder(folderId, trade.id) : null}
      onDelete={() => onDeleteTrade(trade.id)} />
  );

  // ── Recursive folder renderer ─────────────────────────────────────────────
  const renderFolder = (folder, depth = 0) => {
    const isOpen   = !!expandedFolders[folder.id];
    const isRename = renaming === folder.id;
    const isConf   = confirmDelF === folder.id;
    const allIds   = getAllTradeIdsInFolder(folder);
    const folderTrades = applySortOrder(trades.filter(t => folder.tradeIds.includes(t.id)));
    const totalCount   = allIds.length; // includes subfolders

    return (
      <div key={folder.id} style={{
        background: depth === 0 ? C.card : C.bg,
        borderRadius: 10,
        marginBottom: depth === 0 ? 8 : 5,
        marginLeft: depth > 0 ? 12 : 0,
        overflow: "hidden",
        border: `1px solid ${isOpen ? (depth === 0 ? C.blue + "55" : C.blue + "33") : C.border}`,
      }}>
        {/* ── Folder header ── */}
        <div style={{ display: "flex", alignItems: "center", gap: 6,
          padding: depth === 0 ? "11px 12px" : "8px 10px",
          cursor: "pointer", userSelect: "none",
          background: depth > 0 && isOpen ? C.card + "88" : "transparent",
        }}
          onClick={() => setExpandedFolders(p => ({ ...p, [folder.id]: !p[folder.id] }))}>
          <span style={{ fontSize: depth === 0 ? 16 : 14, flexShrink: 0 }}>
            {isOpen ? "📂" : "📁"}
          </span>
          {isRename
            ? <input value={renameVal} autoFocus
                onChange={e => setRenameVal(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") renameFolder(folder.id); if (e.key === "Escape") setRenaming(null); }}
                onClick={e => e.stopPropagation()}
                style={{ ...inpSt({ padding: "3px 8px", fontSize: depth === 0 ? 13 : 12, flex: 1 }) }} />
            : <span style={{ flex: 1, fontWeight: 800, fontSize: depth === 0 ? 14 : 12, color: C.text }}>
                {folder.name}
              </span>
          }
          {/* Trade count badge — shows own + sub */}
          <span style={{
            background: totalCount > 0 ? C.blue + "22" : C.faint + "11",
            border: `1px solid ${totalCount > 0 ? C.blue + "44" : C.faint + "22"}`,
            color: totalCount > 0 ? C.blue : C.faint,
            borderRadius: 20, padding: "1px 8px", fontSize: 10, fontWeight: 700, flexShrink: 0,
          }}>{totalCount}</span>
          <div style={{ display: "flex", gap: 3, flexShrink: 0 }} onClick={e => e.stopPropagation()}>
            {isRename
              ? <button onClick={() => renameFolder(folder.id)} style={iconBtn(C.green)}>✓</button>
              : <button onClick={() => { setRenaming(folder.id); setRenameVal(folder.name); }}
                  style={iconBtn(C.dim)}>✏</button>
            }
            {/* Add subfolder button */}
            <button onClick={() => {
              setShowNewSubFolder(showNewSubFolder === folder.id ? null : folder.id);
              setNewSubFolderName("");
              setExpandedFolders(p => ({ ...p, [folder.id]: true }));
            }} style={iconBtn(C.yellow)} title="Buat subfolder">📁+</button>
            {isConf
              ? <>
                  <button onClick={() => deleteFolder(folder.id)}
                    style={{ ...iconBtn(C.red), background: C.red + "22", fontWeight: 800 }}>Hapus?</button>
                  <button onClick={() => setConfirmDelF(null)} style={iconBtn(C.faint)}>✕</button>
                </>
              : <button onClick={() => setConfirmDelF(folder.id)} style={iconBtn(C.dim)}>🗑</button>
            }
          </div>
          <span style={{
            color: C.faint, fontSize: 14, flexShrink: 0,
            display: "inline-block",
            transform: isOpen ? "rotate(90deg)" : "rotate(0deg)",
            transition: "transform 0.15s",
          }}>›</span>
        </div>

        {/* ── Folder contents ── */}
        {isOpen && (
          <div style={{ padding: "4px 10px 10px", borderTop: `1px solid ${C.border}33` }}>

            {/* Subfolder creation input */}
            {showNewSubFolder === folder.id && (
              <div style={{ background: C.yellow + "0d", border: `1px solid ${C.yellow}44`,
                borderRadius: 8, padding: 10, marginBottom: 8, marginTop: 4 }}>
                <div style={{ color: C.yellow, fontSize: 9, letterSpacing: 1.5, fontWeight: 700, marginBottom: 6 }}>
                  NAMA SUBFOLDER BARU
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={newSubFolderName} autoFocus
                    onChange={e => setNewSubFolderName(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") mkFolder(folder.id); if (e.key === "Escape") { setShowNewSubFolder(null); setNewSubFolderName(""); } }}
                    placeholder={`Subfolder di "${folder.name}"…`}
                    style={{ ...inpSt({ padding: "7px 10px", fontSize: 12, flex: 1 }) }} />
                  <button onClick={() => mkFolder(folder.id)}
                    style={{ background: C.yellow, border: "none", color: C.bg,
                      borderRadius: 7, padding: "7px 13px", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>Buat</button>
                  <button onClick={() => { setShowNewSubFolder(null); setNewSubFolderName(""); }}
                    style={{ background: "none", border: `1px solid ${C.border}`, color: C.dim,
                      borderRadius: 7, padding: "7px 10px", cursor: "pointer" }}>✕</button>
                </div>
              </div>
            )}

            {/* Render subfolders first */}
            {(folder.children || []).map(child => renderFolder(child, depth + 1))}

            {/* Direct trades in this folder */}
            {folderTrades.length === 0 && (folder.children || []).length === 0
              ? <div style={{ color: C.faint, fontSize: 11, padding: "14px 0",
                  textAlign: "center", fontStyle: "italic" }}>Folder kosong</div>
              : folderTrades.map(t => <TradeRow key={t.id} trade={t} folderId={folder.id} />)
            }
            <button onClick={() => onNewTrade(folder.id)} style={{
              width: "100%", marginTop: 6,
              background: C.blue + "11", border: `1.5px dashed ${C.blue}55`,
              color: C.blue, borderRadius: 7, padding: "9px 0",
              cursor: "pointer", fontSize: 12, fontWeight: 700,
              fontFamily: "'Courier New',monospace",
            }}>
              + Trade ke "{folder.name}"
            </button>
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* ── Toolbar: View mode + Sort order ── */}
      <div style={{ display: "flex", gap: 6, marginBottom: 10, alignItems: "center", flexWrap: "wrap" }}>
        {/* View mode toggle */}
        <div style={{ display: "flex", background: C.card, borderRadius: 8,
          border: `1px solid ${C.border}`, overflow: "hidden", flex: 1 }}>
          {[
            { id: "folders", label: "📁 Folder" },
            { id: "all",     label: "📋 Semua" },
          ].map(({ id, label }) => (
            <button key={id} onClick={() => setViewMode(id)} style={{
              flex: 1, background: viewMode === id ? C.blue + "22" : "none",
              border: "none",
              borderRight: id === "folders" ? `1px solid ${C.border}` : "none",
              color: viewMode === id ? C.blue : C.faint,
              padding: "8px 0", cursor: "pointer", fontSize: 11, fontWeight: 700,
              fontFamily: "'Courier New',monospace", letterSpacing: 0.5,
              transition: "all 0.15s",
            }}>{label}</button>
          ))}
        </div>
        {/* Sort order toggle */}
        <button onClick={() => setSortOrder(p => p === "desc" ? "asc" : "desc")} style={{
          background: C.card, border: `1px solid ${C.border}`,
          color: C.dim, borderRadius: 8, padding: "8px 12px",
          cursor: "pointer", fontSize: 11, fontWeight: 700,
          fontFamily: "'Courier New',monospace", whiteSpace: "nowrap",
        }}>
          {sortOrder === "desc" ? "🕐 Terbaru" : "🕐 Terdahulu"}
        </button>
      </div>

      {/* ── Move-to-folder picker ── */}
      {movingTrade && (
        <div style={{ background: C.yellow + "15", border: `2px solid ${C.yellow}55`,
          borderRadius: 8, padding: 10, marginBottom: 10 }}>
          <div style={{ color: C.yellow, fontSize: 11, fontWeight: 700, marginBottom: 7 }}>
            📂 Masukkan ke folder:
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
            {getAllFoldersFlat().map(f => {
              const isIn = f.tradeIds.includes(movingTrade);
              return (
                <button key={f.id} onClick={() => moveTo(f.id)} style={{
                  background: isIn ? C.green + "22" : C.bg,
                  border: `1px solid ${isIn ? C.green : C.border}`,
                  color: isIn ? C.green : C.text,
                  borderRadius: 6, padding: "7px 13px", fontSize: 12,
                  fontWeight: 700, cursor: "pointer",
                  paddingLeft: f.depth > 0 ? (f.depth * 10 + 13) + "px" : "13px",
                }}>
                  {f.depth > 0 ? "↳ " : ""}{isIn ? "✓ " : ""}{f.name}
                </button>
              );
            })}
            <button onClick={() => setMovingTrade(null)}
              style={{ background: "none", border: `1px solid ${C.red}44`, color: C.red,
                borderRadius: 6, padding: "7px 10px", fontSize: 11, cursor: "pointer", fontWeight: 700 }}>
              Batal
            </button>
          </div>
        </div>
      )}

      {/* ══ VIEW: ALL TRADES (flat, sorted, with folder label) ══════════════════ */}
      {viewMode === "all" && (() => {
        const allList = buildAllTradesList();
        if (allList.length === 0) return (
          <div style={{ textAlign: "center", padding: "50px 0", color: C.faint }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>📈</div>
            <div style={{ fontSize: 13, marginBottom: 4, color: C.dim }}>Belum ada trade</div>
          </div>
        );
        return (
          <div>
            <div style={{ color: C.faint, fontSize: 9, letterSpacing: 1.5, fontWeight: 700, marginBottom: 8 }}>
              SEMUA TRADE ({allList.length}) · {sortOrder === "desc" ? "TERBARU ↑" : "TERDAHULU ↑"}
            </div>
            {allList.map(({ trade, folderLabel }) => (
              <div key={trade.id}>
                {/* Folder label badge */}
                {folderLabel && (
                  <div style={{
                    display: "inline-flex", alignItems: "center", gap: 4,
                    background: C.blue + "15", border: `1px solid ${C.blue}33`,
                    borderRadius: "6px 6px 0 0", padding: "2px 10px",
                    fontSize: 9, color: C.blue, fontWeight: 700, letterSpacing: 0.5,
                    marginBottom: -1, marginLeft: 4,
                  }}>
                    📁 {folderLabel}
                  </div>
                )}
                <TradeCard trade={trade}
                  activeTagPresets={activeTagPresets}
                  onEdit={updated => {
                    if (updated && typeof updated === "object" && updated.id) onUpdateTrade(updated);
                    else onEditTrade(trade);
                  }}
                  onArchive={null}
                  onMoveFolder={null}
                  onRemoveFolder={null}
                  onDelete={() => onDeleteTrade(trade.id)}
                />
              </div>
            ))}
          </div>
        );
      })()}

      {/* ══ VIEW: FOLDERS ═══════════════════════════════════════════════════════ */}
      {viewMode === "folders" && (
        <div>
          {/* Render top-level folders */}
          {archives.map(folder => renderFolder(folder, 0))}

          {/* + Folder Baru */}
          {showNewFolder
            ? <div style={{ background: C.card, border: `1px solid ${C.green}44`,
                borderRadius: 10, padding: 12, marginBottom: 10 }}>
                <div style={{ color: C.green, fontSize: 9, letterSpacing: 1.5, fontWeight: 700, marginBottom: 7 }}>
                  NAMA FOLDER BARU
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={newFolderName} autoFocus
                    onChange={e => setNewFolderName(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") mkFolder(null); if (e.key === "Escape") setShowNewFolder(false); }}
                    placeholder="e.g. Januari 2025, Minggu NFP…"
                    style={{ ...inpSt({ padding: "8px 10px", fontSize: 12, flex: 1 }) }} />
                  <button onClick={() => mkFolder(null)}
                    style={{ background: C.green, border: "none", color: C.bg,
                      borderRadius: 7, padding: "8px 14px", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>Buat</button>
                  <button onClick={() => setShowNewFolder(false)}
                    style={{ background: "none", border: `1px solid ${C.border}`, color: C.dim,
                      borderRadius: 7, padding: "8px 10px", cursor: "pointer" }}>✕</button>
                </div>
              </div>
            : <button onClick={() => setShowNewFolder(true)} style={{
                width: "100%", marginBottom: 10,
                background: "none", border: `1.5px dashed ${C.green}55`,
                color: C.green, borderRadius: 8, padding: "10px 0",
                cursor: "pointer", fontSize: 12, fontWeight: 700,
                fontFamily: "'Courier New',monospace",
              }}>+ Folder Baru</button>
          }

          {/* Ungrouped trades */}
          {unarchived.length > 0 && (
            <div>
              <div style={{ color: C.faint, fontSize: 9, letterSpacing: 1.5, fontWeight: 700, marginBottom: 8 }}>
                TIDAK DALAM FOLDER ({unarchived.length})
              </div>
              {applySortOrder(unarchived).map(t => <TradeRow key={t.id} trade={t} folderId={null} />)}
            </div>
          )}

          {/* Empty state */}
          {trades.length === 0 && archives.length === 0 && (
            <div style={{ textAlign: "center", padding: "50px 0", color: C.faint }}>
              <div style={{ fontSize: 36, marginBottom: 12 }}>📈</div>
              <div style={{ fontSize: 13, marginBottom: 4, color: C.dim }}>Belum ada trade</div>
              <div style={{ fontSize: 11 }}>Buat folder atau langsung "+ Trade"</div>
            </div>
          )}
        </div>
      )}

      {/* ── 🗑 TRASH PANEL ── */}
      <div style={{ marginTop: 16 }}>
        <button onClick={() => { setShowTrash(p => !p); setConfirmEmptyTrash(false); setConfirmPermDel(null); }}
          style={{
            width: "100%", background: "none",
            border: `1px solid ${trash.length > 0 ? C.red + "44" : C.border}`,
            color: trash.length > 0 ? C.red : C.faint,
            borderRadius: 8, padding: "9px 14px", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            fontFamily: "'Courier New',monospace",
          }}>
          <span style={{ fontWeight: 700, fontSize: 11 }}>
            🗑 SAMPAH {trash.length > 0 && (
              <span style={{ background: C.red + "22", border: `1px solid ${C.red}44`,
                borderRadius: 20, padding: "1px 7px", fontSize: 10, marginLeft: 6 }}>
                {trash.length}
              </span>
            )}
          </span>
          <span style={{ fontSize: 12, color: C.faint, transform: showTrash ? "rotate(90deg)" : "none",
            transition: "transform 0.15s", display: "inline-block" }}>›</span>
        </button>

        {showTrash && (
          <div style={{ background: C.card, border: `1px solid ${C.red}33`,
            borderRadius: "0 0 8px 8px", padding: 12, marginTop: -1 }}>

            {/* Trash settings */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <button onClick={() => setShowTrashSettings(p => !p)}
                style={{ background: "none", border: `1px solid ${C.border}`, color: C.dim,
                  borderRadius: 6, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontWeight: 700 }}>
                ⚙ Pengaturan
              </button>
              {trash.length > 0 && (
                confirmEmptyTrash
                  ? <div style={{ display: "flex", gap: 5 }}>
                      <button onClick={() => { onEmptyTrash(); setConfirmEmptyTrash(false); }}
                        style={{ background: C.red + "22", border: `1px solid ${C.red}55`, color: C.red,
                          borderRadius: 6, padding: "3px 10px", fontSize: 10, cursor: "pointer", fontWeight: 800 }}>
                        Hapus Semua Permanen?
                      </button>
                      <button onClick={() => setConfirmEmptyTrash(false)}
                        style={{ background: "none", border: `1px solid ${C.border}`, color: C.faint,
                          borderRadius: 6, padding: "3px 8px", fontSize: 11, cursor: "pointer" }}>✕</button>
                    </div>
                  : <button onClick={() => setConfirmEmptyTrash(true)}
                      style={{ background: "none", border: `1px solid ${C.red}33`, color: C.red,
                        borderRadius: 6, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontWeight: 700 }}>
                      Kosongkan Sampah
                    </button>
              )}
            </div>

            {/* Settings panel */}
            {showTrashSettings && (
              <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 7, padding: 10, marginBottom: 10 }}>
                <div style={{ color: C.faint, fontSize: 9, letterSpacing: 1.2, fontWeight: 700, marginBottom: 8 }}>
                  HAPUS OTOMATIS SETELAH
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                  {[{ d: 7, l: "7 hari" }, { d: 14, l: "14 hari" }, { d: 30, l: "30 hari" },
                    { d: 60, l: "60 hari" }, { d: 90, l: "90 hari" }, { d: 0, l: "Tidak pernah" }].map(({ d, l }) => {
                    const on = trashCfg.autoPurgeDays === d;
                    return (
                      <button key={d} onClick={() => setTrashCfg({ autoPurgeDays: d })} style={{
                        background: on ? C.blue + "22" : C.card, border: `1px solid ${on ? C.blue : C.border}`,
                        color: on ? C.blue : C.dim, borderRadius: 6, padding: "5px 11px", fontSize: 11,
                        fontWeight: on ? 800 : 400, cursor: "pointer",
                      }}>{l}</button>
                    );
                  })}
                </div>
                <div style={{ color: C.faint, fontSize: 9, marginTop: 6 }}>
                  {trashCfg.autoPurgeDays > 0
                    ? `Trade di sampah otomatis dihapus permanen setelah ${trashCfg.autoPurgeDays} hari.`
                    : "Trade di sampah tidak akan otomatis dihapus."}
                </div>
              </div>
            )}

            {/* Trash items */}
            {trash.length === 0
              ? <div style={{ color: C.faint, fontSize: 11, textAlign: "center", padding: "16px 0", fontStyle: "italic" }}>
                  Sampah kosong
                </div>
              : [...trash].reverse().map((item) => {
                  const deletedAt  = new Date(item.deletedAt);
                  const daysLeft   = trashCfg.autoPurgeDays > 0
                    ? trashCfg.autoPurgeDays - Math.floor((Date.now() - deletedAt.getTime()) / 86400000)
                    : null;
                  const itemKey  = item.type === "folder" ? `f-${item.deletedAt}` : `t-${item.trade.id}`;
                  const permKey  = item.type === "folder" ? item.deletedAt : item.trade.id;
                  const isConfPerm = confirmPermDel === itemKey;

                  const TimeInfo = () => (
                    <div style={{ color: C.faint, fontSize: 9, marginTop: 3 }}>
                      Dihapus {deletedAt.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" })}
                      {daysLeft !== null && (
                        <span style={{ color: daysLeft <= 3 ? C.red : C.faint, marginLeft: 6, fontWeight: daysLeft <= 3 ? 700 : 400 }}>
                          · hapus permanen {daysLeft <= 0 ? "hari ini" : `${daysLeft}h lagi`}
                        </span>
                      )}
                    </div>
                  );

                  const Actions = ({ onRestore }) => (
                    <div style={{ display: "flex", gap: 4, flexShrink: 0, flexDirection: "column", alignItems: "flex-end" }}>
                      <button onClick={onRestore}
                        style={{ background: C.green + "15", border: `1px solid ${C.green}44`, color: C.green,
                          borderRadius: 5, padding: "3px 9px", fontSize: 10, cursor: "pointer", fontWeight: 700, whiteSpace: "nowrap" }}>
                        ↩ Pulihkan
                      </button>
                      {isConfPerm
                        ? <div style={{ display: "flex", gap: 3 }}>
                            <button onClick={() => { onDeletePermanent(permKey); setConfirmPermDel(null); }}
                              style={{ background: C.red + "22", border: `1px solid ${C.red}55`, color: C.red,
                                borderRadius: 5, padding: "3px 7px", fontSize: 9, cursor: "pointer", fontWeight: 800 }}>
                              Hapus?
                            </button>
                            <button onClick={() => setConfirmPermDel(null)}
                              style={{ background: "none", border: `1px solid ${C.border}`, color: C.faint,
                                borderRadius: 5, padding: "3px 5px", fontSize: 10, cursor: "pointer" }}>✕</button>
                          </div>
                        : <button onClick={() => setConfirmPermDel(itemKey)}
                            style={{ background: "none", border: `1px solid ${C.red}22`, color: C.red + "88",
                              borderRadius: 5, padding: "3px 9px", fontSize: 9, cursor: "pointer", whiteSpace: "nowrap" }}>
                            🗑 Permanen
                          </button>
                      }
                    </div>
                  );

                  if (item.type === "folder") {
                    return (
                      <div key={itemKey} style={{ background: C.bg, border: `1px solid ${C.yellow}33`,
                        borderRadius: 7, padding: "8px 10px", marginBottom: 6 }}>
                        <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                              <span style={{ fontSize: 14 }}>📁</span>
                              <span style={{ color: C.yellow, fontWeight: 800, fontSize: 13 }}>{item.folder.name}</span>
                            </div>
                            <div style={{ color: C.faint, fontSize: 9, marginTop: 2 }}>
                              {item.trades.length} trade di dalamnya
                              {item.trades.length > 0 && (
                                <span style={{ marginLeft: 6, color: C.dim }}>
                                  ({item.trades.slice(0, 3).map(t => t.pair).join(", ")}{item.trades.length > 3 ? `, +${item.trades.length - 3} lagi` : ""})
                                </span>
                              )}
                            </div>
                            <TimeInfo />
                          </div>
                          <Actions onRestore={() => onRestoreFolderFromTrash(item.deletedAt)} />
                        </div>
                      </div>
                    );
                  }

                  const t = item.trade;
                  return (
                    <div key={itemKey} style={{ background: C.bg, border: `1px solid ${C.border}`,
                      borderRadius: 7, padding: "8px 10px", marginBottom: 6, opacity: 0.85 }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                            <span style={{ color: C.blue, fontWeight: 800, fontSize: 12, fontFamily: "monospace" }}>
                              {t.pair || "—"}
                            </span>
                            <span style={{ color: t.direction === "Buy" ? C.green : C.red, fontSize: 11, fontWeight: 700 }}>
                              {t.direction === "Buy" ? "▲" : "▼"} {t.direction}
                            </span>
                          </div>
                          <TimeInfo />
                          {item.folderIds?.length > 0 && (
                            <div style={{ color: C.faint, fontSize: 9, marginTop: 1 }}>
                              📁 akan dikembalikan ke folder asal
                            </div>
                          )}
                        </div>
                        <Actions onRestore={() => onRestoreTrash(t.id)} />
                      </div>
                    </div>
                  );
                })
            }
          </div>
        )}
      </div>

      {/* ── Global + Trade button ── */}
      <button onClick={() => onNewTrade(null)} style={{
        width: "100%", marginTop: unarchived.length > 0 || viewMode === "all" ? 8 : 0,
        background: C.blue, border: "none", color: C.bg,
        borderRadius: 8, padding: "12px 0", cursor: "pointer",
        fontSize: 13, fontWeight: 800, fontFamily: "'Courier New',monospace", letterSpacing: 1,
      }}>+ Trade</button>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const STORE          = "mirana-edge-v1";
const STORE_TAGS_DEL = "mirana-edge-tags-deleted"; // preset tag IDs yang dihapus permanen
const STORE_TAGS_ADD = "mirana-edge-tags-custom";  // custom tag objects {id,label,color} tambahan permanen
const STORE_RR_DEL   = "mirana-edge-rr-deleted";   // RR preset strings yang dihapus permanen (e.g. "1:2")
const STORE_RR_ADD   = "mirana-edge-rr-custom";    // RR preset strings tambahan permanen (e.g. "1:2.5")
const STORE_NOTES    = "mirana-edge-notes-presets";
const STORE_ARCHIVE  = "mirana-edge-archive";
const STORE_PAIR_FAV = "mirana-edge-pair-favs"; // string[] pair favorit user
const STORE_TRASH    = "mirana-edge-trash";          // [{trade, deletedAt, folderIds[]}]
const STORE_TRASH_CFG= "mirana-edge-trash-cfg";      // {autoPurgeDays: number}

function App() {
  const [trades,setTrades]           = useState([]);
  const [exportData,setExportData] = useState({points:[],metrics:null});
  const [showForm,setShowForm]       = useState(false);
  const [editTrade,setEditTrade]     = useState(null);
  const [tab,setTab]                 = useState("trades");
  const [ready,setReady]             = useState(false);

  // Persistent tag customization
  const [deletedTagIds, setDeletedTagIds] = useState([]);   // preset IDs yang dihapus
  const [customTagDefs, setCustomTagDefs] = useState([]);   // {id,label,color} custom permanen

  // Persistent RR customization
  const [deletedRRs, setDeletedRRs]   = useState([]);       // RR preset strings yang dihapus
  const [customRRs,  setCustomRRs]    = useState([]);       // RR strings custom permanen

  // Persistent notes presets
  const [notesPresets, setNotesPresets] = useState([]);
  const [pairFavs, setPairFavs] = useState(["XAUUSD","EURUSD","GBPJPY","NAS100"]); // pair favorit

  // Archive folders [{id,name,tradeIds[]}]
  const [archives, setArchives] = useState([]);

  // Trash bin [{trade, deletedAt (ISO), folderIds[]}]
  const [trash, setTrash]         = useState([]);
  const [trashCfg, setTrashCfg]   = useState({ autoPurgeDays: 30 });

  // ─── SAFE LOAD/SAVE SYSTEM ──────────────────────────────────────────────────
  // Each store has a "loaded" ref. A save useEffect is ONLY allowed to write to
  // Supabase after its corresponding load has confirmed data (or confirmed empty).
  // This prevents a network timeout / power-cut mid-load from overwriting real
  // data with the default empty state that React initialises the state with.
  //
  // Pattern per store:
  //   1. loadedRef starts false.
  //   2. Load function: tries Supabase, retries once after 700 ms on failure.
  //      Sets state if data found. Sets loadedRef=true regardless (even if empty
  //      — empty IS valid). Sets loadedRef=false only on total network failure so
  //      save is blocked.
  //   3. save useEffect: guards with `if (!ready || !loadedRef.current) return`.

  const _loadedRefs = React.useRef({
    trades:    false,
    tagsDel:   false,
    tagsAdd:   false,
    rrDel:     false,
    rrAdd:     false,
    notes:     false,
    pairFavs:  false,
    archive:   false,
    trash:     false,
    trashCfg:  false,
  });

  // Robust load helper: tries once, retries after `retryMs` ms on null/error.
  const _safeLoad = async (key, retryMs = 700) => {
    try {
      const r = await __storageGet(key);
      if (r?.value != null) return r.value;
      // Got a response but null value — genuinely empty, no retry needed
      return null;
    } catch (_) {
      // Network/Supabase error — wait then retry once
      await new Promise(res => setTimeout(res, retryMs));
      try {
        const r2 = await __storageGet(key);
        return r2?.value ?? null;
      } catch (_2) {
        return undefined; // undefined = total failure (distinct from null = empty)
      }
    }
  };

  useEffect(() => {
    (async () => {
      const refs = _loadedRefs.current;

      // ── trades ──────────────────────────────────────────────────
      const vTrades = await _safeLoad(STORE);
      if (vTrades !== undefined) {
        if (vTrades) { try { setTrades(JSON.parse(vTrades)); } catch (_) {} }
        refs.trades = true;
      }

      // ── tags deleted ────────────────────────────────────────────
      const vTagsDel = await _safeLoad(STORE_TAGS_DEL);
      if (vTagsDel !== undefined) {
        if (vTagsDel) { try { setDeletedTagIds(JSON.parse(vTagsDel)); } catch (_) {} }
        refs.tagsDelete = true;
      }

      // ── tags custom ─────────────────────────────────────────────
      const vTagsAdd = await _safeLoad(STORE_TAGS_ADD);
      if (vTagsAdd !== undefined) {
        if (vTagsAdd) { try { setCustomTagDefs(JSON.parse(vTagsAdd)); } catch (_) {} }
        refs.tagsAdd = true;
      }

      // ── RR deleted ──────────────────────────────────────────────
      const vRRDel = await _safeLoad(STORE_RR_DEL);
      if (vRRDel !== undefined) {
        if (vRRDel) { try { setDeletedRRs(JSON.parse(vRRDel)); } catch (_) {} }
        refs.rrDel = true;
      }

      // ── RR custom ───────────────────────────────────────────────
      const vRRAdd = await _safeLoad(STORE_RR_ADD);
      if (vRRAdd !== undefined) {
        if (vRRAdd) { try { setCustomRRs(JSON.parse(vRRAdd)); } catch (_) {} }
        refs.rrAdd = true;
      }

      // ── notes presets ───────────────────────────────────────────
      const vNotes = await _safeLoad(STORE_NOTES);
      if (vNotes !== undefined) {
        if (vNotes) { try { setNotesPresets(JSON.parse(vNotes)); } catch (_) {} }
        refs.notes = true;
      }

      // ── pair favs ───────────────────────────────────────────────
      const vPairFavs = await _safeLoad(STORE_PAIR_FAV);
      if (vPairFavs !== undefined) {
        if (vPairFavs) { try { setPairFavs(JSON.parse(vPairFavs)); } catch (_) {} }
        refs.pairFavs = true;
      }

      // ── archive folders (with migration: add children:[] if missing) ──
      const vArchive = await _safeLoad(STORE_ARCHIVE);
      if (vArchive !== undefined) {
        if (vArchive) {
          try {
            const migrateFolder = (arr) => arr.map(f => ({
              ...f,
              children: Array.isArray(f.children) ? migrateFolder(f.children) : [],
            }));
            setArchives(migrateFolder(JSON.parse(vArchive)));
          } catch (_) {}
        }
        refs.archive = true;
      }

      // ── trash config ────────────────────────────────────────────
      let loadedCfg = { autoPurgeDays: 30 };
      const vTrashCfg = await _safeLoad(STORE_TRASH_CFG);
      if (vTrashCfg !== undefined) {
        if (vTrashCfg) { try { loadedCfg = JSON.parse(vTrashCfg); setTrashCfg(loadedCfg); } catch (_) {} }
        refs.trashCfg = true;
      }

      // ── trash bin (load last — depends on loadedCfg for auto-purge) ─
      const vTrash = await _safeLoad(STORE_TRASH);
      if (vTrash !== undefined) {
        if (vTrash) {
          try {
            const all = JSON.parse(vTrash);
            const migrated = all.map(item =>
              item.type ? item : { ...item, type: "trade", folderIds: item.folderIds || [] }
            );
            const days   = loadedCfg.autoPurgeDays;
            const cutoff = days > 0 ? Date.now() - days * 24 * 60 * 60 * 1000 : 0;
            const kept   = days > 0
              ? migrated.filter(item => new Date(item.deletedAt).getTime() > cutoff)
              : migrated;
            setTrash(kept);
          } catch (_) {}
        }
        refs.trash = true;
      }

      // Mark app as ready — all loads attempted (some may have failed, but
      // their refs stay false so those stores won't be overwritten on save).
      setReady(true);
    })();
  }, []);

  // ── Save useEffects — each guarded by its own loaded ref ────────────────────
  useEffect(() => {
    if (!ready || !_loadedRefs.current.trades) return;
    (async () => { try { await __storageSet(STORE, JSON.stringify(trades)); } catch (_) {} })();
  }, [trades, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.tagsDelete) return;
    (async () => { try { await __storageSet(STORE_TAGS_DEL, JSON.stringify(deletedTagIds)); } catch (_) {} })();
  }, [deletedTagIds, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.tagsAdd) return;
    (async () => { try { await __storageSet(STORE_TAGS_ADD, JSON.stringify(customTagDefs)); } catch (_) {} })();
  }, [customTagDefs, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.rrDel) return;
    (async () => { try { await __storageSet(STORE_RR_DEL, JSON.stringify(deletedRRs)); } catch (_) {} })();
  }, [deletedRRs, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.rrAdd) return;
    (async () => { try { await __storageSet(STORE_RR_ADD, JSON.stringify(customRRs)); } catch (_) {} })();
  }, [customRRs, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.notes) return;
    (async () => { try { await __storageSet(STORE_NOTES, JSON.stringify(notesPresets)); } catch (_) {} })();
  }, [notesPresets, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.pairFavs) return;
    (async () => { try { await __storageSet(STORE_PAIR_FAV, JSON.stringify(pairFavs)); } catch (_) {} })();
  }, [pairFavs, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.archive) return;
    (async () => { try { await __storageSet(STORE_ARCHIVE, JSON.stringify(archives)); } catch (_) {} })();
  }, [archives, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.trash) return;
    (async () => { try { await __storageSet(STORE_TRASH, JSON.stringify(trash)); } catch (_) {} })();
  }, [trash, ready]);

  useEffect(() => {
    if (!ready || !_loadedRefs.current.trashCfg) return;
    (async () => { try { await __storageSet(STORE_TRASH_CFG, JSON.stringify(trashCfg)); } catch (_) {} })();
  }, [trashCfg, ready]);


  // Derived: active tag presets (preset - deleted + custom defs)
  const activeTagPresets = [
    ...TAG_PRESETS.filter(t => !deletedTagIds.includes(t.id)),
    ...customTagDefs,
  ];

  // Derived: active RR presets (RR_PRESETS - deleted + custom)
  const activeRRPresets = sortRR([
    ...RR_PRESETS.filter(r => !deletedRRs.includes(r)),
    ...customRRs,
  ]);

  const [pendingFolderId, setPendingFolderId] = useState(null);

  // Move trade to trash (soft delete) — works with nested folders
  const moveToTrash = (tradeId) => {
    const trade = trades.find(t => t.id === tradeId);
    if (!trade) return;
    // Collect folderIds from nested structure
    const collectFolderIds = (arr) => {
      const ids = [];
      arr.forEach(f => {
        if (f.tradeIds.includes(tradeId)) ids.push(f.id);
        if (f.children?.length) ids.push(...collectFolderIds(f.children));
      });
      return ids;
    };
    const folderIds = collectFolderIds(archives);
    setTrades(p => p.filter(t => t.id !== tradeId));
    // Remove tradeId from all folders (nested)
    const removeFromAll = (arr) => arr.map(f => ({
      ...f,
      tradeIds: f.tradeIds.filter(id => id !== tradeId),
      children: f.children?.length ? removeFromAll(f.children) : [],
    }));
    setArchives(p => removeFromAll(p));
    setTrash(p => [...p, { type:"trade", trade, deletedAt: new Date().toISOString(), folderIds }]);
  };

  // Move entire folder (+ its trades, recursively) to trash
  const moveFolderToTrash = (folderId) => {
    // Find folder anywhere in the nested tree
    const findFolder = (arr) => {
      for (const f of arr) {
        if (f.id === folderId) return f;
        if (f.children?.length) { const found = findFolder(f.children); if (found) return found; }
      }
      return null;
    };
    const folder = findFolder(archives);
    if (!folder) return;
    // Collect ALL tradeIds in this folder + all descendants
    const collectAllIds = (f) => {
      const ids = [...f.tradeIds];
      (f.children || []).forEach(c => ids.push(...collectAllIds(c)));
      return ids;
    };
    const allIds   = collectAllIds(folder);
    const folderTrades = trades.filter(t => allIds.includes(t.id));
    // Remove folder from tree (at any depth) + remove its tradeIds from siblings
    const removeFolder = (arr) => arr
      .filter(f => f.id !== folderId)
      .map(f => ({
        ...f,
        tradeIds: f.tradeIds.filter(id => !allIds.includes(id)),
        children: f.children?.length ? removeFolder(f.children) : [],
      }));
    setTrades(p => p.filter(t => !allIds.includes(t.id)));
    setArchives(p => removeFolder(p));
    setTrash(p => [...p, {
      type: "folder",
      folder: { ...folder },
      trades: folderTrades,
      deletedAt: new Date().toISOString(),
    }]);
  };

  // Restore trade from trash — re-adds to original folders (nested)
  const restoreFromTrash = (tradeId) => {
    const item = trash.find(it => it.type==="trade" && it.trade.id === tradeId);
    if (!item) return;
    setTrades(p => [...p, item.trade]);
    const restoreIn = (arr) => arr.map(f => ({
      ...f,
      tradeIds: item.folderIds.includes(f.id)
        ? [...new Set([...f.tradeIds, tradeId])]
        : f.tradeIds,
      children: f.children?.length ? restoreIn(f.children) : [],
    }));
    setArchives(p => restoreIn(p));
    setTrash(p => p.filter(it => !(it.type==="trade" && it.trade.id === tradeId)));
  };

  // Restore folder (+ all its trades) from trash
  const restoreFolderFromTrash = (deletedAt) => {
    const item = trash.find(it => it.type==="folder" && it.deletedAt === deletedAt);
    if (!item) return;
    setTrades(p => {
      const existingIds = new Set(p.map(t => t.id));
      const toAdd = item.trades.filter(t => !existingIds.has(t.id));
      return [...p, ...toAdd];
    });
    setArchives(p => {
      if (p.some(f => f.id === item.folder.id)) {
        return p.map(f => f.id === item.folder.id
          ? { ...f, tradeIds: [...new Set([...f.tradeIds, ...item.folder.tradeIds])] }
          : f);
      }
      // Ensure children field exists on restored folder
      return [...p, { children: [], ...item.folder }];
    });
    setTrash(p => p.filter(it => !(it.type==="folder" && it.deletedAt === deletedAt)));
  };

  // Permanently delete from trash (trade or folder)
  const deletePermanent = (key) => {
    // key = tradeId for trades, deletedAt for folders
    setTrash(p => p.filter(it =>
      it.type==="trade" ? it.trade.id !== key : it.deletedAt !== key
    ));
  };

  // Empty entire trash
  const emptyTrash = () => setTrash([]);

  const save = trade => {
    setTrades(p=>{
      const ex = p.find(t=>t.id===trade.id);
      return ex ? p.map(t=>t.id===trade.id?trade:t) : [...p,trade];
    });
    // If trade was started from inside a folder, auto-add it there (nested-aware)
    if (pendingFolderId && !editTrade) {
      const addToFolder = (arr) => arr.map(f => {
        if (f.id === pendingFolderId)
          return { ...f, tradeIds: [...new Set([...f.tradeIds, trade.id])] };
        if (f.children?.length) return { ...f, children: addToFolder(f.children) };
        return f;
      });
      setArchives(prev => addToFolder(prev));
    }
    setPendingFolderId(null);
    setShowForm(false); setEditTrade(null);
  };

  const getTradeDate = t => {
    if (Array.isArray(t.executions) && t.executions.length>0) {
      return tradeSpan(t.executions).dateFrom;
    }
    return t.dateFrom || "";
  };
  const sorted = [...trades].sort((a,b)=>new Date(getTradeDate(b))-new Date(getTradeDate(a)));

  // ─── PDF EXPORT ───────────────────────────────────────────────────────────────
  const [showPDF, setShowPDF] = useState(false);

  const exportPoints = exportData.points;
  const exportMetrics = exportData.metrics;

  const pdfPoints = useMemo(() => {
    return exportData.points;
  }, [exportData.points]);

  const [pdfLoading, setPdfLoading] = React.useState(false);

  const doPrint = async () => {
    const { jsPDF } = window.jspdf;
    if (!jsPDF) { alert("jsPDF belum siap, tunggu sebentar lalu coba lagi."); return; }

    const m        = exportMetrics;
    const pts      = pdfPoints;
    const wins     = pts.filter(p => p.outcomeType === "win").length;
    const losses   = pts.filter(p => p.outcomeType === "loss").length;
    const beps     = pts.filter(p => p.outcomeType === "bep").length;
    const total    = pts.length;
    const wr       = total ? Math.round(wins / total * 100) : 0;
    const today    = new Date().toLocaleDateString("id-ID", { day:"2-digit", month:"long", year:"numeric" });
    const fileDate = new Date().toISOString().slice(0, 10);

    setPdfLoading(true);
    try {
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      const PW  = doc.internal.pageSize.getWidth();   // 297 mm
      const PH  = doc.internal.pageSize.getHeight();  // 210 mm

      // ── Header bar ────────────────────────────────────────────────
      doc.setFillColor(21, 101, 192);
      doc.rect(0, 0, PW, 18, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFont("courier", "bold");
      doc.setFontSize(13);
      doc.text("MIRANA EDGE  \xb7  REKAP TRADING", 10, 11.5);
      doc.setFont("courier", "normal");
      doc.setFontSize(8);
      doc.text("Export: " + today + "   \xb7   " + total + " data", PW - 10, 11.5, { align: "right" });

      // ── Stat boxes ────────────────────────────────────────────────
      const statItems = [
        { l: "TOTAL", v: String(total), col: [33,  33,  33 ] },
        { l: "WIN",   v: String(wins),  col: [22,  163, 74 ] },
        { l: "LOSS",  v: String(losses),col: [220, 38,  38 ] },
        { l: "BEP",   v: String(beps),  col: [202, 138, 4  ] },
        { l: "WR",    v: wr + "%",      col: wr >= 50 ? [22,163,74] : [220,38,38] },
      ];
      const extraItems = [];
      if (m) {
        if (m.avgRR)
          extraItems.push({ l: "AVG RR WIN",    v: "1:" + m.avgRR.toFixed(1),  col: [22,163,74] });
        if (m.avgHoldMins > 0)
          extraItems.push({ l: "AVG HOLD",      v: fmtDuration(Math.round(m.avgHoldMins)), col: [202,138,4] });
        if (m.profitFactor != null)
          extraItems.push({ l: "PROFIT FACTOR", v: m.profitFactor === Infinity ? "\u221e" : m.profitFactor.toFixed(2), col: m.profitFactor >= 1 ? [22,163,74] : [220,38,38] });
        if (m.hasPips) {
          if (m.grossWinP  > 0) extraItems.push({ l: "GROSS WIN",  v: fmtPips(m.grossWinP),   col: [22,163,74] });
          if (m.grossLossP > 0) extraItems.push({ l: "GROSS LOSS", v: fmtPips(-m.grossLossP), col: [220,38,38] });
          extraItems.push({
            l: "NET PIPS",
            v: m.isBepRange
              ? (fmtPips(m.netMinPips) + "~" + fmtPips(m.netMaxPips))
              : fmtPips(m.netMinPips),
            col: m.netMinPips >= 0 ? [22,163,74] : [220,38,38],
          });
          if (m.expectancy != null)
            extraItems.push({ l: "EXPECTANCY", v: fmtPips(m.expectancy), col: m.expectancy >= 0 ? [22,163,74] : [220,38,38] });
        }
      }

      const allStats = [...statItems, ...extraItems];
      const boxW     = Math.min(36, (PW - 20) / allStats.length);
      const bY       = 22;
      let   bx       = 10;
      allStats.forEach(({ l, v, col }) => {
        doc.setDrawColor(200, 200, 200);
        doc.setFillColor(248, 249, 250);
        doc.roundedRect(bx, bY, boxW - 2, 13, 1.5, 1.5, "FD");
        doc.setTextColor(...col);
        doc.setFont("courier", "bold");
        doc.setFontSize(9);
        doc.text(v, bx + (boxW - 2) / 2, bY + 6.5, { align: "center" });
        doc.setTextColor(100, 100, 100);
        doc.setFont("courier", "normal");
        doc.setFontSize(6.5);
        doc.text(l, bx + (boxW - 2) / 2, bY + 11, { align: "center" });
        bx += boxW;
      });

      // ── Table ─────────────────────────────────────────────────────
      const headers = [["Tanggal","Pair","Arah","SL","RR","Outcome","Model","Sesi Entry","Sesi Exit","Tags","Notes"]];
      const body    = pts.map(p => {
        const outcomeLabel = p.outcomeType === "bep"
          ? (p.bep ? "BEP " + p.bep : "BEP")
          : (p.outcomeType || "-");
        return [
          p.tradeDate  || "-",
          p.pair       || "-",
          p.direction  || "-",
          p.slType     || "-",
          p.rr         || "-",
          outcomeLabel,
          p.trailingModel || p.slType || "-",
          (p.sessEntry || []).join(", ") || "-",
          (p.sessExit  || []).join(", ") || "-",
          (p.tags      || []).join(", ") || "-",
          p.notes || "",
        ];
      });

      doc.autoTable({
        head: headers,
        body: body,
        startY: bY + 17,
        margin: { left: 10, right: 10 },
        styles: {
          font:        "courier",
          fontSize:    7.5,
          cellPadding: 2.2,
          lineColor:   [220, 220, 220],
          lineWidth:   0.2,
          textColor:   [30, 30, 30],
          overflow:    "linebreak",
        },
        headStyles: {
          fillColor:  [21, 101, 192],
          textColor:  [255, 255, 255],
          fontStyle:  "bold",
          fontSize:   7,
        },
        alternateRowStyles: { fillColor: [245, 247, 250] },
        columnStyles: {
          0:  { cellWidth: 22 },
          1:  { cellWidth: 18, fontStyle: "bold" },
          2:  { cellWidth: 14 },
          3:  { cellWidth: 18 },
          4:  { cellWidth: 14, fontStyle: "bold" },
          5:  { cellWidth: 18, fontStyle: "bold" },
          6:  { cellWidth: 20 },
          7:  { cellWidth: 24 },
          8:  { cellWidth: 24 },
          9:  { cellWidth: 30 },
          10: { cellWidth: "auto" },
        },
        didDrawCell(data) {
          if (data.section !== "body") return;
          // Direction cell — Buy=green, Sell=red
          if (data.column.index === 2) {
            const dir = pts[data.row.index]?.direction;
            doc.setTextColor(...(dir === "Buy" ? [22,163,74] : [220,38,38]));
          }
          // Outcome cell
          if (data.column.index === 5) {
            const ot = pts[data.row.index]?.outcomeType;
            doc.setTextColor(...(ot === "win" ? [22,163,74] : ot === "loss" ? [220,38,38] : [202,138,4]));
          }
          // RR cell — yellow
          if (data.column.index === 4) doc.setTextColor(202, 138, 4);
        },
        didDrawPage() {
          const pg = doc.internal.getCurrentPageInfo().pageNumber;
          doc.setFontSize(7);
          doc.setTextColor(150, 150, 150);
          doc.setFont("courier", "normal");
          doc.text(
            "MIRANA EDGE  \xb7  " + today + "  \xb7  Hal " + pg,
            PW / 2, PH - 4, { align: "center" }
          );
        },
      });

      doc.save("mirana-rekap-" + fileDate + ".pdf");
    } catch (err) {
      console.error("PDF export error:", err);
      alert("Gagal generate PDF: " + err.message);
    } finally {
      setPdfLoading(false);
    }
  };


  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Courier New',monospace"}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,
        padding:"12px 16px",display:"flex",alignItems:"center",
        justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div>
          <div style={{fontWeight:900,fontSize:15,letterSpacing:2.5,color:C.blue}}>MIRANA EDGE</div>
          <div style={{fontSize:9,color:C.faint,letterSpacing:1.5}}>MULTI-PROBABILITY RECORDER</div>
        </div>
        {tab!=="trades"&&(
          <button onClick={()=>{setEditTrade(null);setShowForm(true);}}
            style={{background:C.blue,border:"none",color:C.bg,
              padding:"10px 18px",borderRadius:8,cursor:"pointer",
              fontSize:14,fontWeight:800,fontFamily:"inherit"}}>
            + Trade
          </button>
        )}
      </div>

      <div style={{display:"flex",background:C.panel,borderBottom:`1px solid ${C.border}`}}>
        {[{id:"trades",label:`TRADE`},{id:"stats",label:"REKAP"},{id:"calc",label:"KALKULATOR"}]
          .map(({id,label})=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            flex:1,background:"none",border:"none",
            borderBottom:tab===id?`2px solid ${C.blue}`:"2px solid transparent",
            color:tab===id?C.blue:C.faint,
            padding:"11px 0",cursor:"pointer",fontSize:11,
            letterSpacing:1.5,fontWeight:700,fontFamily:"'Courier New',monospace",
            transition:"color 0.2s"}}>
            {label}
          </button>
        ))}
        <button onClick={()=>setShowPDF(true)} style={{
          background:"none",border:"none",
          borderBottom:"2px solid transparent",
          color:C.yellow,padding:"11px 8px",
          cursor:"pointer",fontSize:11,fontWeight:700,
          fontFamily:"'Courier New',monospace"
        }}>📄 PDF</button>
      </div>

      <div style={{padding:"14px 14px 80px",maxWidth:640,margin:"0 auto"}}>
        {!ready
          ? <div style={{color:C.faint,textAlign:"center",padding:40}}>Memuat…</div>
          : tab==="trades"
            ? <TradesWithFolders
                trades={trades} sorted={sorted}
                archives={archives} setArchives={setArchives}
                activeTagPresets={activeTagPresets}
                trash={trash} trashCfg={trashCfg} setTrashCfg={setTrashCfg}
                onNewTrade={(folderId)=>{
                  setPendingFolderId(folderId||null);
                  setEditTrade(null); setShowForm(true);
                }}
                onEditTrade={(trade)=>{setEditTrade(trade);setShowForm(true);}}
                onUpdateTrade={updated=>setTrades(p=>p.map(t=>t.id===updated.id?updated:t))}
                onDeleteTrade={moveToTrash}
                onMoveFolderToTrash={moveFolderToTrash}
                onRestoreTrash={restoreFromTrash}
                onRestoreFolderFromTrash={restoreFolderFromTrash}
                onDeletePermanent={deletePermanent}
                onEmptyTrash={emptyTrash}
              />
            : tab==="calc"
              ? <PipCalculator/>
              : <Stats trades={trades} onExportReady={data=>setExportData(data||{points:[],metrics:null})} onShowPDF={()=>setShowPDF(true)}/>
        }
      </div>

      {showForm && (
        <TradeModal initial={editTrade} onSave={save}
          onClose={()=>{setShowForm(false);setEditTrade(null);}}
          activeTagPresets={activeTagPresets}
          activeRRPresets={activeRRPresets}
          pairFavs={pairFavs} setPairFavs={setPairFavs}
          onDeleteTagPreset={id => {
            if (TAG_PRESETS.some(t=>t.id===id)) {
              setDeletedTagIds(p=>[...new Set([...p,id])]);
            } else {
              setCustomTagDefs(p=>p.filter(t=>t.id!==id));
            }
          }}
          onAddTagPreset={def => setCustomTagDefs(p=>[...p,def])}
          onDeleteRRPreset={rr => {
            if (RR_PRESETS.includes(rr)) {
              setDeletedRRs(p=>[...new Set([...p,rr])]);
            } else {
              setCustomRRs(p=>p.filter(r=>r!==rr));
            }
          }}
          onAddRRPreset={rr => setCustomRRs(p=>[...new Set([...p,rr])])}
          notesPresets={notesPresets}
          onAddNotesPreset={n => setNotesPresets(p=>[...new Set([...p,n])])}
          onDeleteNotesPreset={n => setNotesPresets(p=>p.filter(x=>x!==n))}
        />
      )}
    
      {showPDF&&(
        <div id="pdf-print" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:9999,overflowY:"auto"}}>
          <div style={{background:C.panel,maxWidth:640,margin:"0 auto",minHeight:"100vh",padding:"16px 14px 80px"}}>
            {/* Header - hidden on print */}
            <div className="no-print" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{color:C.text,fontWeight:700,fontSize:14,fontFamily:"'Courier New',monospace",letterSpacing:1}}>
                📄 EXPORT REKAP
                {exportPoints.length>0&&<span style={{color:C.green,fontSize:10,marginLeft:8}}>✓ {exportPoints.length} data</span>}
              </div>
              <button onClick={()=>setShowPDF(false)} style={{background:"none",border:`1px solid ${C.border}`,color:C.dim,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕ Tutup</button>
            </div>

            {/* Print header - only shown on print */}
            <div className="print-header" style={{display:"none",marginBottom:12,borderBottom:"2px solid #1565c0",paddingBottom:8}}>
              <div style={{fontSize:16,fontWeight:900,letterSpacing:2}}>MIRANA EDGE · REKAP TRADING</div>
              <div style={{fontSize:11,color:"#555",marginTop:3}}>
                Export: {new Date().toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"})}
                {" · "}{exportPoints.length} data
              </div>
            </div>

            {(()=>{
              const m = exportMetrics;
              const pts = pdfPoints;
              const wins  = pts.filter(p=>p.outcomeType==="win").length;
              const losses= pts.filter(p=>p.outcomeType==="loss").length;
              const beps  = pts.filter(p=>p.outcomeType==="bep").length;
              const total = pts.length;
              const wr = total ? Math.round(wins/total*100) : 0;

              if (total===0) return (
                <div style={{background:"#1a0a10",border:`1px solid ${C.red}33`,borderRadius:8,
                  padding:"16px",textAlign:"center",marginBottom:12}}>
                  <div style={{color:C.red,fontSize:13,fontWeight:700,marginBottom:6}}>⚠ Tidak ada data</div>
                  <div style={{color:C.dim,fontSize:11}}>
                    Buka tab <strong style={{color:C.text}}>REKAP</strong>, atur filter, lalu kembali ke sini.
                  </div>
                </div>
              );

              return (
                <div>
                  {/* ── STAT BOXES ROW 1: count ── */}
                  <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                    {[["Total",total,C.text],["Win",wins,C.green],["Loss",losses,C.red],["BEP",beps,C.yellow],["WR",wr+"%",wins>losses?C.green:C.red]]
                      .map(([l,v,col])=>(
                      <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,
                        padding:"6px 10px",flex:1,textAlign:"center",minWidth:50}}>
                        <div style={{color:col,fontWeight:800,fontSize:15,fontFamily:"monospace"}}>{v}</div>
                        <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>{l}</div>
                      </div>
                    ))}
                  </div>

                  {/* ── STAT BOXES ROW 2: performance ── */}
                  {m && (
                    <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                      {m.avgRR && (
                        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,
                          padding:"6px 10px",flex:1,textAlign:"center",minWidth:70}}>
                          <div style={{color:C.green,fontWeight:800,fontSize:13,fontFamily:"monospace"}}>1:{m.avgRR.toFixed(1)}</div>
                          <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>AVG RR WIN</div>
                        </div>
                      )}
                      {m.avgHoldMins>0 && (
                        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,
                          padding:"6px 10px",flex:1,textAlign:"center",minWidth:70}}>
                          <div style={{color:C.yellow,fontWeight:800,fontSize:13,fontFamily:"monospace"}}>{fmtDuration(Math.round(m.avgHoldMins))}</div>
                          <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>AVG HOLD</div>
                        </div>
                      )}
                      {m.profitFactor!==null && m.profitFactor!==undefined && (
                        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,
                          padding:"6px 10px",flex:1,textAlign:"center",minWidth:70}}>
                          <div style={{color:m.profitFactor>=1?C.green:C.red,fontWeight:800,fontSize:13,fontFamily:"monospace"}}>
                            {m.profitFactor===Infinity?"∞":m.profitFactor.toFixed(2)}
                          </div>
                          <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>PROFIT FACTOR</div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* ── PIPS ROW ── */}
                  {m?.hasPips && (
                    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                      {m.grossWinP>0&&(
                        <div style={{background:C.green+"12",border:`1px solid ${C.green}33`,borderRadius:7,
                          padding:"6px 10px",flex:1,textAlign:"center",minWidth:70}}>
                          <div style={{color:C.green,fontWeight:800,fontSize:13,fontFamily:"monospace"}}>{fmtPips(m.grossWinP)}</div>
                          <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>GROSS WIN</div>
                        </div>
                      )}
                      {m.grossLossP>0&&(
                        <div style={{background:C.red+"12",border:`1px solid ${C.red}33`,borderRadius:7,
                          padding:"6px 10px",flex:1,textAlign:"center",minWidth:70}}>
                          <div style={{color:C.red,fontWeight:800,fontSize:13,fontFamily:"monospace"}}>{fmtPips(-m.grossLossP)}</div>
                          <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>GROSS LOSS</div>
                        </div>
                      )}
                      <div style={{
                        background:m.netMinPips>=0?C.green+"12":C.red+"12",
                        border:`1px solid ${m.netMinPips>=0?C.green:C.red}33`,
                        borderRadius:7,padding:"6px 10px",flex:1,textAlign:"center",minWidth:70}}>
                        <div style={{color:m.netMinPips>=0?C.green:C.red,fontWeight:800,fontSize:13,fontFamily:"monospace"}}>
                          {m.isBepRange?`${fmtPips(m.netMinPips)}~${fmtPips(m.netMaxPips)}`:fmtPips(m.netMinPips)}
                        </div>
                        <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>NET PIPS</div>
                      </div>
                      {m.expectancy!==null&&m.expectancy!==undefined&&(
                        <div style={{
                          background:m.expectancy>=0?C.green+"12":C.red+"12",
                          border:`1px solid ${m.expectancy>=0?C.green:C.red}33`,
                          borderRadius:7,padding:"6px 10px",flex:1,textAlign:"center",minWidth:70}}>
                          <div style={{color:m.expectancy>=0?C.green:C.red,fontWeight:800,fontSize:12,fontFamily:"monospace"}}>
                            {fmtPips(m.expectancy)}
                          </div>
                          <div style={{color:C.faint,fontSize:9,letterSpacing:1}}>EXPECTANCY</div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* ── TABLE ── */}
                  <div style={{overflowX:"auto",marginBottom:12}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:9.5,minWidth:560}}>
                      <thead>
                        <tr style={{background:"#1565c0"}}>
                          {["Tanggal","Pair","Arah","SL","RR","Outcome","Model","Sesi Entry","Sesi Exit","Tags","Notes"]
                            .map(h=>(
                            <th key={h} style={{color:"#fff",padding:"5px 5px",textAlign:"left",fontSize:8.5,whiteSpace:"nowrap"}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {pdfPoints.map((p,i)=>{
                          const bg = i%2===0?"#0d1117":"#0f1520";
                          const outcomeColor = p.outcomeType==="win"?C.green:p.outcomeType==="loss"?C.red:C.yellow;
                          const outcomeLabel = p.outcomeType==="bep"?(p.bep?`BEP ${p.bep}`:"BEP"):p.outcomeType||"-";
                          return (
                            <tr key={i} style={{background:bg}}>
                              <td style={{padding:"4px 5px",color:C.dim,whiteSpace:"nowrap",fontSize:9}}>{p.tradeDate||"-"}</td>
                              <td style={{padding:"4px 5px",fontWeight:700,color:C.text,fontSize:10}}>{p.pair||"-"}</td>
                              <td style={{padding:"4px 5px",color:p.direction==="Buy"?C.green:C.red,fontWeight:700,fontSize:9}}>{p.direction||"-"}</td>
                              <td style={{padding:"4px 5px",color:C.dim,fontSize:9}}>{p.slType||"-"}</td>
                              <td style={{padding:"4px 5px",color:C.yellow,fontWeight:700,fontSize:10}}>{p.rr||"-"}</td>
                              <td style={{padding:"4px 5px",color:outcomeColor,fontWeight:700,fontSize:9}}>{outcomeLabel}</td>
                              <td style={{padding:"4px 5px",color:C.purple,fontSize:9}}>{p.trailingModel||p.slType||"-"}</td>
                              <td style={{padding:"4px 5px",fontSize:9,color:C.blue}}>{(p.sessEntry||[]).join(", ")||"-"}</td>
                              <td style={{padding:"4px 5px",fontSize:9,color:C.dim}}>{(p.sessExit||[]).join(", ")||"-"}</td>
                              <td style={{padding:"4px 5px",fontSize:9,color:"#a78bfa"}}>{(p.tags||[]).join(", ")||"-"}</td>
                              <td style={{padding:"4px 5px",fontSize:9,color:C.dim,maxWidth:80}}>{p.notes||""}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>

                  {/* Download PDF button */}
                  <button className="no-print" onClick={doPrint} disabled={pdfLoading}
                    style={{
                      width:"100%", background:pdfLoading?"#444":C.green,
                      border:"none", color:pdfLoading?"#aaa":"#000",
                      borderRadius:8, padding:"13px 0", fontWeight:800, fontSize:14,
                      cursor:pdfLoading?"not-allowed":"pointer",
                      fontFamily:"'Courier New',monospace", letterSpacing:1,
                      opacity:pdfLoading?0.6:1, transition:"all 0.2s"}}>
                    {pdfLoading ? "⏳ Generating PDF…" : "⬇️ Download PDF"}
                  </button>
                </div>
              );
            })()}
          </div>
        </div>
      )}
</div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>
</body>
</html>
